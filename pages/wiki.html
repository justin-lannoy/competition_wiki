s/2025-02-06_10-Q_0001820953-25-000012.htm) |\n| 8-K | 2025-02-06 | 2025-02-06 | [EDGAR](https://www.sec.gov/Archives/edgar/data/1820953/000182095325000010/afrm-20250206.htm) | [file](../../sec-filings/affirm-holdings/2025-02-06_8-K_0001820953-25-000010.htm) |\n| 8-K | 2024-12-20 | 2024-12-20 | [EDGAR](https://www.sec.gov/Archives/edgar/data/1820953/000182095324000073/afrm-20241220.htm) | [file](../../sec-filings/affirm-holdings/2024-12-20_8-K_0001820953-24-000073.htm) |\n| 8-K | 2024-12-18 | 2024-12-17 | [EDGAR](https://www.sec.gov/Archives/edgar/data/1820953/000182095324000065/afrm-20241217.htm) | [file](../../sec-filings/affirm-holdings/2024-12-18_8-K_0001820953-24-000065.htm) |\n| 8-K | 2024-12-16 | 2024-12-16 | [EDGAR](https://www.sec.gov/Archives/edgar/data/1820953/000182095324000064/afrm-20241216.htm) | [file](../../sec-filings/affirm-holdings/2024-12-16_8-K_0001820953-24-000064.htm) |\n| 8-K | 2024-12-12 | 2024-12-09 | [EDGAR](https://www.sec.gov/Archives/edgar/data/1820953/000182095324000063/afrm-20241209.htm) | [file](../../sec-filings/affirm-holdings/2024-12-12_8-K_0001820953-24-000063.htm) |\n| 10-Q | 2024-11-07 | 2024-09-30 | [EDGAR](https://www.sec.gov/Archives/edgar/data/1820953/000182095324000060/afrm-20240930.htm) | [file](../../sec-filings/affirm-holdings/2024-11-07_10-Q_0001820953-24-000060.htm) |\n| 8-K | 2024-11-07 | 2024-11-05 | [EDGAR](https://www.sec.gov/Archives/edgar/data/1820953/000182095324000058/afrm-20241105.htm) | [file](../../sec-filings/affirm-holdings/2024-11-07_8-K_0001820953-24-000058.htm) |\n| 10-K | 2024-08-28 | 2024-06-30 | [EDGAR](https://www.sec.gov/Archives/edgar/data/1820953/000182095324000035/afrm-20240630.htm) | [file](../../sec-filings/affirm-holdings/2024-08-28_10-K_0001820953-24-000035.htm) |\n| 8-K | 2024-08-28 | 2024-08-28 | [EDGAR](https://www.sec.gov/Archives/edgar/data/1820953/000182095324000033/afrm-20240828.htm) | [file](../../sec-filings/affirm-holdings/2024-08-28_8-K_0001820953-24-000033.htm) |\n| 8-K | 2024-07-01 | 2024-06-25 | [EDGAR](https://www.sec.gov/Archives/edgar/data/1820953/000182095324000027/afrm-20240625.htm) | [file](../../sec-filings/affirm-holdings/2024-07-01_8-K_0001820953-24-000027.htm) |\n| 8-K | 2024-06-20 | 2024-06-17 | [EDGAR](https://www.sec.gov/Archives/edgar/data/1820953/000182095324000024/afrm-20240617.htm) | [file](../../sec-filings/affirm-holdings/2024-06-20_8-K_0001820953-24-000024.htm) |\n\n## Filing summaries\n\n### 10-Q \u2014 2026-05-07\n\n#### Key financials\n- Q3 FY2026 (three months ended March 31, 2026) total revenue of $1.04B, up 33% YoY from $783.1M; nine-month revenue of $3.10B vs. $2.35B prior year period (+32% YoY).\n- Q3 FY2026 net income of $102.9M vs. net income of $2.8M in Q3 FY2025; nine-month net income of $313.2M vs. net loss of $(17.1)M in the prior year period.\n- Loans held for investment (net) grew to $8.06B at March 31, 2026 from $6.63B at June 30, 2025; allowance for credit losses rose to $512.3M (vs. $396.9M at June 30, 2025), with nine-month net charge-offs of $441.4M.\n- Total assets of $13.14B at March 31, 2026 vs. $11.15B at June 30, 2025; total funding debt + securitization notes of $7.75B vs. $6.46B; stockholders' equity of $3.78B vs. $3.07B.\n\n#### Segment & competitive notes\n- Affirm operates as a single reportable segment; merchant network revenue of $268.0M in Q3 FY2026 (+25% YoY) and card network revenue of $66.5M (+13% YoY), reflecting continued GMV growth across both the direct merchant and virtual card channels.\n- No single merchant accounted for \u226510% of total revenue in the three or nine months ended March 31, 2026; Amazon commercial agreement extended in November 2025 from a four-year to nine-year expected benefit period, with remaining net asset value of $4.8M at March 31, 2026.\n\n#### Risk-factor changes\n- Filing explicitly flags macroeconomic uncertainty\u2014including \"the magnitude, duration and impact of tariffs on global trade\"\u2014as a new/elevated risk to consumer creditworthiness and financial institution stability, added to the forward-looking risk disclosure relative to prior filings.\n- Loan modification activity (payment deferrals + re-amortizations) increased to $13.3M in Q3 FY2026 vs. $5.9M in Q3 FY2025 (0.16% vs. 0.09% of outstanding loans), signaling modest but rising borrower stress.\n\n#### Material events\n- In November 2025, Affirm executed a new commercial agreement with Amazon, superseding the prior agreement and extending the warrant asset amortization period from four to nine years, reducing near-term sales & marketing amortization expense (Q3 FY2026 Amazon amortization of $0.2M vs. $5.1M in Q3 FY2025).\n- Affirm reincorporated from Delaware to Nevada, effective July 1, 2025, following a certificate of conversion filed June 26, 2025. Nine-month financing activities included $2.85B in new securitization trust notes issued and zero new convertible note issuances (vs. $920M issued in the prior year period); convertible notes outstanding totaled $1.13B at March 31, 2026.\n\n### 8-K \u2014 2026-05-07\n\n## Affirm Holdings, Inc. (AFRM) \u2014 8-K Filed May 7, 2026\n\n#### Key financials\n- Filing references results for Affirm's **fiscal Q3 ended March 31, 2026**, disclosed via Shareholder Letter (Exhibit 99.1); specific revenue, GMV, and income figures are contained in the attached letter, which is not included in the truncated filing text.\n- Letter includes **non-GAAP financial measures** with GAAP reconciliations provided in the attached financial tables.\n\n#### Segment & competitive notes\n- None noted. No segment-level breakdown or competitor references are present in the 8-K body; detail would reside in Exhibit 99.1.\n\n#### Risk-factor changes\n- None noted. No new or amended risk factors are disclosed in this filing.\n\n#### Material events\n- On **May 7, 2026**, Affirm issued its fiscal Q3 2026 Shareholder Letter (Exhibit 99.1) reporting results under **Item 2.02 (Results of Operations and Financial Condition)**.\n- Filing signed by CFO **Rob O'Hare** on May 7, 2026; Exhibit 99.1 is furnished but **not deemed \"filed\"** for Section 18 liability purposes and is not incorporated by reference into Securities Act filings.\n\n### 10-Q \u2014 2026-02-05\n\n#### Key financials\n- **Revenue:** Total revenue, net of $1.123B for Q2 FY2026 (three months ended December 31, 2025), up 29.6% YoY from $866.4M; six-month revenue of $2.056B vs. $1.565B (+31.4% YoY).\n- **Net income:** Net income of $129.6M for Q2 FY2026 vs. $80.4M in Q2 FY2025; six-month net income of $210.3M vs. net loss of $(19.9M) in the prior-year period. Diluted EPS $0.37 vs. $0.23.\n- **Loan portfolio:** Loans held for investment grew to $8.774B as of December 31, 2025 (net $8.295B after $478.1M allowance), up from $7.026B (net $6.629B) at June 30, 2025. Provision for credit losses was $214.2M for Q2 and $376.9M for the six-month period.\n- **Balance sheet:** Total assets $12.957B vs. $11.155B at June 30, 2025; total funding debt $3.047B (up from $1.623B); securitization trust notes $4.835B; convertible senior notes $1.128B. Accumulated deficit narrowed to $(2.847B) from $(3.057B).\n\n#### Segment & competitive notes\n- **Single operating segment:** Affirm reports as one segment (unsecured consumer lending); revenue splits show merchant network revenue of $328.4M (+34.1% YoY) and card network revenue of $73.0M (+25.6% YoY) for Q2 FY2026, reflecting broad merchant and virtual-card channel growth.\n- **Key partner concentration:** No single merchant exceeded 10% of total revenue in Q2 or H1 FY2026; Amazon and Shopify commercial agreements remain material \u2014 Amazon agreement benefit period extended from 4 to 9 years in November 2025; Shopify asset net book value $39.4M with 3.5 years remaining useful life.\n- **Loan origination scale:** Purchased $10.8B from bank partners and directly originated $2.8B in Q2 FY2026 (vs. $8.1B and $1.7B, respectively, in Q2 FY2025), indicating accelerating GMV throughput competitive with BNPL peers.\n\n#### Risk-factor changes\n- **Macroeconomic/tariff risk added:** Forward-looking statements explicitly cite \"uncertainty relating to the magnitude, duration and impact of tariffs on global trade\" as a new incremental risk factor alongside ongoing inflation and elevated interest rate concerns.\n- **Credit quality:** 90\u2013119 day delinquent loans rose to $68.4M (December 31, 2025) vs. $47.6M (June 30, 2025); allowance for credit losses increased to $478.1M from $396.9M; net charge-offs for H1 FY2026 were $283.4M vs. $247.1M implied for H1 FY2025, signaling rising but managed credit stress.\n- **Item 1A disclosure:** The filing states no material changes to risk factors from the most recently filed Annual Report on Form 10-K (filed August 28, 2025), though tariff-related language was added to the forward-looking statement cautionary section.\n\n#### Material events\n- **Amazon commercial agreement extended:** In November 2025, Affirm executed a new commercial agreement with Amazon subsidiaries superseding the prior agreement and extending the benefit period of the associated warrant asset from 4 to 9 years; remaining net asset value is $5.1M over 5.1 years.\n- **Reincorporation in Nevada:** Effective July 1, 2025, Affirm completed a change of domicile from Delaware to Nevada via certificates of conversion filed June 26, 2025.\n- **Convertible notes activity:** 2026 Convertible Senior Notes (originally issued November 23, 2021) partially extinguished during the period; $25.8M cash paid for extinguishment in H1 FY2026 (vs. $1.013B in H1 FY2025). The 2029 Convertible Senior Notes ($920M, issued December 20, 2024) remain outstanding.\n- **Performance share grant:** On January 13, 2026 (subsequent event), performance share awards were granted to employees, per Note 18.\n\n### 8-K \u2014 2026-02-05\n\n## Affirm Holdings (AFRM) \u2013 8-K Filed February 5, 2026\n\n#### Key financials\n- Filing covers fiscal Q2 results for the quarter ended **December 31, 2025**; detailed financials are contained in Exhibit 99.1 (Shareholder Letter), which is not included in the truncated text provided.\n- Filing notes inclusion of **non-GAAP financial measures** with GAAP reconciliations provided in the attached Shareholder Letter and financial tables.\n\n#### Segment & competitive notes\n- None noted. (No segment-level or competitive detail present in the 8-K body; full discussion would be in Exhibit 99.1.)\n\n#### Risk-factor changes\n- None noted. This is a results disclosure (Item 2.02 only); no amended or new risk factors were filed.\n\n#### Material events\n- On **February 5, 2026**, Affirm issued a Shareholder Letter reporting financial results for **fiscal Q2 ended December 31, 2025** (Item 2.02 filing).\n- The 8-K was signed by CFO **Rob O'Hare** on February 5, 2026; Exhibit 99.1 is expressly **not deemed \"filed\"** for Section 18 liability purposes.\n\n### 8-K \u2014 2026-01-16\n\n## Affirm Holdings, Inc. (AFRM) \u2014 8-K Filed January 16, 2026\n\n#### Key financials\n- PSU award to CEO Max Levchin consists of 333,667 PSUs; shares earned will range from 50% (threshold) to 200% (maximum) of that grant, implying a range of ~166,834 to ~667,334 shares of Class A Common Stock.\n- Performance metrics are weighted 50% revenue less transaction costs growth and 50% adjusted operating income growth, measured annually over the three-year performance period commencing July 1, 2025.\n\n#### Segment & competitive notes\n- None noted.\n\n#### Risk-factor changes\n- None noted.\n\n#### Material events\n- On January 13, 2026, the Board approved a PSU grant of 333,667 units to Founder/CEO Max Levchin under the Amended and Restated 2012 Stock Plan, with a three-year performance period ending approximately June 30, 2028; no shares vest until period-end, contingent on continued service.\n- The new grant follows the expiration of Levchin's prior value creation award, originally granted January 12, 2021 with a five-year performance period that expired January 11, 2026, eliminating that prior compensation structure.\n\n### 8-K \u2014 2025-12-18\n\n## Affirm Holdings, Inc. (AFRM) \u2014 8-K Filed December 18, 2025\n\n#### Key financials\n- None noted.\n\n#### Segment & competitive notes\n- None noted.\n\n#### Risk-factor changes\n- None noted.\n\n#### Material events\n- On December 15, 2025, Affirm held its 2025 Annual Meeting with 93.4% of combined voting power present in person or by proxy, constituting a quorum; record date was October 17, 2025.\n- All three Class II director nominees elected to serve until the 2028 annual meeting: Richard Galanti (814.2M votes for), Christa S. Quarles (781.9M votes for), and Manolo S\u00e1nchez (794.4M votes for); Quarles received the highest opposition at ~32.7M votes against.\n- Deloitte & Touche LLP ratified as independent auditor for fiscal year ending June 30, 2026, with 840.2M votes for and only 178,650 against.\n- Say-on-pay advisory vote passed with 788.6M votes for vs. 26.2M against (~3.2% opposition).\n\n### 10-Q \u2014 2025-11-06\n\n#### Key financials\n- Q1 FY2026 (quarter ended Sept 30, 2025) total revenue of **$933.3M**, up 33.6% YoY from $698.5M; net income of **$80.7M** vs. net loss of $(100.2M) in Q1 FY2025, marking a significant swing to profitability.\n- Gross loans held for investment grew to **$7.24B** (Sept 30, 2025) from $7.03B (June 30, 2025); allowance for credit losses rose to **$425.8M** (5.9% of gross loans) from $396.9M; net charge-offs for the quarter were **$127.5M** vs. $113.3M YoY.\n- Operating expenses of **$869.7M** vs. $831.1M YoY; operating income of **$63.7M** vs. operating loss of $(132.6M); total assets **$11.48B** vs. $11.15B at June 30, 2025.\n- Loan originations accelerated: purchased **$8.7B** from bank partners (vs. $6.4B YoY) and directly originated **$1.9B** (vs. $1.3B YoY) during the quarter.\n\n#### Segment & competitive notes\n- Affirm operates as a **single reportable segment** (unsecured consumer lending/payments platform); no sub-segment breakout provided.\n- Merchant network revenue of **$251.1M** (+36.2% YoY); card network revenue of **$69.3M** (+46.0% YoY), reflecting continued Virtual Card/Affirm Card adoption; interest income of **$454.1M** (+20.4% YoY) and gain on loan sales of **$119.0M** (+87.2% YoY).\n- No single merchant accounted for \u226510% of total revenue in Q1 FY2026; Amazon and Shopify remain key commercial partners with warrant/profit-share arrangements still active (Amazon commercial agreement asset net book value **$7.0M**, Shopify **$42.3M** as of Sept 30, 2025).\n\n#### Risk-factor changes\n- The filing states there were **no material changes** to risk factors from those disclosed in the Annual Report on Form 10-K for fiscal year ended June 30, 2025 (filed Aug 28, 2025); macro risks flagged include tariff uncertainty, elevated interest rates, and potential recessionary conditions.\n- Loan delinquencies (90\u2013119 days past due) rose to **$57.8M** as of Sept 30, 2025 from $47.6M at June 30, 2025, a trend worth monitoring; modified loan balances (borrowers experiencing financial difficulty) declined to **$14.0M** from $26.2M a year earlier, suggesting improving borrower stress but higher absolute delinquency volume.\n\n#### Material events\n- **Reincorporation**: Effective July 1, 2025, Affirm reincorporated from Delaware to Nevada following certificate of conversion filed June 26, 2025.\n- **Kusnier class action dismissed with prejudice** Sept 30, 2025 (securities fraud suit alleging misleading statements about interest-rate sensitivity); plaintiffs filed a notice of appeal to the Ninth Circuit on Oct 29, 2025; related derivative suits (Quiroga, Jeffries, Vallieres) remain stayed.\n- **Amazon warrant amendment** (subsequent event, Nov 2, 2025): Affirm amended its commercial agreement with Amazon, modifying warrant vesting terms; warrant holders for users acquired prior to Feb 1 (2025) and subsequent users will have differentiated vesting schedules with forecast milestone ranges disclosed.\n- **Convertible notes**: $24.8M in 2026 convertible notes extinguished during Q1 FY2026; remaining 2026 notes and $1.0B 2029 notes (issued Dec 20, 2024 at 0% coupon) outstanding; revolving credit facility of undrawn capacity in place (established Dec 16, 2024).\n\n### 8-K \u2014 2025-11-06\n\n## Affirm Holdings, Inc. (AFRM) \u2013 8-K Filed November 6, 2025\n\n#### Key financials\n- Shareholder Letter (Exhibit 99.1) released November 6, 2025 covering fiscal Q1 results for the quarter ended September 30, 2025; specific revenue, GMV, and earnings figures are contained in the attached letter but not reproduced in the 8-K body.\n- Letter includes non-GAAP financial measures with GAAP reconciliations; no standalone financial figures disclosed within the 8-K filing text itself.\n\n#### Segment & competitive notes\n- Affirm renewed its exclusive BNPL partnership with Amazon.com via a Second Amended and Restated Installment Financing Services Agreement signed November 6, 2025, effective February 1, 2026, covering installment loans on Amazon.com and Amazon Pay widget on third-party retail channels.\n- New agreement carries a five-year initial term (February 1, 2026 \u2013 January 31, 2031), with automatic one-year renewals thereafter, replacing the original agreement dated November 10, 2021.\n\n#### Risk-factor changes\n- Amazon warrant exercise price was bifurcated: shares vesting on new user acquisition **prior to** February 1, 2026 retain the $100.00/share exercise price; shares vesting **on or after** February 1, 2026 carry a reset exercise price of $63.06/share, representing potential additional dilution at a lower strike.\n- Total warrant capacity remains unchanged at up to 15,000,000 shares of Class A common stock ($0.00001 par value); lower strike price increases dilution risk to existing shareholders if Amazon vests and exercises post-February 2026 tranches.\n\n#### Material events\n- Second Amendment to the Amazon warrant executed November 2, 2025, resetting exercise price for post-February 1, 2026 vesting tranches to $63.06/share from the prior $100.00/share level.\n- Full text of both the Restated Agreement and the Second Amendment will be filed as exhibits to the Form 10-Q for the fiscal quarter ending December 31, 2025; neither document was attached to this 8-K.\n\n### 8-K \u2014 2025-09-22\n\n## Affirm Holdings, Inc. (AFRM) \u2014 8-K Filed September 22, 2025\n\n#### Key financials\n- No financial results or guidance disclosed in this filing.\n- PSU performance metrics are weighted 50% on revenue less transaction costs growth and 50% on adjusted operating income growth, with a three-year performance period commencing July 1, 2025.\n\n#### Segment & competitive notes\n- None noted.\n\n#### Risk-factor changes\n- None noted.\n\n#### Material events\n- On September 18, 2025, the Compensation Committee approved annual equity grants (RSUs and PSUs) to four executive officers under the Amended and Restated 2012 Stock Plan: CFO Rob O'Hare (33,366 PSUs / 33,366 RSUs), CLO/CCO Katherine Adkins (19,463 / 19,463), COO Michael Linford (44,488 / 44,488), and President Libor Michalek (44,488 / 44,488).\n- PSUs can be earned at 50%\u2013200% of the granted amount depending on average annual performance over the three-year period ending ~June 30, 2028; no shares vest until the end of the full performance period.\n- RSUs vest quarterly over three years, with the first vesting date on December 1, 2025, subject to continued service.\n\n### 10-K \u2014 2025-08-28\n\n#### Key financials\n- FY2025 (fiscal year ended June 30, 2025) GMV reached **$36.7 billion**; interest-bearing installment loans represented **72%** of total GMV, down from 74% in FY2024.\n- Repeat consumers drove **94%** of transactions in FY2025 (vs. 92% in FY2024); active consumer transaction frequency reached approximately **5.8 transactions per active consumer**, up ~20% year-over-year.\n- Convertible Senior Notes due 2029 issued **December 20, 2024**; revolving credit facility established **December 16, 2024**; a portion of 2026 convertible notes were repurchased/redeemed, with remaining balance outstanding as of **May 18, 2025** and further activity through **August 28, 2025** (subsequent event).\n- As of **December 31, 2024**, aggregate market value of Class A common stock held by non-affiliates was approximately **$16.6 billion**; shares outstanding as of August 22, 2025: **284.9 million** Class A and **40.7 million** Class B.\n\n#### Segment & competitive notes\n- Affirm operates as a **single segment**; revenue channels are Merchant Network and Virtual Card Network; Pay-in-X was **14%** of GMV in FY2025 (vs. 15% FY2024) and 0% APR installment loans were **13%** (vs. 11% FY2024).\n- Named competitors include Klarna, Block, PayPal, Synchrony, J.P. Morgan Chase, Citibank, Bank of America, Capital One, Bread Financial, American Express, Visa, and Mastercard; company acknowledges competitors are substantially larger with lower-cost funding and broader distribution.\n- Merchants on platform numbered approximately **377 thousand** as of June 30, 2025; **24%** of FY2025 transactions originated through the Affirm marketplace/app (including virtual card); Affirm Card in-store usage cited as a growth driver.\n- Key merchant concentration risk: commercial agreements with **Amazon** (warrants issued November 2021) and **Shopify** (warrants issued FY2021) remain active with profit-share/warrant liabilities carried at fair value.\n\n#### Risk-factor changes\n- Heightened disclosure on **tariff and trade policy uncertainty** added as a macroeconomic risk factor alongside inflation and elevated interest rates, reflecting the post-April 2025 environment.\n- Expanded risk language around **AI/machine learning model risk**, including reliance on proprietary risk models trained on ~343 million loans and potential for model degradation or regulatory scrutiny of AI-driven underwriting.\n- Continued prominent disclosure of **\"true lender\" and \"valid when made\" litigation risk** tied to bank-partner origination model (Celtic Bank, Lead Bank, Cross River Bank); notes ongoing state AG litigation against FDIC's Federal Interest Rate Authority Rule, though FDIC prevailed in N.D. Cal. (Feb. 8, 2022).\n- **Restatement adjustment** noted for quarters ended December 31, 2024 and March 31, 2025 (referenced in XBRL tagging); no material restatement disclosure found in the narrative, but prior-period correction entries are present in the filing.\n\n#### Material events\n- Issued **$[amount not disclosed in truncated text] of 0% Convertible Senior Notes due 2029** on **December 20, 2024**, and entered a new **revolving credit facility on December 16, 2024**; 2026 convertible notes partially repurchased through May 2025, with remaining balance disclosed as a subsequent event through **August 28, 2025**.\n- **Subsequent event**: remaining Convertible Senior Notes due 2026 further addressed between **July 1 and August 28, 2025** (specific repurchase/conversion amount in subsequent event footnote, details truncated).\n- CFO **Rob O'Hare** adoption of a Rule 10b5-1 trading plan disclosed for the quarter ended **June 30, 2025**.\n- Company conducted a share repurchase of Class A common stock in **December 2024**; Butter Holdings Ltd. acquisition (February 1, 2023) continues to be reflected in intangibles; no new acquisitions disclosed in FY2025.\n\n### 8-K \u2014 2025-08-28\n\n#### Key financials\n- 8-K filed August 28, 2025 reports Q4 fiscal results for the quarter ended June 30, 2025; detailed financials are contained in Exhibit 99.1 (Shareholder Letter), which is not reproduced in the filing text provided.\n- Filing notes use of non-GAAP financial measures with GAAP reconciliations included in the attached Letter; no specific revenue, GMV, or earnings figures are extractable from the 8-K body itself.\n\n#### Segment & competitive notes\n- None noted. No segment-level or competitive data disclosed in the 8-K body; any such detail would reside in Exhibit 99.1.\n\n#### Risk-factor changes\n- None noted. This is a results-of-operations 8-K (Item 2.02 only); no new or amended risk factors were disclosed.\n\n#### Material events\n- Affirm Holdings, Inc. (AFRM, Nasdaq) reported Q4 FY2025 results via Shareholder Letter on August 28, 2025, covering the fiscal quarter ended June 30, 2025.\n- CFO Rob O'Hare signed the filing; the Shareholder Letter (Exhibit 99.1) is incorporated by reference but not filed for Section 18 liability purposes.\n\n### 8-K \u2014 2025-06-26\n\n## Affirm Holdings, Inc. (AFRM) \u2014 8-K Filed June 26, 2025\n\n#### Key financials\n- None noted.\n\n#### Segment & competitive notes\n- None noted.\n\n#### Risk-factor changes\n- Reincorporation from Delaware to Nevada (effective July 1, 2025, 12:01 a.m. PT) will change certain stockholder rights, as governed by Nevada law, the new Nevada Charter, and Nevada Bylaws; Delaware law protections no longer apply after that date.\n- Company stated the reincorporation will not alter business operations, employees, assets, liabilities, or net worth (beyond direct transaction costs).\n\n#### Material events\n- At a Special Meeting on June 25, 2025 (record date April 28, 2025), stockholders approved Delaware-to-Nevada reincorporation: **675,165,243 votes for** vs. **124,941,582 against** (~84% of votes cast in favor); quorum represented **89.62%** of combined voting power.\n- On June 26, 2025, Affirm filed a certificate of conversion with Delaware and articles of conversion with Nevada; reincorporation becomes effective **July 1, 2025**; AFRM ticker on Nasdaq unchanged; each existing Class A and Class B share converts 1-for-1 into Nevada corporation shares under identical terms.\n\n### 8-K \u2014 2025-06-12\n\n## Affirm Holdings, Inc. (AFRM) \u2014 8-K Filed June 12, 2025\n\n#### Key financials\n- None noted.\n\n#### Segment & competitive notes\n- None noted.\n\n#### Risk-factor changes\n- None noted.\n\n#### Material events\n- **Director departure:** Keith Rabois resigned from Affirm's Board of Directors effective June 30, 2025; he stated his resignation was not due to any disagreement with the company's operations, policies, or practices.\n- **Director appointment:** Richard Galanti, retired EVP and CFO of Costco Wholesale (served January 1985\u2013March 2024), was appointed as a Class II director effective July 1, 2025, and named to the Compensation Committee.\n- **Galanti compensation:** Will receive an initial RSU grant valued at $500,000 (vesting annually over three years), an annual RSU grant of $200,000 (vesting at next annual meeting or one-year anniversary), and a $45,000 annual cash retainer (pro-rated for partial year), plus committee cash retainers.\n\n### 10-Q \u2014 2025-05-09\n\nI was only provided the XBRL tag list and financial statement data from this 10-Q filing (Affirm Holdings, ticker AFRM, fiscal Q3 ending March 31, 2025). The narrative MD&A, Risk Factors, and subsequent-events sections were truncated. I will summarize using the financial data available.\n\n---\n\n#### Key financials\n- **Q3 FY2025 revenue:** $783.1M, up 36% YoY from $576.2M; nine-month revenue $2.348B vs. $1.664B (+41% YoY).\n- **Q3 FY2025 net income:** $2.8M (EPS $0.01 diluted), vs. net loss of $(133.9M) in Q3 FY2024; nine-month net loss $(17.1M) vs. $(472.6M) YoY \u2014 dramatic improvement.\n- **Loans held for investment, net:** $6.255B at March 31, 2025 vs. $5.361B at June 30, 2024 (+17%); allowance for credit losses $375.0M (5.7% of gross loans) vs. $309.1M (5.2%) at June 30, 2024, reflecting portfolio growth and modest credit normalization.\n- **Total assets:** $10.436B at March 31, 2025 vs. $9.520B at June 30, 2024; total funding debt + securitization notes $5.994B vs. $5.074B; cash and equivalents $1.351B vs. $1.013B.\n\n---\n\n#### Segment & competitive notes\n- **Revenue mix shift:** Interest income ($402.7M, +28% YoY in Q3) and gain on loan sales ($75.8M, +89% YoY) drove growth; merchant network revenue $214.0M (+34% YoY); card network revenue $58.6M (+64% YoY), reflecting continued Affirm Card/virtual card expansion.\n- **Loan origination volume:** Purchased $7.1B from bank partners in Q3 FY2025 (vs. $5.1B Q3 FY2024) and directly originated $1.5B (vs. $1.1B); nine-month totals $21.6B purchased + $4.5B direct vs. $15.6B + $3.3B \u2014 aggregate GMV growth ~36% YoY.\n- **Sales & marketing expense decline:** $74.0M in Q3 FY2025 vs. $133.0M in Q3 FY2024 (\u221244%), reflecting wind-down of Amazon/Shopify warrant amortization and reduced promotional spend; nine-month S&M $355.3M vs. $441.1M (\u221219%).\n- None noted on named competitor disclosures in the truncated text.\n\n---\n\n#### Risk-factor changes\n- **Macro/tariff risk added:** Forward-looking disclosures explicitly added \"uncertainty relating to the magnitude, duration and impact of tariffs on global trade\" as a new macroeconomic risk factor alongside existing inflation and elevated interest rate language \u2014 a new addition vs. prior filings.\n- **Credit quality modestly weaker:** 90\u2013119 day delinquencies rose to $49.3M (0.75% of portfolio) at March 31, 2025 vs. $38.6M (0.69%) at June 30, 2024; nine-month net charge-offs $376.5M vs. $241.3M YoY, consistent with portfolio growth but worth monitoring.\n- **Convertible notes refinancing:** Issued $920M of new 2029 convertible notes (December 20, 2024) and extinguished a material portion of 2026 notes (recording $82.4M gain on extinguishment nine months ended March 31, 2025), extending maturity profile but adding refinancing execution risk documentation.\n\n---\n\n#### Material events\n- **$920M convertible note issuance (December 20, 2024):** Affirm issued $920M in Convertible Senior Notes due 2029; simultaneously repurchased/extinguished 2026 notes, generating an $82.4M debt extinguishment gain in the nine months ended March 31, 2025.\n- **$250M share repurchase (Q2 FY2025, completed by December 31, 2024):** Repurchased 3,526,590 shares of Class A common stock for $250.0M; no additional repurchases in Q3 FY2025.\n- **Amazon warrant vesting \u2014 3.5M shares issued:** 3,499,453 shares of Class A common stock issued upon exercise of warrants in Q3 FY2025 (January\u2013March 2025); commercial agreement asset balance reduced to $65.2M at March 31, 2025 from $104.6M at June 30, 2024 as amortization continues.\n- **Revolving credit facility amended December 16, 2024:** Terms updated per filing footnotes\n\n### 8-K \u2014 2025-05-08\n\n#### Key financials\n- Filing covers Affirm Holdings' fiscal Q3 results for the quarter ended March 31, 2025, disclosed via Shareholder Letter (Exhibit 99.1) on May 8, 2025; specific revenue, GMV, and net income/loss figures are contained in the attached exhibit, which is not reproduced in the 8-K body text.\n- Filing notes use of non-GAAP financial measures with GAAP reconciliations included in the Shareholder Letter.\n\n#### Segment & competitive notes\n- None noted. The 8-K body contains no segment-level or competitive detail; all operating commentary is in Exhibit 99.1 (not included in the truncated text).\n\n#### Risk-factor changes\n- None noted. This is a results-disclosure 8-K (Item 2.02 only); no risk-factor amendments were filed.\n\n#### Material events\n- On May 8, 2025, Affirm filed under Item 2.02 (Results of Operations and Financial Condition), reporting fiscal Q3 2025 earnings via Shareholder Letter signed by CFO Rob O'Hare.\n- The exhibit is expressly designated as \"not filed\" for Section 18 Exchange Act liability purposes and is not incorporated by reference into any Securities Act filings.\n\n### 8-K \u2014 2025-03-17\n\n## Affirm Holdings, Inc. (AFRM) \u2014 8-K Filed March 17, 2025\n\n#### Key financials\n- Walmart-integrated program represented approximately **5% of Affirm's Gross Merchandise Volume** during the six-month period ended **December 31, 2024**.\n- Walmart-integrated program represented approximately **2% of Affirm's Adjusted Operating Income** during the same six-month period ended **December 31, 2024**.\n\n#### Segment & competitive notes\n- On **March 17, 2025**, **OnePay** (a fintech majority owned by Walmart) announced it selected **Klarna Group plc** \u2014 a direct Affirm competitor \u2014 to provide installment loan financing to Walmart customers, beginning later in 2025.\n- As of the filing date, Walmart **remains** an integrated merchant partner of Affirm; Affirm continues to offer pay-over-time products at Walmart via its integrated program, the Affirm App, and the Affirm Card.\n\n#### Risk-factor changes\n- The Klarna/OnePay announcement introduces a **competitive displacement risk** at Walmart, Affirm's notable merchant partner, though current exposure is limited (~5% GMV, ~2% Adjusted Operating Income).\n- No formal amendments to previously disclosed risk factors were made in this filing; the company references existing risk factors in its **10-K filed August 28, 2024** and subsequent 10-Qs.\n\n#### Material events\n- OnePay's selection of Klarna at Walmart, announced **March 17, 2025**, is the sole triggering event for this Item 8.01 filing, disclosed proactively to inform investors of a competitive development at a key merchant partner.\n- No transaction, litigation, leadership change, or capital markets activity was disclosed.\n\n### 8-K \u2014 2025-02-28\n\n#### Key financials\n- None noted. This 8-K contains no financial results or metrics; it was filed solely to submit a legal opinion related to a securities offering.\n\n#### Segment & competitive notes\n- None noted. No segment data, GMV figures, or competitive commentary included in this filing.\n\n#### Risk-factor changes\n- None noted. No new or amended risk factors disclosed.\n\n#### Material events\n- On February 28, 2025, Affirm Holdings filed a prospectus supplement to its automatic shelf registration statement on Form S-3 (Registration No. 333-285421), signaling a potential securities issuance/sale.\n- The 8-K was filed exclusively to attach the legality opinion (Exhibit 5.1) from outside counsel Gibson, Dunn & Crutcher LLP in connection with that prospectus supplement; CFO Rob O'Hare signed the filing.\n\n### 8-K \u2014 2025-02-20\n\n## Affirm Holdings, Inc. (AFRM) \u2013 8-K Filed February 20, 2025\n\n#### Key financials\n- No financial results or metrics disclosed in this filing.\n- Fee structure disclosed: Shopify merchants pay Affirm a percentage of each sale plus a fixed per-transaction amount; Affirm in turn pays Shopify a fee per sale processed through Shop Pay Installments (SPI). Specific rates not disclosed.\n\n#### Segment & competitive notes\n- Affirm renewed and expanded its exclusive BNPL partnership with Shopify via a new Global Customer Installment Program Agreement effective February 14, 2025, covering the U.S. and Canada under territory program agreements executed concurrently.\n- Exclusivity clause: Shopify is contractually prohibited from using any provider other than Affirm for financial products substantially similar to SPI offerings in covered territories for the duration of the agreement \u2014 a significant competitive moat against rivals such as Klarna, Afterpay, and Sezzle on the Shopify platform.\n\n#### Risk-factor changes\n- No new risk factors introduced; filing references existing risk factors in the 10-K filed August 28, 2024, and subsequent 10-Qs.\n- Either party may terminate without cause after year one of the initial term with 180 days' written notice, introducing potential partner-concentration risk given Shopify's materiality to Affirm's GMV.\n\n#### Material events\n- New agreement supersedes the prior Amended and Restated Customer Installment Program Agreement (dated March 18, 2024, as amended October 10, November 12, and December 18, 2024), which terminated on February 14, 2025.\n- Initial term runs three years, expiring June 8, 2028, with automatic one-year renewals thereafter unless either party provides 180 days' written notice of non-renewal. Full agreement text to be filed as an exhibit to the 10-Q for the quarter ending March 31, 2025.\n\n### 10-Q \u2014 2025-02-06\n\nI'll note that the filing text provided is Affirm Holdings, Inc.'s (AFRM) 10-Q for the quarter ended December 31, 2024 \u2014 a direct BNPL competitor relevant to Snap Finance's competitive monitoring.\n\n---\n\n#### Key financials\n\n- **Q2 FY2025 (3 months ended Dec 31, 2024) total revenue:** $866.4M, up 46.6% YoY from $591.1M; **H1 FY2025 (6 months ended Dec 31, 2024):** $1.565B, up 43.9% YoY from $1.088B.\n- **Q2 FY2025 net income:** $80.4M (EPS diluted $0.23) vs. net loss of $(166.9)M in Q2 FY2024; **H1 FY2025 net loss:** $(19.9)M vs. $(338.7)M in H1 FY2024 \u2014 dramatic year-over-year improvement.\n- **Loans held for investment, net** grew to $6.43B at Dec 31, 2024 from $5.36B at Jun 30, 2024 (+19.8%); allowance for credit losses rose to $363.8M from $309.1M; **provision for credit losses H1 FY2025:** $312.8M vs. $220.6M in H1 FY2024 (+41.8%).\n- **Total assets:** $10.48B at Dec 31, 2024 vs. $9.52B at Jun 30, 2024; company repurchased $250M of common stock in Q2 FY2025 and issued $920M in new convertible notes due 2029 while extinguishing ~$1.01B of prior convertible debt.\n\n---\n\n#### Segment & competitive notes\n\n- Affirm operates a single-segment model (no discrete business segments reported); revenue streams are **merchant network revenue** ($429.2M H1 FY2025, +28.4% YoY), **card network revenue** ($105.6M, +45.2% YoY), **interest income** ($786.4M, +42.7% YoY), and **gain on sales of loans** ($188.9M, +117.2% YoY) \u2014 all accelerating, signaling strong merchant and consumer adoption pressure on lease-to-own competitors.\n- Loan origination volume surged: Affirm purchased **$14.5B** from bank partners and directly originated **$3.0B** in H1 FY2025, vs. $10.5B and $2.2B respectively in H1 FY2024 \u2014 implying gross merchandise volume growth well above 30% YoY, intensifying competitive pressure at the point of sale.\n- No single merchant exceeded 10% of total revenue in the periods presented; key commercial partners include Amazon (warrants granted Nov 2021, $133.5M asset) and Shopify (warrants granted Jul 2020, $270.6M asset, fully vested as of Dec 31, 2024), underscoring deep integration with major e-commerce platforms.\n- Delinquency trends show modest deterioration: loans 90\u2013119 days past due rose to $52.9M (0.79% of amortized cost) at Dec 31, 2024 from $38.6M (0.69%) at Jun 30, 2024; loan modifications as % of total receivables declined to 0.15% in Q2 FY2025 from 0.42% in Q2 FY2024, suggesting improving underlying credit quality despite portfolio growth.\n\n---\n\n#### Risk-factor changes\n\n- The filing references risk factors as disclosed in the Annual Report on Form 10-K (filed Aug 28, 2024); Item 1A of this 10-Q states no material changes to risk factors were made, with only a cross-reference to the prior annual filing \u2014 **no new or materially updated risk factors disclosed**.\n- Pending accounting standard adoptions flagged: ASU 2023-07 (Segment Reporting, effective for Affirm's interim periods after Dec 15, 2024) and ASU 2023-09 (Income Tax Disclosures, effective FY beginning after Dec 15, 2024) are under evaluation; ASU 2024-03 (Expense Disaggregation) effective FY after Dec 15, 2026 \u2014 none expected to have an immediate material financial impact but may require incremental disclosures.\n\n---\n\n#### Material events\n\n- On **December 20, 2024**, Affirm issued **$920M of 0% Convertible Senior Notes due 2029** and used approximately **$1.013B** to extinguish the outstanding Convertible Senior Notes due 2026 (originally issued Nov 23, 2021 at 0%), recognizing a **$82.4M gain on debt extinguishment** in H1 FY2025 cash flows.\n- In **Q2 FY2025**,\n\n### 8-K \u2014 2025-02-06\n\n## Affirm Holdings, Inc. (AFRM) \u2014 8-K Filed February 6, 2025\n\n#### Key financials\n- Filing references Q2 FY2025 results (fiscal quarter ended December 31, 2024), disclosed via Shareholder Letter (Exhibit 99.1); specific revenue, GMV, and net income figures are contained in the attached exhibit, not reproduced in the 8-K body itself.\n- Both GAAP and non-GAAP financial measures were presented; reconciliations included in the Shareholder Letter per Item 2.02 disclosure.\n\n#### Segment & competitive notes\n- None noted. (No segment-level or competitive commentary included in the 8-K filing text itself.)\n\n#### Risk-factor changes\n- None noted. (No new or amended risk factors disclosed in this filing.)\n\n#### Material events\n- On February 6, 2025, Affirm issued its Q2 FY2025 Shareholder Letter reporting financial results for the quarter ended December 31, 2024, filed under Item 2.02 (Results of Operations and Financial Condition).\n- The filing was signed by CFO Rob O'Hare on February 6, 2025; information in Exhibit 99.1 is expressly not deemed \"filed\" for Section 18 liability purposes.\n\n### 8-K \u2014 2024-12-20\n\n## Affirm Holdings, Inc. (AFRM) \u2014 8-K Filed December 20, 2024\n\n#### Key financials\n- Issued **$920M aggregate principal** of **0.75% Convertible Senior Notes due December 15, 2029** (including full exercise of $120M overallotment option) via Rule 144A private placement; interest payable semiannually beginning June 15, 2025.\n- Initial conversion price of **~$101.02/share** (9.8992 shares per $1,000 principal); maximum conversion rate capped at 14.1063 shares per $1,000 principal.\n- Repurchased **$960M principal of existing 0% convertible notes due 2026** for **$892.8M** (a ~7% discount), expected to settle on or about December 20, 2024.\n- Separately repurchased **3,526,590 shares** of Class A common stock for **~$250M** in privately negotiated transactions with Notes purchasers on December 20, 2024.\n\n#### Segment & competitive notes\n- None noted.\n\n#### Risk-factor changes\n- New senior unsecured debt obligation of $920M added to balance sheet; Notes rank effectively subordinated to all existing and future **secured debt** and structurally subordinated to all **subsidiary liabilities**.\n- Potential dilution risk if Notes are converted; unregistered equity issuable upon conversion, with conversion triggered at **130% of conversion price** for at least 20 of 30 consecutive trading days, among other conditions.\n\n#### Material events\n- On **December 20, 2024**, Affirm entered into an Indenture with Wilmington Trust, National Association as trustee governing the new 2029 Notes; lead underwriters were Morgan Stanley, Barclays Capital, and J.P. Morgan Securities.\n- The combined transactions (new notes issuance, 2026 note repurchase at discount, and share buyback) represent a significant balance sheet restructuring, retiring near-term 2026 maturity obligations and extending debt duration to 2029.\n\n### 8-K \u2014 2024-12-18\n\n## Affirm Holdings, Inc. (AFRM) \u2014 8-K Filed December 18, 2024\n\n#### Key financials\n- On December 17, 2024, Affirm priced a private offering of convertible senior notes due 2029 to qualified institutional buyers under Rule 144A; specific aggregate principal amount not disclosed in the filing text.\n- Initial purchasers were granted an option to purchase additional notes within a 13-day window beginning on the initial closing date.\n\n#### Segment & competitive notes\n- None noted.\n\n#### Risk-factor changes\n- None noted.\n\n#### Material events\n- Affirm announced pricing of convertible senior notes due 2029 via private placement on December 17, 2024, with the press release attached as Exhibit 99.1.\n- Filing was signed by Michael Linford, Chief Operating Officer, on December 18, 2024; no proceeds use or conversion terms were disclosed in the body of the 8-K.\n\n### 8-K \u2014 2024-12-16\n\n#### Key financials\n- No financial results disclosed in this filing; the 8-K relates solely to a proposed capital markets transaction.\n- Affirm announced intention to offer convertible senior notes due 2029 in a Rule 144A private placement to qualified institutional buyers; specific size and pricing terms were not disclosed in this filing (dated December 16, 2024).\n\n#### Segment & competitive notes\n- None noted.\n\n#### Risk-factor changes\n- None noted.\n\n#### Material events\n- On December 16, 2024, Affirm Holdings, Inc. (AFRM) announced a private placement of convertible senior notes due 2029 under Rule 144A, targeted at qualified institutional buyers.\n- Filing was signed by Michael Linford, Chief Operating Officer, on December 16, 2024; no use of proceeds, conversion terms, or deal size were specified in this 8-K text.\n\n### 8-K \u2014 2024-12-12\n\n## Affirm Holdings, Inc. (AFRM) \u2013 8-K Filed December 12, 2024\n\n#### Key financials\n- None noted.\n\n#### Segment & competitive notes\n- None noted.\n\n#### Risk-factor changes\n- None noted.\n\n#### Material events\n- On December 9, 2024, Affirm held its 2024 Annual Meeting; 89.30% of combined voting power was represented, constituting a quorum (record date: October 11, 2024).\n- Three Class I directors elected to serve until the 2027 annual meeting: Libor Michalek (759.4M votes for), Jacqueline D. Reses (758.4M votes for), and Noel Watson (758.1M votes for).\n- Deloitte & Touche LLP ratified as independent auditor for fiscal year ending June 30, 2025, with 806.2M votes for and only 843,775 votes against.\n- Named executive officer compensation approved on a non-binding advisory basis with 729.6M votes for and 46.9M votes against (~94% approval among votes cast).\n\n### 10-Q \u2014 2024-11-07\n\n#### Key financials\n- **Q1 FY2025 (quarter ended September 30, 2024):** Total revenue, net of $698.5M, up 40.7% YoY from $496.5M; net loss of $100.2M ($0.31/share), improved from net loss of $171.8M ($0.57/share) in Q1 FY2024.\n- **Loans held for investment, net** grew to $5.96B at September 30, 2024 from $5.36B at June 30, 2024; allowance for credit losses rose to $350.6M from $309.1M; net charge-offs for the quarter were $113.3M vs. $65.3M in the prior-year quarter.\n- **Total assets** were $10.14B at September 30, 2024 vs. $9.52B at June 30, 2024; convertible senior notes declined to $1.20B from $1.34B following a $120.1M cash repurchase of $140.5M principal, generating a $19.6M gain on debt extinguishment.\n- **Interest income** of $377.1M (+43.5% YoY); merchant network revenue of $184.3M (+26.3% YoY); provision for credit losses of $159.8M vs. $99.7M in Q1 FY2024.\n\n#### Segment & competitive notes\n- Affirm operates as a single reportable segment; revenue is disaggregated into merchant network ($184.3M), card network ($47.5M), interest income ($377.1M), gain on loan sales ($63.6M), and servicing income ($26.0M) \u2014 all lines grew YoY.\n- Loans purchased from originating bank partners totaled $6.4B in Q1 FY2025 vs. $4.6B in Q1 FY2024; directly originated loans were $1.3B vs. $0.9B \u2014 indicating accelerating platform volume.\n- No single merchant exceeded 10% of total revenue in Q1 FY2025 or Q1 FY2024; commercial agreement assets tied to Amazon and Shopify warrants totaled $90.3M (down from $104.6M), with combined amortization of $14.2M in the quarter.\n\n#### Risk-factor changes\n- The filing states no material changes to risk factors versus the Annual Report on Form 10-K for fiscal year ended June 30, 2024 (filed August 28, 2024); Item 1A directs readers back to that annual filing.\n- Credit quality delinquencies rose: loans 30\u201359 days past due were $67.0M at September 30, 2024 vs. $55.0M at June 30, 2024; 90\u2013119 days past due increased to $47.8M from $38.6M, reflecting ongoing consumer credit normalization concerns flagged as a continuing macro risk.\n\n#### Material events\n- **Convertible note repurchase:** During Q1 FY2025, Affirm repurchased $140.5M aggregate principal of the 0% 2026 Notes for $120.1M cash under the December 6, 2023 Board authorization ($800M authorized through December 31, 2024), recording a $19.6M gain on extinguishment; remaining principal outstanding was ~$1.20B at September 30, 2024.\n- **Kusnier litigation:** On August 26, 2024, the U.S. District Court (N.D. Cal.) granted Affirm's motion to dismiss the second amended class action complaint with leave to amend; on September 23, 2024, plaintiffs filed a motion for reconsideration \u2014 three related derivative suits (Quiroga, Jeffries, Vallieres) remain stayed pending resolution of Kusnier.\n- **Securitization activity:** Affirm issued $750.0M in new notes via securitization trusts in Q1 FY2025 (same as Q1 FY2024); notes issued by securitization trusts grew to $3.99B from $3.24B at June 30, 2024, reflecting continued growth in off-balance-sheet funding capacity.\n\n### 8-K \u2014 2024-11-07\n\n#### Key financials\n- Q1 FY2025 (ended September 30, 2024) results were reported via Shareholder Letter attached as Exhibit 99.1; specific revenue/income figures are not reproduced in the 8-K body text.\n- As of November 1, 2024, approximately **$1.2 billion** in principal amount of 0% Convertible Senior Notes due 2026 remains outstanding.\n\n#### Segment & competitive notes\n- None noted.\n\n#### Risk-factor changes\n- None noted.\n\n#### Material events\n- **CFO transition (effective November 8, 2024):** Rob O'Hare appointed CFO, succeeding Michael Linford, who moves to COO. O'Hare's package includes a **$475,000 base salary**, 75% annual cash incentive target, **$1.25M RSU award**, and **$1.25M stock option award**, each vesting over four years.\n- **New convertible note repurchase authorization (approved November 5, 2024):** Board authorized repurchase of up to **$500 million** in aggregate principal of the 2026 Notes, effective **January 1\u2013December 31, 2025**, succeeding a prior **$800 million** authorization (expiring December 31, 2024) approved in December 2023.\n\n### 10-K \u2014 2024-08-28\n\n#### Key financials\n- FY2024 (fiscal year ended June 30, 2024): GMV of **$26.6 billion** facilitated through the platform; interest-bearing monthly installment loans represented **74% of GMV** (up from 68% in FY2023), while Pay-in-4 declined to **15%** (from 19%) and 0% APR installment loans fell to **11%** (from 13%).\n- As of December 31, 2023, aggregate market value of Class A common stock held by non-affiliates was approximately **$12.5 billion**; shares outstanding as of August 23, 2024: **267.4M Class A** and **43.7M Class B**.\n- Revolving credit facility amended **June 26, 2024**; convertible senior notes (originally issued **November 23, 2021**) partially outstanding at June 30, 2024, with a subsequent-event full repayment/redemption action noted as of **August 28, 2024**.\n- Repeat consumers drove **92% of transactions** in FY2024 (vs. 88% in FY2023); active consumers averaged **~4.9 transactions**, up ~26% year-over-year.\n\n#### Segment & competitive notes\n- Affirm operates as a **single segment**; revenue channels are Merchant Network and Virtual Card Network; 23% of FY2024 transactions originated via the Affirm marketplace/app.\n- Named competitors include **Klarna, Block** (pay-over-time), legacy card issuers (**Synchrony, JPMorgan Chase, Citi, BofA, Capital One, Bread Financial, Amex**), payment networks (**Visa, Mastercard**), and mobile wallets (**PayPal**); some merchants are increasingly offering proprietary pay-over-time options directly at checkout.\n- Active merchant count reached approximately **303,000** as of June 30, 2024; U.K. market entry (Affirm U.K. Limited, FCA-authorized) targeted for loan facilitation by **end of fiscal 2025**.\n\n#### Risk-factor changes\n- Ongoing regulatory risk around **\"true lender\" and \"valid when made\"** doctrines: state AGs of CA, IL, MA, MN, NJ, NY, NC, and DC filed suit against the FDIC over its Federal Interest Rate Authority Rule; Northern District of California upheld the FDIC rule (**Feb. 8, 2022**), but litigation risk persists; OCC's true lender rule was repealed by President Biden on **June 30, 2021**.\n- Elevated interest-rate environment explicitly cited as an ongoing macro risk, with increased negotiated interest rate spreads compressing unit economics; CFPB daily civil penalties range from **$6,323 (minor) to $1,264,622 (knowing violations)**, adjusted annually, with concurrent state AG enforcement authority confirmed by CFPB's May 2022 Interpretive Rule.\n- Concentration risk: substantially all U.S. loans originated through **Celtic Bank** (Utah, FDIC-insured) and **Lead Bank** (Missouri, FDIC-insured); loss of either bank partner would be a material disruption.\n\n#### Material events\n- **June 26, 2024**: New revolving credit facility established (prior facility terminated June 25, 2024), pricing based on Fed Funds rate, 1-month SOFR, or base rate plus applicable margin.\n- **August 28, 2024** (subsequent event): Convertible senior notes (originally issued November 23, 2021) subject to a repayment/conversion action disclosed as a subsequent event on the filing date.\n- **February 2023**: Acquisition of **Butter Holdings Ltd.** completed February 1, 2023, including a license component, with consideration recorded in FY2023; integration costs reported through FY2024.\n- FY2024 restructuring activity: residual charges under the **2023 Restructuring Plan** continued into FY2024, with severance and other exit/disposal costs recorded; headcount stood at **2,006 employees** as of June 30, 2024.\n\n### 8-K \u2014 2024-08-28\n\n## Affirm Holdings, Inc. (AFRM) \u2014 8-K Filed 2024-08-28\n\n#### Key financials\n- Filing reports Q4 fiscal year results for the quarter ended **June 30, 2024**, disclosed via Shareholder Letter (Exhibit 99.1); specific revenue, GMV, and net income figures are contained in the attached letter, not reproduced in the 8-K body.\n- Non-GAAP financial measures are included in the Shareholder Letter, with GAAP reconciliations provided therein; no standalone figures are extractable from this filing wrapper.\n\n#### Segment & competitive notes\n- None noted.\n\n#### Risk-factor changes\n- None noted.\n\n#### Material events\n- On **August 28, 2024**, Affirm issued its Q4 FY2024 Shareholder Letter covering the fiscal quarter ended **June 30, 2024**, filed under Item 2.02 (Results of Operations and Financial Condition).\n- The filing was signed by CFO **Michael Linford** on **August 28, 2024**; the Shareholder Letter (Exhibit 99.1) is incorporated by reference but is explicitly **not deemed \"filed\"** for Section 18 liability purposes.\n\n### 8-K \u2014 2024-07-01\n\n#### Key financials\n- On June 26, 2024, Affirm amended its revolving credit facility, increasing aggregate commitments from **$205 million to $330 million** (a $125 million increase).\n- Maturity extended **three years to June 26, 2027**; early maturity trigger applies if outstanding convertible notes principal \u2265 the greater of **$150 million** or the company's liquidity level, within 91 days of note maturity.\n- Borrowings are unsecured; interest at SOFR + **1.75%** or base rate + **0.75%**; unused commitment fee of **0.20% per annum**. No amounts had ever been drawn under the prior facility.\n\n#### Segment & competitive notes\n- The revolving credit facility is intended for general corporate purposes; no segment-specific allocation disclosed.\n- Affirm Card issuance relies on third-party bank partner **Evolve Bank & Trust**, highlighting dependence on external issuer relationships common in BNPL/card-linked financing models.\n\n#### Risk-factor changes\n- On **June 25, 2024**, Evolve Bank & Trust (third-party issuer of the Affirm Card) disclosed a cybersecurity incident involving unauthorized access to personal and financial information of Affirm Card users; Affirm's own systems were **not** compromised.\n- Affirm has notified law enforcement and all Affirm Card users; full scope of unauthorized access to Affirm Card user Personal Information remains **unknown as of July 1, 2024**; heightened fraud monitoring is in place.\n\n#### Material events\n- **Amendment No. 2** to the Revolving Credit Agreement executed **June 26, 2024** with Barclays Bank PLC as administrative agent; financial maintenance covenants include a maximum leverage ratio and minimum tangible net worth tested quarterly.\n- Evolve cybersecurity incident disclosed **June 25, 2024**; Affirm states it does **not expect** the incident to have a material impact on financial condition or results of operations as of the filing date, but investigation and remediation remain ongoing.\n\n### 8-K \u2014 2024-06-20\n\n## Affirm Holdings, Inc. (AFRM) \u2013 8-K Summary (Filed 2024-06-20)\n\n#### Key financials\n- None noted.\n\n#### Segment & competitive notes\n- None noted.\n\n#### Risk-factor changes\n- None noted.\n\n#### Material events\n- **Director resignation:** James D. White, Lead Independent Director, resigned from the Board effective June 30, 2024; he cited no disagreement with company operations, policies, or practices.\n- **New Lead Independent Director:** Christa S. Quarles, an existing Board member, was appointed Lead Independent Director effective July 1, 2024, succeeding White.\n- **New director appointed:** Brian D. Hughes appointed as Class III director effective July 1, 2024, with term expiring at the 2026 annual stockholder meeting; added to both Audit and Compensation Committees. Hughes brings financial services risk management experience, including serving as Chief Risk Officer at Discover Financial Services (2016\u20132021).\n- **Director compensation:** Hughes will receive an initial RSU grant valued at $500,000 (vesting annually over three years), an annual RSU grant of $200,000, and a $45,000 annual cash retainer (prorated for partial year), consistent with the company's standard non-employee director compensation program.\n"}, {"slug": "firstcash-holdings", "type": "sec-filing", "title": "FirstCash Holdings \u2014 SEC Filings", "significance": "", "significance_reason": "", "category": "", "tier": "", "segment": "", "sae": "", "partner": "", "competitor": 000840489-24-000127.htm) |\n| 8-K | 2024-10-24 | 2024-10-24 | [EDGAR](https://www.sec.gov/Archives/edgar/data/840489/000084048924000124/fcfs-20241024.htm) | [file](../../sec-filings/firstcash-holdings/2024-10-24_8-K_0000840489-24-000124.htm) |\n| 8-K | 2024-08-09 | 2024-08-08 | [EDGAR](https://www.sec.gov/Archives/edgar/data/840489/000110465924087857/tm2421249d1_8k.htm) | [file](../../sec-filings/firstcash-holdings/2024-08-09_8-K_0001104659-24-087857.htm) |\n| 8-K | 2024-07-30 | 2024-07-30 | [EDGAR](https://www.sec.gov/Archives/edgar/data/840489/000084048924000110/fcfs-20240730.htm) | [file](../../sec-filings/firstcash-holdings/2024-07-30_8-K_0000840489-24-000110.htm) |\n| 10-Q | 2024-07-29 | 2024-06-30 | [EDGAR](https://www.sec.gov/Archives/edgar/data/840489/000084048924000108/fcfs-20240630.htm) | [file](../../sec-filings/firstcash-holdings/2024-07-29_10-Q_0000840489-24-000108.htm) |\n| 8-K | 2024-07-25 | 2024-07-25 | [EDGAR](https://www.sec.gov/Archives/edgar/data/840489/000084048924000105/fcfs-20240725.htm) | [file](../../sec-filings/firstcash-holdings/2024-07-25_8-K_0000840489-24-000105.htm) |\n\n## Filing summaries\n\n### 8-K \u2014 2026-06-09\n\n## FirstCash Holdings, Inc. (FCFS) \u2014 8-K Filed June 9, 2026\n\n#### Key financials\n- None noted.\n\n#### Segment & competitive notes\n- None noted.\n\n#### Risk-factor changes\n- None noted.\n\n#### Material events\n- **Annual Meeting held June 9, 2026**: 41,687,943 of 43,836,687 eligible shares voted (95.09% participation); three directors elected to three-year terms \u2014 Daniel E. Berce (38.1M for), Mikel D. Faulkner (36.4M for), and Randel G. Owen (34.5M for), with Owen drawing the highest withhold vote (~4.8M).\n- **RSM LLP ratified** as independent auditor for fiscal year ending December 31, 2026, with strong approval (40.5M for vs. 1.1M against).\n- **Say-on-pay approved** on an advisory basis, 38.8M for vs. 1.3M against (~96.7% of votes cast in favor).\n- **Texas reincorporation approved** by conversion from Delaware, though with notably weaker support \u2014 23.6M for vs. 16.8M against (~58.4% of votes cast), indicating meaningful stockholder opposition to the domicile change.\n\n### 8-K \u2014 2026-05-12\n\n#### Key financials\n- None noted. The 8-K (filed May 11, 2026) is a Reg FD disclosure furnishing an investor presentation (Exhibit 99.1); no financial statements or specific financial figures are included in the filing text itself.\n\n#### Segment & competitive notes\n- None noted. The filing references an updated investor presentation posted to FirstCash's investor relations site (investors.firstcash.com), but no segment-level or competitive detail is contained in the 8-K text provided.\n\n#### Risk-factor changes\n- None noted. No new or amended risk factors are disclosed in this filing.\n\n#### Material events\n- On May 11, 2026, FirstCash Holdings, Inc. (FCFS, Nasdaq) filed an 8-K under Item 7.01 (Reg FD) to furnish its most recent investor presentation as Exhibit 99.1; the presentation is available at investors.firstcash.com.\n- The filing was signed by Brian D. Hostetler, SVP and Chief Accounting Officer, on May 11, 2026; as a \"furnished\" item, it is not deemed \"filed\" for Section 18 liability purposes.\n\n### 8-K \u2014 2026-05-01\n\n#### Key financials\n- On May 1, 2026, FirstCash Holdings closed a $750M private offering of 6.125% senior notes due May 1, 2034, issued through wholly-owned subsidiary FirstCash, Inc.\n- Interest accrues from May 1, 2026, payable semi-annually on May 1 and November 1 each year, with first payment due November 1, 2026.\n- Notes are unsecured senior obligations guaranteed by FirstCash Holdings and its domestic subsidiaries that guarantee its revolving credit facility and existing senior unsecured notes.\n\n#### Segment & competitive notes\n- None noted.\n\n#### Risk-factor changes\n- The Indenture imposes restrictive covenants limiting additional indebtedness, dividends, stock repurchases, investments, liens, asset transfers, mergers, and affiliate transactions, which could constrain operational and financial flexibility.\n- Mandatory repurchase obligations triggered by certain asset sales or change-of-control events represent contingent liquidity demands.\n\n#### Material events\n- Notes were sold via Rule 144A and Regulation S private placement, with Jefferies LLC serving as representative of the initial purchasers; BOKF, NA serves as trustee.\n- Prior to May 1, 2029, the Issuer may redeem all or a portion of the notes at par plus a make-whole premium, or redeem up to 40% using equity offering proceeds; callable at set redemption prices on or after May 1, 2029.\n\n### 8-K \u2014 2026-04-29\n\n### FirstCash Holdings, Inc. (FCFS) \u2014 8-K Filed April 29, 2026\n\n#### Key financials\n- On April 28, 2026, FirstCash priced an upsized private offering of **$750 million in 6.125% senior notes due 2034**.\n- The offering was described as \"upsized,\" indicating demand exceeded the originally contemplated size, though the original target amount was not disclosed in this filing.\n\n#### Segment & competitive notes\n- None noted.\n\n#### Risk-factor changes\n- The $750 million senior note issuance increases FirstCash's long-term debt load at a fixed rate of 6.125% through 2034, raising interest expense obligations relevant to competitors benchmarking capital costs in the consumer finance/lease-to-own space.\n- No explicit risk-factor disclosures were included in this Form 8-K.\n\n#### Material events\n- FirstCash announced and priced a **$750 million, 6.125% senior notes offering** on **April 28, 2026**, maturing in **2034**, via a private (Rule 144A/Reg S) placement; proceeds use was not specified in this filing.\n- The 8-K was filed under **Item 7.01 (Regulation FD)**, meaning the press release (Exhibit 99.1) is furnished but not \"filed,\" limiting Section 18 liability exposure.\n\n### 8-K \u2014 2026-04-27\n\n#### Key financials\n- FirstCash Holdings announced a private offering of **$600 million in senior notes due 2034**, disclosed via press release on **April 27, 2026**.\n- No revenue, earnings, or margin figures were included in this filing; it is limited to the debt offering announcement.\n\n#### Segment & competitive notes\n- None noted.\n\n#### Risk-factor changes\n- None noted.\n\n#### Material events\n- On **April 27, 2026**, FirstCash (FCFS) commenced a private placement of **$600M senior notes due 2034**, which would add to or refinance existing long-term debt on the balance sheet.\n- The filing was made under Item 7.01 (Regulation FD) and is **not deemed \"filed\"** for Section 18 liability purposes; Exhibit 99.1 (press release) was furnished but no pricing, use-of-proceeds detail, or covenant terms were disclosed in the body of the 8-K.\n\n### 8-K \u2014 2026-04-24\n\n## FirstCash Holdings, Inc. (FCFS) \u2013 8-K Filed April 24, 2026\n\n#### Key financials\n- None noted. (Filing is a Reg FD disclosure of an investor presentation; no financial statements or specific figures are included in the 8-K text itself.)\n\n#### Segment & competitive notes\n- None noted. (Exhibit 99.1 investor presentation was not included in the provided filing text; no segment or competitor data is extractable.)\n\n#### Risk-factor changes\n- None noted. (No new or amended risk factors disclosed in this filing.)\n\n#### Material events\n- On April 24, 2026, FirstCash Holdings, Inc. (FCFS; Nasdaq) filed an 8-K under Item 7.01 (Reg FD) to disclose that an updated investor presentation was posted to its corporate website at investors.firstcash.com.\n- The presentation is furnished as Exhibit 99.1 and is expressly **not deemed \"filed\"** under Section 18 of the Exchange Act, limiting legal liability and precluding automatic incorporation by reference into other SEC filings.\n- Filing was signed by Brian D. Hostetler, SVP and Chief Accounting Officer, as Principal Accounting Officer.\n\n### 10-Q \u2014 2026-04-24\n\n#### Key financials\n- Q1 2026 total revenue was $1.051B vs. $836.4M in Q1 2025 (+26% YoY), driven by pawn loan fees of $266.7M (+39%), retail merchandise sales of $464.8M (+25%), and wholesale scrap jewelry sales of $112.5M (+161%, benefiting from higher gold prices).\n- Net income was $107.7M ($2.43 diluted EPS) vs. $83.6M ($1.87 diluted EPS) in Q1 2025; income before taxes was $145.1M vs. $111.2M.\n- Total debt as of March 31, 2026 was $2.254B (vs. $1.707B at March 31, 2025), including $573M drawn on the $700M revolving credit facility at 6.17% SOFR-based rate; consolidated total debt ratio was 2.6x.\n- Company repurchased 261,000 shares for $50.0M at an average of $191.79/share in Q1 2026; $100M remains under the October 2025 Board-authorized $150M buyback program; declared $0.42/share Q2 2026 dividend payable May 29, 2026.\n\n#### Segment & competitive notes\n- U.K. Pawn segment (H&T, acquired August 14, 2025) contributed $101.7M revenue and $39.2M pre-tax income (39% margin) in Q1 2026, its first full comparable quarter; pawn loans were $215.4M and inventories $83.2M as of March 31, 2026.\n- AFF (Retail POS Payment Solutions) segment pre-tax income fell sharply to $25.9M from $52.3M in Q1 2025, due to lower leased merchandise balances (down 8% to $158.5M) following late-2024 bankruptcy filings of two large furniture merchant partners, and a $7.6M incremental provision for new off-balance-sheet (OBS) bank-partner loans; AFF active merchant locations grew to ~16,600 from ~14,500 at March 31, 2025.\n- Latin America pawn pre-tax income rose to $50.9M (20% margin) from $31.4M (17% margin), with constant-currency pawn loan receivables +30% and pawn fees +23%; benefited from a 14% favorable Mexican peso translation vs. prior year.\n- U.S. pawn same-store retail sales +9% and same-store pawn fees +13% in Q1 2026; gross margin on retail merchandise improved to 44% from 42%; total pawn store count reached 3,334 across U.S., Latin America, and U.K. as of March 31, 2026.\n\n#### Risk-factor changes\n- AFF introduced off-balance-sheet (\"OBS\") direct-to-consumer unsecured installment loans via a bank partner (beginning Q3 2025); as of March 31, 2026, outstanding OBS Loans were $32.9M with a $16.8M liability recognized for expected credit losses, adding a new contingent credit exposure not present in prior-year comparisons.\n- Filing cites increased trade policy uncertainty and tariff risk in the forward-looking statement disclosures, added alongside existing FX, regulatory, and consumer-demand risks; no formal new risk-factor section was added beyond standard boilerplate language per Item 1A (no changes noted).\n\n#### Material events\n- H&T Group plc acquisition closed August 14, 2025; purchase price allocation remains preliminary as of March 31, 2026, expected to be finalized by August 14, 2026; H&T's U.K. debt assumed includes a \u00a345M secured revolving facility (due December 2027) and \u00a345M in secured term loans (due 2027\u20132031) at rates of SONIA+2.4\u20133.3%, 8.37%, or 8.43%.\n- Company held gold forward sales contracts as of March 31, 2026 to deliver 51,750 ounces between April 2026 and September 2027 at a weighted-average forward price of $3,614/oz, providing revenue visibility given elevated gold prices.\n\n### 8-K \u2014 2026-04-23\n\n## FirstCash Holdings, Inc. (FCFS) \u2014 8-K Filed April 23, 2026\n\n#### Key financials\n- Q1 2026 earnings release issued April 23, 2026, covering the three-month period ended March 31, 2026; specific revenue, EPS, and net income figures are contained in Exhibit 99.1, which is not included in the truncated filing text.\n- Board declared a Q2 2026 cash dividend of **$0.42 per common share**, announced April 23, 2026.\n\n#### Segment & competitive notes\n- None noted.\n\n#### Risk-factor changes\n- None noted.\n\n#### Material events\n- FirstCash filed this 8-K under **Item 2.02** (Results of Operations and Financial Condition), signaling a routine quarterly earnings disclosure for Q1 2026.\n- The Earnings Release (Exhibit 99.1) is furnished, not filed, and therefore not subject to Section 18 liability of the Securities Exchange Act of 1934; no Q1 financial details were available in the truncated filing text provided.\n\n### 8-K \u2014 2026-03-03\n\n## FirstCash Holdings, Inc. (FCFS) \u2014 8-K Filed March 3, 2026\n\n#### Key financials\n- None noted. (Filing is a Regulation FD disclosure of an investor presentation; no financial statements or specific financial figures are included in the 8-K text itself.)\n\n#### Segment & competitive notes\n- None noted. (Exhibit 99.1 investor presentation was not provided in the filing text; no segment or competitive data is available for summary.)\n\n#### Risk-factor changes\n- None noted. (No new or amended risk factors disclosed in this filing.)\n\n#### Material events\n- On March 3, 2026, FirstCash Holdings, Inc. (FCFS; Nasdaq) filed an 8-K under Item 7.01 (Regulation FD) to furnish its most recent investor presentation, made available at investors.firstcash.com.\n- The presentation is attached as Exhibit 99.1; as furnished (not filed) material, it is not subject to Section 18 liability and does not trigger automatic incorporation by reference into Securities Act filings.\n- Filing was signed by CFO R. Douglas Orr, Executive Vice President and Principal Financial Officer, on March 3, 2026.\n\n### 10-K \u2014 2026-02-09\n\n**FirstCash Holdings, Inc. (FCFS) \u2014 10-K Summary (FY 2025, filed 2026-02-09)**\n\n---\n\n#### Key financials\n- Pawn loan fees accounted for 46% of consolidated net revenue in FY 2025; gross profit from pawn merchandise sales accounted for 39%; AFF (retail POS payment solutions) contributed 15% of consolidated net revenues.\n- Average pawn loan balance per transaction at December 31, 2025: $312 (U.S.), $112 (Latin America), $825 (U.K.); company operated 3,330 pawn stores as of December 31, 2025, up from 3,026 at the start of 2025.\n- Aggregate market cap of non-affiliate shares was approximately $5.217 billion as of June 30, 2025; shares outstanding were 43,984,696 as of January 28, 2026.\n- Debt capital structure includes 4.625% Senior Notes due 2028, 5.625% Senior Notes due 2030, and 6.875% Senior Notes due 2032 (issued February 21, 2024), plus revolving credit facility extended to 2029 (amended August 8, 2024) and secured term loans due 2027, 2029, and 2031.\n\n---\n\n#### Segment & competitive notes\n- Four reportable segments: U.S. Pawn (1,207 stores in 29 states + D.C.), Latin America Pawn (1,837 stores across Mexico, Guatemala, El Salvador, Colombia), U.K. Pawn (286 stores in England, Scotland, Wales \u2014 new in 2025 via H&T acquisition), and Retail POS Payment Solutions (AFF, U.S. only).\n- AFF operates ~16,400 active merchant partner locations; vertical mix shifted materially \u2014 automotive grew to 25% of gross transaction volumes in 2025 (vs. 19% in 2023) while furniture fell to 23% (vs. 48% in 2023); bank-originated installment loans were 45% of AFF gross transaction volumes in 2025; LTO was 43%; RISA was 12%.\n- U.S. pawn industry estimated at 12,000\u201314,000 total stores; Mexico at 8,000\u20139,000; U.K. at slightly under 1,000 \u2014 all remain highly fragmented; only two publicly-held U.S.-based pawnshop operators exist (including FCFS).\n- AFF launched a new off-balance-sheet (OBS) unsecured installment loan product in Q3 2025, fully retained by its Utah bank partner; AFF services these loans but bears credit risk only if loans become 90+ days past due.\n\n---\n\n#### Risk-factor changes\n- Materially expanded CFPB/regulatory risk disclosure: CFPB operations were suspended under Acting Directors Bessent (January 31, 2025) and then Vought (February 7\u20138, 2025); district court reinstatement order was later vacated by the D.C. Circuit on August 15, 2025; full D.C. Circuit rehearing scheduled February 24, 2026; CFPB transferred active enforcement cases to DOJ in November 2025 \u2014 outcome remains highly uncertain.\n- SDL Rule (CFPB small-dollar lending rule) took effect March 30, 2025, but CFPB announced enforcement will not be a priority and may seek to narrow its scope; state attorneys general and private litigants can still enforce it, creating ongoing compliance risk for AFF's RISA and bank loan products.\n- New trade/tariff risk added: U.S.-Mexico-Canada trade policy uncertainty, potential tariffs, and political reactions in Mexico to U.S. policy are explicitly flagged as risks to FCFS's Latin America operations and peso exposure; Mexico's federal administration conducting aggressive corporate tax/regulatory audits on U.S. companies.\n- Military Lending Act (MLA) compliance risk newly material: Company began offering MLA-compliant pawn lending to U.S. military members in 2025; MLA's 36% MAPR cap restricts certain other products from being offered to covered borrowers, adding compliance complexity and limiting addressable customer base.\n\n---\n\n#### Material events\n- **H&T Group plc acquisition completed August 14, 2025**: FCFS acquired H&T, the U.K.'s largest pawnbroker, adding 286 store locations; H&T's balance sheet and results consolidated from that date; acquisition-date fair value assigned to trade names, technology-based intangibles (with assigned useful life), and customer relationships (with assigned useful life); H&T brought a U.K. credit facility and U.K. term loans (fixed rates of 8.37% and 8.43%) onto the consolidated balance sheet.\n- **CFPB consent order settlement**: A CFPB matter against AFF was settled in July 2025; the filing indicates a maximum penalty cap associated with the settled CFPB litigation (specific dollar amount referenced in footnotes but not fully disclosed in the truncated text).\n- **\n\n### 8-K \u2014 2026-02-05\n\n## FirstCash Holdings, Inc. (FCFS) \u2014 8-K Filed February 5, 2026\n\n#### Key financials\n- Announced financial results for Q4 2025 (three months ended December 31, 2025) and full-year 2025 (twelve months ended December 31, 2025); specific revenue and earnings f ded by higher gold prices and larger loan sizes; 1,832 stores across Mexico, Guatemala, El Salvador, and Colombia.\n- **AFF merchant network grew to ~15,800 active locations** at September 30, 2025 (vs. ~13,500 at September 30, 2024), partially offsetting volume lost from the A-Freight and Conn's bankruptcies; Q3 2025 total gross transaction volume $248.8M vs. $286.1M in Q3 2024.\n\n---\n\n#### Risk-factor changes\n- **CFPB Military Lending Act litigation settled July 11, 2025**: company paid a $4.0M fine to the CFPB victims' relief fund in Q3 2025 and agreed to consumer redress estimated at no more than $7.0M; no admission of liability; new pawn product required for covered military members.\n- **Credit facility covenant relaxation for H&T integration**: May 13, 2025 amendment raised permitted leverage ratio to 3.75x EBITDA through December 31, 2025, stepping down to 3.50x through December 31, 2026, reverting to 3.25x on January 1, 2027; additional restricted-payment limits apply when leverage \u22653.0x.\n- **New U.K. operational and regulatory risk**: filing explicitly flags risks of \"operating in a new jurisdiction\" and the possibility of not realizing anticipated benefits from H&T; currency exposure to British pound sterling added to existing Mexican peso/Guatemalan quetzal/Colombian peso exposures.\n\n---\n\n#### Material events\n- **H&T Group plc acquisition closed August 14, 2025** for \u00a3289.1M ($392.4M); preliminary goodwill of $140.2M (non-deductible in the U.K.) and intangibles of $56.5M (trade name $22.1M indefinite-life, developed technology $18.1M/2-year, customer relationships $16.3M/5-year); assumed U.K. secured credit facility (\u00a345M, maturing 2027) and term loans (\u00a345M aggregate, ma\n\n### 8-K \u2014 2025-10-30\n\n## FirstCash Holdings, Inc. (FCFS) \u2014 8-K Filed October 30, 2025\n\n#### Key financials\n- Q3 2025 and nine-month period ended September 30, 2025 financial results announced via press release (Exhibit 99.1); specific re
