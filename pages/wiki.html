ouri, age 55, will join as EVP\u2013CFO effective November 10, 2025, reporting directly to CEO Fahmi Karam.\n- Compensation package includes: $675,000 annual base salary; target annual cash bonus of 60% of base (prorated for FY2025 assuming ~9 months of service, commencing March 2026); one-time RSU sign-on grant valued at $1,500,000 vesting pro rata over three years; and annual LTIP participation starting February 2026 at 170% of base salary ($1,147,500 target).\n\n### 8-K \u2014 2025-08-19\n\n## Upbound Group, Inc. (UPBD) \u2014 8-K Filed August 19, 2025\n\n#### Key financials\n- On August 19, 2025, Upbound drew ~$77 million in incremental term loan commitments, bringing total aggregate term loan borrowings to **$875 million** on the closing date.\n- Proceeds designated for fees/expenses related to the amendment and general corporate purposes, potentially including partial repayment of the revolving credit facility; no specific repayment amount disclosed.\n\n#### Segment & competitive notes\n- None noted.\n\n#### Risk-factor changes\n- The maturity date of the Term Loan Credit Agreement was extended from its prior date to **August 19, 2032** (subject to springing maturity provisions), reducing near-term refinancing risk.\n- Additional $77 million in debt increases leverage; no updated leverage metrics or covenants disclosed in this filing.\n\n#### Material events\n- Upbound executed the **Fourth Amendment to its Term Loan Credit Agreement** (originally dated February 17, 2021) on August 19, 2025, with JPMorgan Chase Bank, N.A. as administrative agent.\n- Amendment constitutes a new direct financial obligation under Item 2.03; full agreement text filed as **Exhibit 10.1**.\n\n### 10-Q \u2014 2025-07-31\n\n#### Key financials\n- **Q2 2025 revenue: $1.157B** (vs. $1.077B Q2 2024, +7.5% YoY); H1 2025 revenue: $2.334B (vs. $2.172B H1 2024, +7.5% YoY), driven primarily by Acima growth (+12% YoY in Q2) and addition of Brigit ($51.9M in Q2).\n- **Q2 2025 net earnings: $15.5M** ($0.26 diluted EPS) vs. $33.9M ($0.61) in Q2 2024; H1 2025 net earnings: $40.3M vs. $61.6M in H1 2024; compression driven by $65.5M in \"other gains and charges\" in Q2 2025 vs. $24.9M in Q2 2024, including $32.5M in legal matter accruals and $29.1M in Brigit-related charges.\n- **Total debt at June 30, 2025: ~$1.582B** (Term Loan $798M at 7.03%; ABL $334M at 6.39%; Senior Notes $450M at 6.375% due 2029); cash of $106.8M vs. $60.9M at December 31, 2024; ABL availability of $169.5M net of $46.5M letters of credit.\n- **Dividend declared Q2 2025: $0.39/share** ($0.78 YTD); bad debt expense surged to $36.7M in H1 2025 vs. $9.5M in H1 2024, largely reflecting Brigit customer cash advance losses; allowance for doubtful accounts rose to $29.6M from $13.3M at year-end 2024.\n\n#### Segment & competitive notes\n- **Acima (virtual LTO, primary competitor to Snap Finance):** Q2 2025 revenue $619.0M (+12.0% YoY); H1 2025 $1.256B (+12.8% YoY); Q2 operating profit $82.0M vs. $70.0M prior year; lease charge-offs rose to $57.6M in Q2 2025 vs. $53.2M in Q2 2024, indicating modest credit deterioration in the virtual LTO channel.\n- **Rent-A-Center (store-based LTO):** Q2 2025 revenue $467.1M (-7.1% YoY); H1 2025 $956.1M (-6.0% YoY); operating profit $63.0M vs. $71.6M Q2 2024; segment continues to shrink as Acima's virtual model gains share; 55 stores closed in H1 2024 with residual holding costs of $0.4M in H1 2025.\n- **Brigit (fintech/financial health, new segment):** Contributed $51.9M revenue and $10.5M operating profit in Q2 2025 (first full quarter post-January 31, 2025 acquisition); net advance losses of $10.4M in Q2 and $15.4M in H1 2025 on customer cash advances; H1 2025 total revenue $83.8M, net earnings $10.8M since acquisition date.\n- **FlexShopper** filed a patent infringement lawsuit against Upbound/Acima on September 30, 2024 (5 patents, e-commerce LTO technology); also filed a similar suit against **Katapult Holdings**; Upbound filed motions to dismiss (February 2025) and transfer venue (April 2025), both pending \u2014 relevant competitive/litigation signal for the virtual LTO market.\n\n#### Risk-factor changes\n- **Significantly elevated legal liability:** Legal accruals increased to $52.4M at June 30, 2025 from $20.7M at December 31, 2024; $41.7M in new legal accruals booked in H1 2025 (vs. $0.7M in H1 2024) driven by the 40-state AG multi-state investigation into Acima's practices and the NYAG lawsuit (filed August 14, 2024); both matters remain unresolved with potential for additional monetary payments and mandatory business practice changes.\n- **McBurnie class action settled in principle post-quarter:** In late July 2025, parties agreed to a $14.0M cash settlement (substantially reserved at June 30, 2025) for the California processing-fee class action; subject to court approval \u2014 reduces one tail risk but does not resolve NYAG or multi-state AG matters.\n- **Tax rate increase and legislative uncertainty:** Effective tax rate rose to 31.0% in H1 2025 from 22.0% in H1 2024 due to non-deductible Brigit acquisition expenses; the One Big Beautiful Bill Act (signed July 4, 2025) reinst\n\n### 8-K \u2014 2025-07-31\n\n#### Key financials\n- 8-K filed July 31, 2025 announces Q2 2025 (quarter ended June 30, 2025) financial results via press release and earnings release (Exhibits 99.1 and 99.2); specific revenue, EPS, or EBITDA figures are not included in the 8-K body text itself.\n- Financial detail is contained in attached exhibits (99.1, 99.2, 99.3) which were not provided in the filing text; no numeric results can be confirmed from this document alone.\n\n#### Segment & competitive notes\n- None noted.\n\n#### Risk-factor changes\n- None noted.\n\n#### Material events\n- Upbound Group, Inc. (NASDAQ: UPBD) filed an 8-K on July 31, 2025 under Items 2.02 and 7.01, disclosing Q2 2025 earnings results and an accompanying investor presentation (Exhibit 99.3).\n- Fahmi W. Karam signed the filing in a dual role as both Chief Executive Officer and Chief Financial Officer, suggesting continued combined leadership of those two functions as of July 31, 2025.\n- Exhibits 99.1, 99.2, and 99.3 are furnished but explicitly not \"filed\" for Section 18 liability or incorporation-by-reference purposes under the Securities Act of 1933.\n\n### 8-K \u2014 2025-06-03\n\n#### Key financials\n- None noted.\n\n#### Segment & competitive notes\n- None noted.\n\n#### Risk-factor changes\n- None noted.\n\n#### Material events\n- On June 3, 2025, Upbound Group, Inc. (UPBD) held its 2025 Annual Meeting of Stockholders; all three proposals passed.\n- All seven director nominees were elected/re-elected, with vote totals ranging from ~46.5M to ~47.2M votes in favor out of ~52.4M shares voting; Jeffrey Brown and Glenn Marino received the most opposition (~670K and ~779K votes against, respectively).\n- Deloitte & Touche LLP was ratified as independent auditor for the year ending December 31, 2025, with 52,277,101 votes for and only 77,899 against.\n- Advisory \"say-on-pay\" vote on 2024 named executive officer compensation passed with 46,396,548 votes for and 866,171 against (~1.8% opposition among votes cast).\n\n### 10-Q \u2014 2025-05-02\n\n#### Key financials\n- Q1 2025 total revenues were $1.176 billion vs. $1.096 billion in Q1 2024 (+7.3% YoY), driven largely by Acima segment growth (+$75.9M) and $31.9M of new Brigit subscription/fee revenue; net earnings were $24.8M ($0.42 diluted EPS) vs. $27.7M ($0.50) in Q1 2024, with the decline partly attributable to elevated \"other gains and charges\" of $43.3M (vs. $26.8M prior year) and a higher effective tax rate of 30.2% vs. 15.0%.\n- Total debt at March 31, 2025 stood at $1.549 billion ($800.1M Term Loan at 7.04%; $299.0M ABL at 6.42%; $450M Senior Notes at 6.375%), up materially from $1.311 billion at December 31, 2024, reflecting $459M in new borrowings used to fund the Brigit cash acquisition; remaining ABL borrowing capacity was $204.5M net of $46.5M in letters of credit.\n- Operating cash flow was $137.7M in Q1 2025 (vs. $45.4M in Q1 2024), boosted by favorable working capital timing; cash ended the quarter at $107.3M vs. $60.9M at year-end 2024 after $274.9M net acquisition cash outflow.\n- Dividend declared was $0.39/share in Q1 2025 (vs. $0.37 in Q1 2024); no share repurchases were made, with $235.0M remaining under the December 2021 $500M buyback authorization.\n\n#### Segment & competitive notes\n- Acima (virtual LTO, primary Snap Finance competitor) was the strongest-growing segment: revenues up 13.5% to $637.3M and operating profit up 41.6% to $73.7M in Q1 2025; lease charge-offs (LCOs) of $56.7M were slightly elevated vs. $53.9M in Q1 2024 but operating margin improved meaningfully, signaling better credit/portfolio performance relevant to Snap's competitive positioning.\n- Rent-A-Center (store-based LTO) saw revenues decline 4.9% to $489.0M and operating profit fall 15.0% to $66.4M in Q1 2025, consistent with continued secular pressure on brick-and-mortar LTO; LCOs improved modestly to $20.4M from $22.1M.\n- Newly added Brigit segment (financial health/EWA, acquired January 31, 2025 for ~$392.6M total consideration) contributed $31.9M in subscription/fee revenues and $8.8M in segment operating profit for the ~2-month period January 31\u2013March 31, 2025; net advance losses were $5.0M on $48.6M in customer cash advance receivables\u2014a new consumer lending risk exposure for Upbound that competes directly with EWA and fintech players in Snap's adjacent market.\n- FlexShopper filed a patent infringement suit against Acima on September 30, 2024 in the Eastern District of Texas, alleging infringement of five patents related to e-commerce LTO technology; Upbound filed a motion to dismiss in February 2025, outcome pending\u2014relevant as FlexShopper simultaneously sued Katapult, suggesting broad industry IP pressure on virtual LTO platforms.\n\n#### Risk-factor changes\n- The CFPB voluntarily dismissed with prejudice its lawsuit against Acima on March 6, 2025 (filed July 2024), with no monetary payment or business practice changes required, removing the single largest regulatory overhang; however, the $45M Acima acquisition escrow was released to former Acima owners as a result.\n- The 40-state Attorneys General multi-state investigation into Acima's LTO practices remains active and unresolved; Upbound recorded $10.0M in new legal accruals in Q1 2025 (total accrual $20.7M at March 31, 2025) and continues to resist the Multistate's \"unsupportable\" monetary demands, with potential for state-level litigation if no settlement is reached.\n- Brigit integration adds new regulatory risk categories explicitly cited: reliance on regulated bank partners, third-party data providers, and compliance with consumer lending/EWA regulations\u2014distinct from the LTO regulatory framework Upbound has historically managed.\n\n#### Material events\n- Upbound closed the acquisition of Bridge IT, Inc. (\"Brigit\") on January 31, 2025 for total purchase consideration of ~$392.6M (comprising ~$274.8M cash, ~$41.1M stock at closing, plus ~$66.1M fair-valued deferred consideration payable in two installments on the first and second anniversaries of closing, and ~$10.6M fair-valued earnout of up to $60M based on 2026\n\n### 8-K \u2014 2025-05-01\n\n#### Key financials\n- Upbound Group filed an 8-K on May 1, 2025 announcing Q1 2025 financial results for the quarter ended March 31, 2025; specific revenue, EPS, and EBITDA figures are contained in Exhibits 99.1 and 99.2, which are not reproduced in the filing text.\n- No financial metrics (revenue, net income, margins, or guidance) are disclosed within the body of this 8-K form itself.\n\n#### Segment & competitive notes\n- None noted.\n\n#### Risk-factor changes\n- None noted.\n\n#### Material events\n- On May 1, 2025, Upbound Group (UPBD) issued a press release and earnings release (Exhibits 99.1 and 99.2) reporting Q1 2025 results; an investor presentation (Exhibit 99.3) was simultaneously disclosed under Regulation FD.\n- The filing was signed by Fahmi W. Karam, EVP and CFO, on May 1, 2025; exhibits are furnished but explicitly not \"filed\" for purposes of Section 18 of the Exchange Act or incorporation by reference under the Securities Act of 1933.\n\n### 8-K \u2014 2025-03-07\n\n#### Key financials\n- None noted. This 8-K contains no financial statements, earnings data, or guidance updates.\n\n#### Segment & competitive notes\n- The disclosed event directly concerns Acima Leasing, Upbound's virtual lease-to-own / point-of-sale financing segment, which competes directly with Snap Finance.\n- Acima will pay **no money**, make **no business-practice changes**, and face **no injunctive or other relief** as a result of the CFPB lawsuit dismissal \u2014 removing a significant regulatory overhang from a key Snap competitor.\n\n#### Risk-factor changes\n- The CFPB voluntarily dismissed **with prejudice** its lawsuit against Acima (filed in the U.S. District Court, District of Utah, 2024), ending a multi-year investigation that predated Upbound's **2021 acquisition** of Acima; dismissal with prejudice bars re-filing of the same claims.\n- Acima simultaneously agreed to dismiss its own counter-suit against the CFPB (filed in the U.S. District Court, Eastern District of Texas) that challenged the CFPB's authority to pursue claims against it \u2014 mutual dismissals close both legal fronts as of **March 6, 2025**.\n\n#### Material events\n- On **March 6, 2025**, Upbound Group (NASDAQ: UPBD) announced via press release (Exhibit 99.1) the mutual dismissal of both the CFPB's lawsuit against Acima and Acima's counter-suit against the CFPB.\n- Disclosure was made under Item 7.01 (Reg FD) and Item 8.01 (Other Events), meaning the press release is **furnished but not filed** and does not carry Section 18 liability.\n\n### 8-K \u2014 2025-02-28\n\n#### Key financials\n- None noted.\n\n#### Segment & competitive notes\n- None noted.\n\n#### Risk-factor changes\n- None noted.\n\n#### Material events\n- On February 24, 2025, Upbound Group's Audit and Risk Committee dismissed Ernst & Young LLP as independent auditor following a formal competitive review of multiple accounting firms.\n- Deloitte & Touche LLP was appointed to audit financial statements for the fiscal year ending December 31, 2025; E&Y was formally notified on February 25, 2025.\n- E&Y's audit reports for fiscal years ended December 31, 2023 and 2024 contained no adverse opinions, disclaimers, qualifications, or reportable events; no disagreements with management were noted in either year.\n- E&Y confirmed agreement with Upbound's disclosures via a letter to the SEC dated February 28, 2025 (filed as Exhibit 16.1).\n\n### 10-K \u2014 2025-02-25\n\n#### Key financials\n- FY2024 total consolidated revenues split approximately 52% Acima segment and 43% Rent-A-Center segment; Mexico and Franchising comprised the remainder; specific dollar revenue figures were not included in the truncated filing text provided.\n- As of December 31, 2024, Rent-A-Center operated 1,728 company-owned U.S./Puerto Rico stores (down from 1,839 at end of 2023) and Mexico operated 132 stores (up from 131); total company locations fell to 2,308 from 2,410.\n- On September 9, 2024, the company completed a divestiture of a portion of the Rent-A-Center segment (RentACenterDivestitureMember); specific proceeds not detailed in the truncated text.\n- As of June 30, 2024, aggregate market cap of non-affiliate shares was ~$1.65 billion (53.7M shares at closing price); shares outstanding as of February 18, 2025 were 57.4M.\n\n#### Segment & competitive notes\n- Acima (~52% of 2024 revenue) competes against other virtual lease-to-own providers, BNPL/fintech companies, and online retailers; the company cites lower barriers to entry in the virtual LTO space as a structural competitive risk.\n- Rent-A-Center (~43% of 2024 revenue) continued store consolidation, reducing U.S./PR locations by 111 stores year-over-year (1,839\u21921,728); Franchising grew to 448 stores across 29 states (up from 440 in 2023).\n- Top merchandise suppliers remain concentrated: Ashley Furniture Industries ~39% and Whirlpool ~16% of 2024 merchandise purchases; no other brand exceeded 10%.\n\n#### Risk-factor changes\n- New risks added in 2025 filing explicitly related to the January 31, 2025 Brigit acquisition, including FTC settlement compliance obligations carried over by Brigit, earned wage access (EWA) regulatory risk, and Brigit's reliance on regulated bank partners and third-party data providers.\n- Tariff risk newly elevated: filing explicitly calls out potential U.S. Presidential Administration tariffs on imported goods and retaliatory tariffs by trading partners as a new inflationary and supply-chain pressure on merchandise costs and consumer disposable income.\n- CFPB enforcement risk remains active: pending litigation against Acima subsidiary by the CFPB, plus ongoing multi-state and New York AG investigations into Acima business practices, cited as material unresolved legal risk.\n\n#### Material events\n- On January 31, 2025, Upbound completed the acquisition of Brigit (Bridge IT, Inc.), a financial health technology company offering earned wage access, credit building, and budgeting tools; consideration details were not fully disclosed in the truncated text but transaction fees were separately tracked as a non-recurring charge in 2024.\n- On September 9, 2024, the company divested a portion of Rent-A-Center store operations; the divestiture is classified as a disposal by sale (not discontinued operations) per the filing.\n- Term loan was amended on May 28, 2024 (SOFR-based repricing) and the revolving credit facility was modified on June 7, 2024; $500M share repurchase program remained active through December 31, 2024 with remaining capacity not fully specified in truncated text.\n\n### 8-K \u2014 2025-02-20\n\n#### Key financials\n- Upbound Group announced Q4 and full-year fiscal 2024 financial results via press release on February 20, 2025 (fiscal year ended December 31, 2024); specific figures are contained in Exhibits 99.1\u201399.3, which are not reproduced in the 8-K body.\n- An investor presentation (Exhibit 99.3) was simultaneously issued on February 20, 2025, covering the same Q4/FY2024 results.\n- None noted beyond the above; no income, revenue, or EPS figures appear in the 8-K text itself.\n\n#### Segment & competitive notes\n- None noted. The 8-K body contains no segment-level or competitive commentary; operational detail is deferred to the attached earnings release (Exhibit 99.2).\n\n#### Risk-factor changes\n- None noted. No amendments to risk factors are disclosed in this filing.\n\n#### Material events\n- CEO succession announced February 20, 2025: Mitchell E. Fadel will retire as CEO and Board member effective June 1, 2025; he receives no cash severance but retains equity-award treatment per a prior April 3, 2024 letter agreement.\n- CFO Fahmi Karam (age 46) appointed CEO effective June 1, 2025 under an Employment Agreement dated February 19, 2025; compensation includes $1.1M annual base salary, 150% target annual cash bonus, and 450% target annual equity award; severance equals 2\u00d7 (salary + target bonus) payable over 24 months (lump sum on change-in-control), plus up to 24 months of benefit continuation.\n- Chief Technology and Digital Officer Sudeep Gautam departed effective February 18, 2025; he will receive payments and benefits under his existing Executive Transition Agreement.\n\n### 8-K \u2014 2025-02-05\n\n#### Key financials\n- Upbound paid ~$278.67 million in closing cash consideration plus ~2.69 million shares of common stock (par $0.01) to Brigit securityholders on January 31, 2025.\n- Deferred cash consideration of $75 million is payable in two equal installments of $37.5 million: first due 30 days after January 31, 2026, second due no later than 30 days after January 31, 2027.\n- Up to $60 million in additional earnout payments may be owed based on Brigit's 2026 financial performance metrics.\n\n#### Segment & competitive notes\n- Brigit (Bridge IT, Inc.) is a fintech/consumer finance platform; its acquisition expands Upbound's offerings beyond its core rent-to-own (Rent-A-Center) segment into app-based financial services for underserved consumers.\n- Co-founders Zuben Mathews (CEO) and Hamel Kothari (CTO) are being retained under restricted stock vesting schedules (10% at 6 months, 55% at 1 year, 100% at 2 years post-closing), signaling reliance on key personnel for integration.\n\n#### Risk-factor changes\n- Filing explicitly flags increased leverage risk from acquisition debt, including higher interest expense and financial covenant restrictions.\n- Integration risk is highlighted: failure to retain personnel, maintain commercial relationships, or realize expected synergies from a transaction of this size are cited as material concerns.\n\n#### Material events\n- Acquisition of Bridge IT, Inc. (Brigit) closed January 31, 2025, pursuant to the Merger Agreement dated December 12, 2024; Upbound filed this 8-K on February 5, 2025.\n- Brigit shares were issued without Securities Act registration under Section 4(a)(2)/Regulation D; a Registration Rights Agreement dated January 31, 2025 grants securityholders shelf registration rights for resale to the extent Rule 144 is unavailable.\n- Audited financial statements and pro forma financials for Brigit are not yet filed; they are due by amendment no later than 71 days after February 5, 2025 (approximately April 17, 2025).\n\n### 8-K \u2014 2024-12-12\n\n#### Key financials\n- Upbound Group (UPBD) agreed to acquire Brigit (Bridge IT, Inc.) for up to **$460M total consideration**: $243.75M cash + $81.25M in UPBD stock (or cash at Upbound's election) at closing, plus $75M in deferred payments (two installments at 12 and 24 months post-close), plus up to $60M in earnout tied to Brigit's 2026 financial performance.\n- Deferred consideration split: **$37.5M** due 30 days after the first anniversary of closing; remaining **$37.5M** due no later than 30 days after the second anniversary.\n- Stock consideration valued at **$81.25M** based on 10-day VWAP prior to closing; to be issued under Section 4(a)(2)/Regulation D exemptions.\n\n#### Segment & competitive notes\n- Brigit is a fintech/cash-advance/financial wellness app \u2014 this acquisition would expand Upbound's existing Acima virtual lease-to-own and Rent-A-Center segments into **digital financial services for underserved consumers**, a direct competitive move against players like EarnIn, Dave, and MoneyLion.\n- Co-founders Zuben Mathews (CEO) and Hamel Kothari (CTO) are being retained under new employment agreements effective at closing, with their stock consideration subject to a **vesting schedule**: 10% at 6 months, 45% at 12 months, 45% at 24 months post-close.\n\n#### Risk-factor changes\n- Filing explicitly flags **increased leverage risk** from additional debt needed to fund the $243.75M+ cash consideration, with potential impact on interest expense and financial covenants.\n- Regulatory/antitrust risk noted: closing requires **HSR Act clearance** and other regulatory approvals; deal terminates if not closed by **April 1, 2025**.\n- Integration risk highlighted, including retention of key personnel and maintaining commercial relationships during the transition period.\n\n#### Material events\n- Upbound Group entered into the **Agreement and Plan of Merger** with Brigit on **December 12, 2024**; Merger Sub (Fortuna Merger Sub, Inc.) will merge into Brigit, with Brigit surviving as a wholly owned subsidiary.\n- Company simultaneously issued a **press release and investor presentation** on December 12, 2024 disclosing the transaction under Regulation FD (Exhibits 99.1 and 99.2); representations and warranties will **not survive closing**, with a rep & warranty insurance policy arranged.\n\n### 10-Q \u2014 2024-10-31\n\n#### Key financials\n- Q3 2024 total revenues were $1.069B vs. $979.1M in Q3 2023 (+9.2% YoY); nine-month revenues were $3.241B vs. $2.974B (+9.0% YoY), driven primarily by Acima segment growth of ~$256.9M for the nine-month period.\n- Q3 2024 net earnings were $30.9M ($0.55 diluted EPS) vs. $4.4M ($0.08) in Q3 2023; nine-month net earnings were $92.5M ($1.66 diluted EPS) vs. $6.1M ($0.11), with the effective tax rate falling to 24.9% from 76.1% due to reduced Acima equity consideration vesting expense.\n- Operating cash flow was $166.7M for the nine months ended September 30, 2024 vs. $219.9M in the prior-year period; cash on hand was $85.1M and total debt was ~$1.3B (Term Loan $804.5M + Senior Notes $450M) at September 30, 2024.\n- Quarterly dividend declared at $0.37/share (Q4 2024), paid October 22, 2024; no share repurchases were made in the nine months ended September 30, 2024 vs. ~$27.1M in the prior-year period.\n\n#### Segment & competitive notes\n- Acima (virtual lease-to-own, primary competitor-relevant segment) generated Q3 2024 revenues of $566.2M vs. $475.2M (+19.1% YoY) and nine-month revenues of $1.680B vs. $1.423B (+18.1% YoY), driven by higher GMV from increased third-party retailer locations, productivity, and expanded direct-to-consumer offerings; segment operating profit for nine months was $185.9M vs. $175.1M.\n- Rent-A-Center segment Q3 2024 revenues were $458.7M vs. $453.6M (+1.1%); nine-month same-store sales grew 1.9%, with e-commerce representing ~26% of lease-to-own revenues in both 2024 and 2023 nine-month periods.\n- On September 9, 2024, Upbound refranchised 55 Rent-A-Center stores in New York and New Jersey for ~$19.1M cash consideration, recording a net gain of ~$3.1M; Franchising segment nine-month revenues declined $9.4M to $81.1M, primarily due to lower merchandise sales.\n- FlexShopper, Inc. filed a patent infringement lawsuit against Upbound/Acima on September 30, 2024, and simultaneously filed a similar suit against Katapult Holdings, Inc., targeting online lease-to-own transaction technology; Upbound intends to vigorously defend.\n\n#### Risk-factor changes\n- The CFPB filed suit against Acima on July 26, 2024 (U.S. District Court, District of Utah), and Acima counter-filed against the CFPB on July 22, 2024 (Eastern District of Texas); the CFPB's initial monetary settlement demand exceeded the remaining $45M acquisition holdback \"by a substantial amount,\" creating potential for material financial exposure beyond escrowed funds.\n- The multi-state attorneys general investigation (40 states + D.C.) escalated in 2024: Multistate presented findings in March 2024, Acima responded in May 2024, and a settlement proposal was received in Q2 2024; Acima recorded $8.2M in legal settlement reserves for nine months ended September 30, 2024, plus $3.5M in litigation/defense expenses; the New York AG filed suit on August 14, 2024 despite active settlement discussions.\n- The McBurnie class action (California processing fee claims) was reset for trial in October 2025 after the U.S. Supreme Court denied Acima's certiorari petition in October 2024, removing a key procedural defense.\n\n#### Material events\n- On May 28, 2024, Upbound repriced its Term Loan Facility, reducing the applicable margin by 50 bps (from 3.25% to 2.75% over SOFR), incurring $6.6M in total debt refinancing charges; the ABL Credit Facility was simultaneously extended to June 7, 2029, with $494.4M of available borrowing capacity remaining at September 30, 2024.\n- Acima's restricted stock agreements issued to former Acima Holdings owners (valued at $414.1M) were fully vested during Q1 2024, eliminating a significant recurring non-cash charge; nine-month 2024 expense for these awards was $4.9M vs. $128.1M in the comparable prior-year period (which included $78.4M of accelerated vesting for founder Aaron Allred).\n- A CEO letter agreement dated April 3,\n\n### 8-K \u2014 2024-10-31\n\n#### Key financials\n- 8-K filed October 31, 2024 announces Q3 2024 financial results for the period ended September 30, 2024; actual figures contained in Exhibits 99.1 and 99.2 (not included in truncated filing text).\n- No specific revenue, earnings, or guidance figures are extractable from the 8-K body itself; full detail requires review of the attached press release (Exhibit 99.1) and earnings release (Exhibit 99.2).\n\n#### Segment & competitive notes\n- None noted.\n\n#### Risk-factor changes\n- None noted.\n\n#### Material events\n- Upbound Group, Inc. (NASDAQ: UPBD) issued a press release and earnings release on October 31, 2024 reporting Q3 2024 results (Exhibits 99.1 and 99.2).\n- An investor presentation was simultaneously released under Regulation FD on October 31, 2024 (Exhibit 99.3); all three exhibits are incorporated by reference but not deemed \"filed\" under Section 18 of the Exchange Act.\n- CFO Fahmi W. Karam signed the filing on behalf of the registrant on October 31, 2024.\n\n### 8-K \u2014 2024-09-10\n\n#### Key financials\n- None noted.\n\n#### Segment & competitive notes\n- None noted.\n\n#### Risk-factor changes\n- None noted.\n\n#### Material events\n- Effective September 10, 2024, Upbound Group, Inc. (NASDAQ: UPBD) appointed Charu Jain as a new independent director to its Board; she will stand for re-election at the 2025 annual stockholder meeting.\n- Jain currently serves as SVP of Merchandising and Innovation at Alaska Air Group (NASDAQ: ALK), where she has worked since 2017; prior roles include VP/CIO at Alaska Air Group and leadership positions at IBM, Pacific Gas & Electric, United Airlines, and PwC.\n- As a non-employee director, Jain will receive an annual cash retainer of $85,000 and an annual DSU grant valued at $145,000 (as of grant date), plus optional DSU deferral with a 25% company match on deferred cash retainers and dividends.\n- No related-person transactions requiring disclosure under Item 404(a) of Regulation S-K were identified in connection with Jain's appointment.\n\n### 10-Q \u2014 2024-08-01\n\n#### Key financials\n- **Q2 2024 revenue:** $1,076.5M (+9.9% vs. Q2 2023's $979.2M); H1 2024 revenue $2,172.5M (+8.9% vs. H1 2023's $1,995.2M), driven primarily by Acima segment growth of ~$165.9M for the half.\n- **Q2 2024 net earnings:** $33.9M vs. net loss of $(45.6)M in Q2 2023; H1 2024 net earnings $61.6M vs. $1.7M in H1 2023; effective tax rate improved to 22.0% for H1 2024 vs. 128.6% in H1 2023, largely due to reduced Acima acquisition stock compensation charges.\n- **Operating cash flow:** $60.5M for H1 2024 vs. $142.0M in H1 2023; cash at June 30, 2024 was $82.5M vs. $93.7M at December 31, 2023; total debt ~$1.3B ($806.7M Term Loan, $79.0M ABL, $450.0M Senior Notes).\n- **Dividends:** $0.37/share declared for Q2 2024 (vs. $0.34 in Q2 2023); $0.37/share declared for Q3 2024 on June 5, 2024, paid July 9, 2024; no share repurchases in H1 2024; ~$235.0M remains available under the $500M repurchase authorization.\n\n#### Segment & competitive notes\n- **Acima** (virtual/point-of-sale LTO, direct Snap Finance competitor): Q2 2024 revenue $552.8M (+19.1% vs. $464.4M in Q2 2023); H1 2024 revenue $1,114.1M (+17.5% vs. $948.2M); growth driven by higher GMV from increased retail partner locations, greater lease productivity per partner, and expanded direct-to-consumer channels; Q2 operating profit $70.0M vs. $63.1M prior year; merchandise losses (LCOs) rose ~$12.7M in Q2 2024, pressuring non-labor operating expenses.\n- **Rent-A-Center** (store-based LTO): Q2 2024 revenue $474.9M (+1.9% vs. $466.2M); H1 same-store sales +1.6%; Q2 operating profit $67.0M vs. $78.9M prior year, declining due to higher non-labor operating expenses; e-commerce represented ~26% of lease-to-own revenues in both H1 2024 and H1 2023; 55 Rent-A-Center stores closed in H1 2024, generating $5.4M in lease impairment charges.\n- **Mexico & Franchising:** Mexico H1 revenues +15.5% to $41.4M, same-store sales +7.4%; Franchising H1 revenues declined 6.2% to $56.2M on lower merchandise sales to franchisees, with operating profit falling to $7.9M vs. $9.7M in H1 2023.\n- **Competitive landscape noted:** Filing references intensifying competition from traditional LTO players, virtual LTO competitors, online retailers, Buy-Now-Pay-Later and other fintech companies, and subprime lenders as ongoing risk factors.\n\n#### Risk-factor changes\n- **CFPB litigation materially escalated:** Post-Q1 2024 filing, CFPB granted \"sue or settle\" authority; settlement negotiations failed; on July 22, 2024, Acima preemptively sued CFPB in U.S. District Court for the Eastern District of Texas; on July 26, 2024, CFPB filed suit against Acima and its former founder in U.S. District Court for the District of Utah, seeking injunctive relief, unspecified monetary relief, and civil penalties. The $45M escrow holdback from the Acima acquisition is explicitly noted as potentially insufficient, as CFPB's initial monetary demand \"exceeded the remaining $45M holdback by a substantial amount.\"\n- **Multi-state AG investigation advanced:** In March 2024, 40-state AG coalition presented findings to Acima; Acima responded in May 2024; post-Q1 filing, Acima received a settlement proposal it considers \"unsupportable\"; no resolution reached as of filing date; individual states may commence litigation if no settlement is achieved.\n- **New York AG investigation ongoing:** NYAG made an initial monetary demand in March 2024; Acima submitted a counter-proposal; parties are currently focused on non-monetary terms; NYAG has signaled intention to file suit if no acceptable settlement is reached.\n\n#### Material events\n- **Term Loan repriced May 28, 2024:** Third Amendment reduced applicable margin by 50 bps from 3.25% to 2.75\n\n### 8-K \u2014 2024-08-01\n\n#### Key financials\n- 8-K filed August 1, 2024 announces Q2 2024 financial results for the period ended June 30, 2024; actual figures are contained in Exhibits 99.1 and 99.2, which are not reproduced in the filing text.\n- No specific revenue, earnings, or guidance figures are included in the body of this 8-K form.\n\n#### Segment & competitive notes\n- None noted. No segment-level detail or competitor commentary is present in the filing body; any such information would be in the attached exhibits.\n\n#### Risk-factor changes\n- None noted. This is a results-disclosure 8-K (Items 2.02 and 7.01 only); no risk-factor updates were filed.\n\n#### Material events\n- Upbound Group, Inc. (Nasdaq: UPBD) reported Q2 2024 results via press release and earnings release on August 1, 2024 (Exhibits 99.1 and 99.2).\n- An investor presentation (Exhibit 99.3) was simultaneously released under Regulation FD on August 1, 2024.\n- Filing was signed by Fahmi W. Karam, EVP and CFO, on August 1, 2024; exhibits are furnished but not \"filed\" for Exchange Act Section 18 liability purposes.\n\n### 8-K \u2014 2024-07-23\n\n#### Key financials\n- None noted.\n\n#### Segment & competitive notes\n- Acima Digital, LLC and Acima Holdings, LLC (collectively \"Acima\"), Upbound Group's virtual lease-to-own segment, filed suit on July 22, 2024 against the CFPB in the U.S. District Court for the Eastern District of Texas, challenging the CFPB's statutory authority to regulate lease-to-own transactions \u2014 directly relevant to Snap Finance as a competing LTO/point-of-sale financing provider facing the same regulatory environment.\n- The lawsuit stems from a previously disclosed CFPB investigation into Acima's products, services, and practices, signaling active federal regulatory scrutiny of the broader virtual LTO industry.\n\n#### Risk-factor changes\n- The CFPB's assertion of jurisdiction over lease-to-own transactions represents a material regulatory risk for the entire LTO sector; Acima's legal challenge (filed July 22, 2024, Eastern District of Texas) could set precedent affecting Snap Finance's own compliance obligations and product structure.\n- Outcome of this litigation could either limit or confirm CFPB authority over LTO products industry-wide; no timeline for resolution was disclosed.\n\n#### Material events\n- On July 22, 2024, Acima filed a federal lawsuit against the CFPB challenging its authority to regulate lease-to-own transactions; the filing was disclosed via 8-K (Item 7.01, Reg FD) the same day, signed by General Counsel Bryan Pechersky.\n- The press release (Exhibit 99.1) was not deemed \"filed\" under Section 18 of the Securities Exchange Act of 1934 and carries no Section 11/12 liability; no financial statements or new capital transactions were included.\n"}]</script>

// ─── Helpers ─────────────────────────────────────────────────────────────────
function sanitize(html) {
  if (typeof window !== 'undefined' && window.DOMPurify) {
    return window.DOMPurify.sanitize(html, { ADD_ATTR: ['target', 'data-slug'] });
  }
  return html;
}

function SafeHTML({ html, className, onRef }) {
  const ref = useRef(null);
  useEffect(() => {
    if (!ref.current) return;
    const clean = sanitize(html);
    const parsed = new DOMParser().parseFromString('<div>' + clean + '</div>', 'text/html');
    const wrapper = parsed.body.firstChild;
    while (ref.current.firstChild) ref.current.removeChild(ref.current.firstChild);
    if (wrapper) {
      while (wrapper.firstChild) ref.current.appendChild(wrapper.firstChild);
    }
    if (onRef) onRef(ref.current);
  }, [html]);
  return React.createElement('div', { ref, className });
}

function slugifyHeading(text) {
  return text.toLowerCase().replace(/[^\w\s-]/g, '').replace(/\s+/g, '-').replace(/-+/g, '-').replace(/^-|-$/g, '');
}

function renderMarkdown(content) {
  let body = content;
  let fm = {};
  if (content.startsWith('---')) {
    const end = content.indexOf('---', 3);
    if (end !== -1) {
      content.slice(3, end).trim().split('\n').forEach(line => {
        const idx = line.indexOf(':');
        if (idx === -1) return;
        const key = line.slice(0, idx).trim();
        let val = line.slice(idx + 1).trim();
        if ((val.startsWith('"') && val.endsWith('"')) || (val.startsWith("'") && val.endsWith("'"))) val = val.slice(1, -1);
        fm[key] = val;
      });
      body = content.slice(end + 3).trim();
    }
  }
  const processed = body.replace(/\[\[([^\]|]+?)(?:\|([^\]]+))?\]\]/g, (_, slug, label) => {
    const display = label || slug;
    const clean = slug.trim();
    if (PAGE_MAP[clean]) return '<span class="wikilink" data-slug="' + clean + '">' + display + '</span>';
    return '<span class="wikilink-dead" title="Not found: ' + clean + '">' + display + '</span>';
  });
  return { fm, bodyHtml: marked.parse(processed) };
}

function fixHeadingIds(el) {
  if (!el) return;
  el.querySelectorAll('h1, h2, h3, h4, h5, h6').forEach(h => {
    h.setAttribute('id', slugifyHeading(h.textContent));
  });
}

function buildWikiText() {
  return RAW_PAGES.map(page => {
    const meta = [page.type.toUpperCase()];
    if (page.significance) meta.push(page.significance.toUpperCase());
    if (page.date) meta.push(page.date);
    if (page.sae) meta.push('SAE:' + page.sae.replace(/\[\[|\]\]/g, ''));
    let body = page.content;
    if (body.startsWith('---')) { const end = body.indexOf('---', 3); if (end !== -1) body = body.slice(end + 3).trim(); }
    return '[' + meta.join(' | ') + ']\nTitle: ' + page.title + '\n\n' + body;
  }).join('\n\n---\n\n');
}

// ─── Claude API (Flask CORS proxy) ──────────────────────────────────────────
// Snap Finance org disables Anthropic browser CORS, so the wiki POSTs to a
// Flask proxy on R Connect that forwards to api.anthropic.com. The api_key
// travels in the request body; the proxy strips it and sets x-api-key.
const PROXY_BASE = document.querySelector('meta[name="wiki-proxy-url"]')?.content || '';
const EMBEDDED_KEY = document.querySelector('meta[name="wiki-api-key"]')?.content || '';
// When a proxy is configured it holds a server-side Anthropic key, so the
// browser never needs the user to supply one. A user-entered key still works
// (it's forwarded and takes precedence) but is no longer required.
const PROXY_AVAILABLE = !!PROXY_BASE;

const SYSTEM_PROMPT = `You are an analyst assistant for the Snap Finance Managed Accounts Wiki. Use the wiki content below as your primary source for partner-, competitor-, and SAE-specific facts. You may also draw on your general knowledge of consumer finance, retail verticals, public-company filings, and macro trends to enrich answers — there is no restriction to wiki content alone. When you cite a fact that came from outside the wiki, label it as such (e.g. "general knowledge:" or "macro context:").

Response format:
- Group findings into 3-6 themes with **bold headers**
- 2-3 bullets per theme, one sentence each
- End with **Key sources:** listing relevant partners/competitors/external sources
- Use numbers to support points, not to lead`;

async function callClaude(apiKey, question, wikiText) {
  const endpoint = PROXY_BASE ? PROXY_BASE.replace(/\/+$/, '') + '/chat' : 'https://api.anthropic.com/v1/messages';
  const headers = { 'Content-Type': 'application/json' };
  if (!PROXY_BASE) {
    headers['x-api-key'] = apiKey;
    headers['anthropic-version'] = '2023-06-01';
    headers['anthropic-dangerous-direct-browser-access'] = 'true';
  }
  const body = {
    model: 'claude-sonnet-4-20250514',
    max_tokens: 2048,
    system: [{ type: 'text', text: SYSTEM_PROMPT + '\n\n=== WIKI CONTENT ===\n' + wikiText, cache_control: { type: 'ephemeral' } }],
    messages: [{ role: 'user', content: question }],
  };
  if (PROXY_BASE && apiKey) body.api_key = apiKey;
  const res = await fetch(endpoint, { method: 'POST', headers, body: JSON.stringify(body) });
  if (!res.ok) {
    const raw = await res.text().catch(() => '');
    let detail = '';
    try { const j = JSON.parse(raw); detail = j.error?.message || j.error || j.detail || ''; } catch(e) { detail = raw.slice(0, 300); }
    throw new Error('API error ' + res.status + ': ' + (detail || '(no detail)'));
  }
  const data = await res.json();
  return data.content[0].text;
}

function ExecSummary({ fm }) {
  // Window to the current edition so these counts agree with EditionHeader,
  // rather than tallying every event ever recorded. Falls back to the edition
  // date, then to all events, if no window is present.
  const start = (fm && (fm.window_start || fm.date)) || '';
  const end = (fm && (fm.window_end || fm.date)) || '';
  const inWindow = (e) => {
    if (!start || !end || !e.date) return true;
    return e.date >= start && e.date <= end;
  };
  const windowEvents = EVENT_PAGES.filter(inWindow);
  const highEvents = windowEvents.filter(e => e.significance === 'high');
  const expansion = windowEvents.filter(e => /acqui|expan|open|launch|new store|partner|grow|grand opening/i.test(e.title || ''));
  const risk = windowEvents.filter(e => /lawsuit|class action|investi|clos|bankrupt|regulatory|deficiency/i.test(e.title || ''));
  if (highEvents.length === 0 && expansion.length === 0 && risk.length === 0) return null;
  const headlines = highEvents.slice(0, 3).map(e => e.title);
  return (
    <div className="exec-summary">
      <div className="exec-summary-label">Executive Summary</div>
      <div className="exec-summary-text">
        <strong>{highEvents.length} high-impact event{highEvents.length !== 1 ? 's' : ''}</strong> this window
        {expansion.length > 0 && <>, with <strong>{expansion.length} expansion signal{expansion.length !== 1 ? 's' : ''}</strong></>}
        {risk.length > 0 && <> and <strong>{risk.length} risk flag{risk.length !== 1 ? 's' : ''}</strong></>}.
        {headlines.length > 0 && <> Top items: {headlines.join('; ')}.</>}
      </div>
    </div>
  );
}

// ─── Ask Claude Panel ────────────────────────────────────────────────────────
function AskClaudePanel() {
  const [apiKey, setApiKey] = useState(() => EMBEDDED_KEY || sessionStorage.getItem('snap_wiki_api_key') || '');
  const [keyInput, setKeyInput] = useState('');
  // The proxy supplies a server-side key, so no key entry is required when it's
  // configured. Direct-to-Anthropic (no proxy) still needs a user key.
  const [keySet, setKeySet] = useState(() => PROXY_AVAILABLE || !!(EMBEDDED_KEY || sessionStorage.getItem('snap_wiki_api_key')));
  const [question, setQuestion] = useState('');
  const [response, setResponse] = useState(null);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);
  const qRef = useRef(null);
  const wikiText = useMemo(() => buildWikiText(), []);
  const hasEmbeddedKey = !!EMBEDDED_KEY;

  const saveKey = () => {
    const k = keyInput.trim();
    if (!k.startsWith('sk-ant-')) { setError('Key should start with sk-ant-'); return; }
    sessionStorage.setItem('snap_wiki_api_key', k);
    setApiKey(k); setKeySet(true); setKeyInput(''); setError(null);
    setTimeout(() => qRef.current?.focus(), 50);
  };
  const clearKey = () => {
    sessionStorage.removeItem('snap_wiki_api_key');
    setApiKey(EMBEDDED_KEY || ''); setKeySet(PROXY_AVAILABLE || !!EMBEDDED_KEY);
    setResponse(null); setError(null);
  };
  const ask = async () => {
    if (!question.trim() || (!apiKey && !PROXY_AVAILABLE) || loading) return;
    setLoading(true); setError(null); setResponse(null);
    try { setResponse(await callClaude(apiKey, question.trim(), wikiText)); }
    catch (e) { setError(e.message); }
    finally { setLoading(false); }
  };

  if (!keySet) {
    return (
      <div className="main-content">
        <div className="claude-panel">
          <div className="claude-setup">
            <h2>Ask Claude</h2>
            <p>Enter your Anthropic API key to ask questions. Stored in sessionStorage only — cleared when you close the tab.</p>
            <div className="claude-key-row">
              <input type="password" placeholder="sk-ant-api03-..." value={keyInput} onChange={e => setKeyInput(e.target.value)} onKeyDown={e => e.key === 'Enter' && saveKey()} autoFocus />
              <button onClick={saveKey}>Save key</button>
            </div>
            {error && <div className="claude-error">{error}</div>}
          </div>
        </div>
      </div>
    );
  }

  return (
    <div className="main-content">
      <div className="claude-panel">
        <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:14}}>
          <h2 style={{fontSize:20, fontWeight:700}}>Ask Claude</h2>
          {!hasEmbeddedKey && apiKey && <button className="claude-clear" onClick={clearKey}>Clear API key</button>}
        </div>
        <div className="claude-ask-row">
          <textarea ref={qRef} placeholder={'Ask about any partner, competitor, SAE, trend, or general industry topic…\ne.g. "Which partners are expanding fastest?" or "How does AAP compare to O\'Reilly?"'} value={question} onChange={e => setQuestion(e.target.value)} onKeyDown={e => { if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) ask(); }} rows={3} autoFocus />
          <button onClick={ask} disabled={loading || !question.trim()}>{loading ? '…' : 'Ask'}</button>
        </div>
        <div className="claude-hint">Ctrl+Enter to submit · Full wiki context + Claude's general knowledge</div>
        {error && <div className="claude-error">{error}</div>}
        {loading && <div className="claude-loading">Consulting the wiki…</div>}
        {response && !loading && (
          <div className="claude-response">
            <div className="claude-response-header">Claude's analysis</div>
            <SafeHTML className="md-content claude-response-body" html={marked.parse(response)} />
          </div>
        )}
      </div>
    </div>
  );
}

// ─── Industry Groups View ────────────────────────────────────────────────────
function analyzeIndustry(industryKey) {
  const partners = INDUSTRY_MAP[industryKey] || [];
  const partnerSlugs = new Set(partners.map(p => p.slug));
  const events = EVENT_PAGES.filter(e => {
    const ps = (e.partner || '').replace(/\[\[|\]\]/g, '').trim();
    return partnerSlugs.has(ps);
  });

  const catCounts = {};
  events.forEach(e => { const c = e.category || 'other'; catCounts[c] = (catCounts[c] || 0) + 1; });

  const highEvents = events.filter(e => e.significance === 'high');

  const expansion = events.filter(e => /acqui|expan|open|launch|new store|new location|partner|grow|grand opening/i.test(e.title || ''));
  const risk = events.filter(e => /lawsuit|class action|investi|clos|bankrupt|regulatory|ftc|cfpb|deficiency|material weakness|fitch|downgrad/i.test(e.title || ''));
  const ma = events.filter(e => /acqui|ipo|merger|sale|buyout|takeover|bid/i.test(e.title || ''));
  const earnings = events.filter(e => /earning|revenue|q[1-4]|quarter|fiscal/i.test(e.title || ''));

  const compEvents = COMPETITOR_PAGES.map(c => {
    const cEvents = EVENT_PAGES.filter(e => {
      const cs = (e.competitor || '').replace(/\[\[|\]\]/g, '').trim();
      return cs === c.slug;
    });
    return { name: c.title, slug: c.slug, events: cEvents };
  }).filter(c => c.events.length > 0);

  const saeCounts = {};
  partners.forEach(p => {
    const sae = (p.sae || '').replace(/\[\[|\]\]/g, '').trim();
    if (sae) saeCounts[sae] = (saeCounts[sae] || 0) + 1;
  });

  const tierCounts = {};
  partners.forEach(p => { if (p.tier) tierCounts[p.tier] = (tierCounts[p.tier] || 0) + 1; });

  let outlook = 'Stable';
  if (expansion.length > risk.length * 2) outlook = 'Growth';
  else if (risk.length > expansion.length) outlook = 'Cautious';
  else if (ma.length >= 2) outlook = 'Consolidating';

  return { partners, events, catCounts, highEvents, expansion, risk, ma, earnings, compEvents, saeCounts, tierCounts, outlook };
}

// Pure in-memory search over the inlined RAW_PAGES (title + body). No backend.
// Title matches rank above body matches; results are recency-sorted within each
// tier so the freshest events surface first.
function searchPages(query) {
  const q = query.trim().toLowerCase();
  if (q.length < 2) return [];
  const terms = q.split(/\s+/).filter(Boolean);
  const scored = [];
  for (const p of RAW_PAGES) {
    const title = (p.title || p.slug || '').toLowerCase();
    const body = (p.content || '').toLowerCase();
    let titleHits = 0, bodyHits = 0, missed = false;
    for (const t of terms) {
      if (title.includes(t)) titleHits++;
      else if (body.includes(t)) bodyHits++;
      else { missed = true; break; }
    }
    if (missed) continue;
    // tier 0 = every term in title, tier 1 = matched via body
    const tier = titleHits === terms.length ? 0 : 1;
    scored.push({ page: p, tier, date: p.date || '' });
  }
  scored.sort((a, b) => a.tier - b.tier || (b.date).localeCompare(a.date) || (a.page.title || '').localeCompare(b.page.title || ''));
  return scored.slice(0, 30).map(s => s.page);
}

// ─── Signal taxonomy (consistent event chips) ────────────────────────────
const SIGNALS = {
  growth:  { key:'growth',  label:'Expansion',   color:'var(--snap-green)',   bg:'var(--snap-green-tint)',  icon:'growth' },
  ma:      { key:'ma',      label:'M&A',         color:'var(--snap-blue)',    bg:'var(--snap-light-blue)',  icon:'link' },
  earn:    { key:'earn',    label:'Earnings',    color:'var(--snap-navy)',    bg:'#EAF0F6',                 icon:'bars' },
  partner: { key:'partner', label:'Partnership', color:'#5FA4F9',             bg:'var(--snap-light-blue)',  icon:'link' },
  leader:  { key:'leader',  label:'Leadership',  color:'#696969',             bg:'#EFEFEF',                 icon:'person' },
  risk:    { key:'risk',    label:'Risk',        color:'var(--snap-warning)', bg:'var(--snap-warning-bg)',  icon:'risk' },
  other:   { key:'other',   label:'Update',      color:'var(--muted)',        bg:'var(--bg-soft)',          icon:'dot' },
};

function classifySignal(e) {
  const t = (e.title || '').toLowerCase();
  const c = (e.category || '').toLowerCase();
  if (/lawsuit|class action|investig|bankrupt|deficien|material weakness|noncompli|delist|fraud|wind-down|closure|\bclos(e|ing|ure)|downgrad|distress|recall|probe/.test(t) || c === 'regulatory' || c === 'closure') return SIGNALS.risk;
  if (/acqui|merger|buyout|takeover|\bipo\b|sale-leaseback|divestit|recapitaliz|\bbid\b|spin-?off/.test(t) || c === 'ma') return SIGNALS.ma;
  if (/earning|revenue|q[1-4]\b|quarter|fiscal|dividend|guidance|senior notes|refinanc|buyback|repurchase/.test(t) || c === 'earnings') return SIGNALS.earn;
  if (/\bopen(s|ing|ed)?\b|expansion|expand|new store|new location|grand opening|milestone|launch|enters?\b|store count/.test(t) || c === 'store-move') return SIGNALS.growth;
  if (/partner|integration|financing|credit card|bnpl|co-?brand/.test(t) || c === 'partnership' || c === 'financing' || c === 'bnpl') return SIGNALS.partner;
  if (/\bceo\b|president|chair(man)?\b|board\b|appoint|succession|\bhire|promot|named/.test(t) || c === 'leadership') return SIGNALS.leader;
  return SIGNALS.other;
}

function entityLabel(e) {
  const p = (e.partner || '').trim();
  if (p && PAGE_MAP[p]) return PAGE_MAP[p].title;
  const c = (e.competitor || '').trim();
  if (c && PAGE_MAP[c]) return PAGE_MAP[c].title;
  return '';
}

function fmtShort(iso) {
  if (!iso) return '';
  return new Date(iso + 'T12:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

function SigIcon({ name }) {
  const a = { viewBox: '0 0 16 16', width: 13, height: 13, fill: 'none', stroke: 'currentColor', strokeWidth: 1.5, strokeLinecap: 'round', strokeLinejoin: 'round', className: 'sig-ic' };
  let kids;
  switch (name) {
    case 'growth':  kids = <g><path d="M2.5 11 L6.5 7 L9 9.5 L13.5 4.5" /><path d="M10 4.5 H13.5 V8" /></g>; break;
    case 'risk':    kids = <g><path d="M8 2.8 L14 12.8 H2 Z" /><path d="M8 6.4 V9.2" /><circle cx="8" cy="11" r="0.7" fill="currentColor" stroke="none" /></g>; break;
    case 'bars':    kids = <g><path d="M2.5 13 H13.5" /><path d="M4.5 13 V9" /><path d="M8 13 V5.5" /><path d="M11.5 13 V7.5" /></g>; break;
    case 'link':    kids = <g><circle cx="5" cy="8" r="2.2" /><circle cx="11" cy="8" r="2.2" /><path d="M7.2 8 H8.8" /></g>; break;
    case 'person':  kids = <g><circle cx="8" cy="5.4" r="2.3" /><path d="M3.7 13 a4.3 4.3 0 0 1 8.6 0" /></g>; break;
    default:        kids = <circle cx="8" cy="8" r="2.3" fill="currentColor" stroke="none" />;
  }
  return <svg {...a}>{kids}</svg>;
}

function SignalChip({ sig }) {
  return (
    <span className="sig-chip" style={{ color: sig.color, background: sig.bg }}>
      <SigIcon name={sig.icon} /><span>{sig.label}</span>
    </span>
  );
}

// ─── Needs-attention board (triage-first landing) ─────────────────────────
function NeedsAttention({ fm, navigateTo }) {
  const start = (fm && (fm.window_start || fm.date)) || '';
  const end = (fm && (fm.window_end || fm.date)) || '';
  const inWindow = (e) => (!start || !end || !e.date) ? true : (e.date >= start && e.date <= end);
  const high = EVENT_PAGES.filter(e => e.significance === 'high' && inWindow(e))
    .sort((a, b) => (b.date || '').localeCompare(a.date || ''));
  if (high.length === 0) return null;
  const show = high.slice(0, 6);
  return (
    <div className="needs-attn">
      <div className="needs-attn-head">
        <span className="na-eyebrow">Needs attention</span>
        <span className="na-meta">{high.length} high-impact this window</span>
      </div>
      <div className="na-grid">
        {show.map(e => {
          const sig = classifySignal(e);
          const who = entityLabel(e);
          return (
            <div key={e.slug} className="na-card" data-sig={sig.key} style={{ borderLeftColor: sig.color }} onClick={() => navigateTo(e.slug)}>
              <div className="na-card-top">

// ─── Entity profile (partner · competitor · SAE) ─────────────────────────────
function cleanRef(s) { return (s || '').replace(/\[\[|\]\]/g, '').trim(); }

function eventsForEntity(page) {
  let evs = [];
  if (page.type === 'partner') evs = EVENT_PAGES.filter(e => cleanRef(e.partner) === page.slug);
  else if (page.type === 'competitor') evs = EVENT_PAGES.filter(e => cleanRef(e.competitor) === page.slug);
  else if (page.type === 'sae') evs = EVENT_PAGES.filter(e => cleanRef(e.sae) === page.slug);
  return evs.slice().sort((a, b) => (b.date || '').localeCompare(a.date || ''));
}

function fmtLong(iso) {
  if (!iso) return '—';
  return new Date(iso + 'T12:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}
function relativeAge(iso) {
  if (!iso) return '';
  const days = Math.round((Date.now() - new Date(iso + 'T12:00:00')) / 86400000);
  if (days <= 0) return 'today';
  if (days === 1) return 'yesterday';
  if (days < 30) return days + 'd ago';
  if (days < 365) return Math.round(days / 30) + 'mo ago';
  return Math.round(days / 365) + 'y ago';
}

function StatCell({ label, children }) {
  return (
    <div className="stat-cell">
      <div className="stat-label">{label}</div>
      <div className="stat-value">{children}</div>
    </div>
  );
}

function EntityTimeline({ events, navigateTo }) {
  const [showAll, setShowAll] = useState(false);
  const [sig, setSig] = useState('all');
  if (!events.length) return null;
  const counts = {};
  events.forEach(e => { const k = classifySignal(e).key; if (k !== 'other') counts[k] = (counts[k] || 0) + 1; });
  const sigKeys = ['growth', 'ma', 'partner', 'earn', 'risk', 'leader'].filter(k => counts[k]);
  const filtered = sig === 'all' ? events : events.filter(e => classifySignal(e).key === sig);
  const shown = showAll ? filtered : filtered.slice(0, 8);
  return (
    <div style={{ display: 'contents' }}>
      {sigKeys.length >= 2 && (
        <div className="filter-bar">
          <span className="filter-bar-label">Filter</span>
          <button className={'filter-chip fc-all' + (sig === 'all' ? ' active' : '')} onClick={() => setSig('all')}>
            <span>All</span><span className="fc-n">{events.length}</span>
          </button>
          {sigKeys.map(k => {
            const s = SIGNALS[k];
            const on = sig === k;
            return (
              <button key={k} className={'filter-chip' + (on ? ' active' : '')} style={on ? { background: s.color } : null} onClick={() => setSig(on ? 'all' : k)}>
                <span className="fc-dot" style={{ background: s.color }} /><span>{s.label}</span><span className="fc-n">{counts[k]}</span>
              </button>
            );
          })}
        </div>
      )}
      <div className="timeline">
        {shown.map(e => {
          const s = classifySignal(e);
          const d = e.date ? new Date(e.date + 'T12:00:00') : null;
          return (
            <div key={e.slug} className="tl-item">
              <div className="tl-rail">
                <span className="tl-date">{d ? d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) : '—'}</span>
                {d && <span className="tl-year">{d.getFullYear()}</span>}
              </div>
              <div className="tl-body">
                <span className="tl-dot" style={{ borderColor: s.color }} />
                <div className="tl-card" onClick={() => navigateTo(e.slug)}>
                  <div className="tl-top">
                    <SignalChip sig={s} />
                    {e.significance === 'high' && <span className="tl-sig-high" title="High impact" />}
                  </div>
                  <div className="tl-title">{e.title}</div>
                  {e.significance_reason && <div className="tl-rt">{e.significance_reason}</div>}
                </div>
              </div>
            </div>
          );
        })}
        {filtered.length > 8 && (
          <button className="back-btn" style={{ marginLeft: 68 }} onClick={() => setShowAll(s => !s)}>
            {showAll ? 'Show fewer' : 'Show all ' + filtered.length + ' events'}
          </button>
        )}
      </div>
    </div>
  );
}

function RelatedChip({ page, navigateTo }) {
  return (
    <div className="related-chip" onClick={() => navigateTo(page.slug)}>
      <span className="rc-type">{TYPE_LABELS[page.type] || page.type}</span>
      <span className="rc-name">{page.title || page.slug}</span>

}

function EntityProfile({ page, navigateTo }) {
  if (!['partner', 'competitor', 'sae'].includes(page.type)) return null;
  const events = eventsForEntity(page);
  const highCount = events.filter(e => e.significance === 'high').length;
  const last = events[0];

  // Related items
  let related = [];
  if (page.type === 'partner') {
    const saeSlug = cleanRef(page.sae);
    const sae = saeSlug && PAGE_MAP[saeSlug] ? PAGE_MAP[saeSlug] : null;
    const seg = cleanRef(page.segment);
    const peers = PARTNER_PAGES.filter(p => p.slug !== page.slug && cleanRef(p.segment) === seg && seg).slice(0, 6);
    related = [
      sae ? { title: 'SAE owner', items: [sae] } : null,
      peers.length ? { title: 'Same segment', items: peers } : null,
    ].filter(Boolean);
  } else if (page.type === 'competitor') {
    const peers = COMPETITOR_PAGES.filter(p => p.slug !== page.slug).slice(0, 6);
    related = peers.length ? [{ title: 'Other competitors', items: peers }] : [];
  } else if (page.type === 'sae') {
    const owned = PARTNER_PAGES.filter(p => cleanRef(p.sae) === page.slug);
    const byActivity = owned.map(p => ({ p, n: EVENT_PAGES.filter(e => cleanRef(e.partner) === p.slug).length }))
      .sort((a, b) => b.n - a.n).map(x => x.p).slice(0, 8);
    related = byActivity.length ? [{ title: 'Partners in book', items: byActivity }] : [];
  }

  const ownedCount = page.type === 'sae' ? PARTNER_PAGES.filter(p => cleanRef(p.sae) === page.slug).length : 0;
  const saeSlug = cleanRef(page.sae);
  const parent = (page.parent || '').replace(/\[\[|\]\]/g, '').trim();
  const showParent = parent && parent !== 'null' && parent.toLowerCase() !== (page.title || '').toLowerCase();

  return (
    <div className="entity-profile">
      <div className="stat-block">
        {page.type === 'partner' && page.segment && <StatCell label="Segment">{cleanRef(page.segment)}</StatCell>}
        {page.type === 'partner' && saeSlug && PAGE_MAP[saeSlug] && (
          <div className="stat-cell">
            <div className="stat-label">SAE Owner</div>
            <div className="stat-value is-link" onClick={() => navigateTo(saeSlug)}>{PAGE_MAP[saeSlug].title}</div>
          </div>
        )}
        {page.type === 'partner' && page.tier && <StatCell label="Tier">{page.tier}</StatCell>}
        {page.type === 'competitor' && page.ticker && <StatCell label="Ticker">{page.ticker}</StatCell>}
        {page.type === 'competitor' && page.category && <StatCell label="Category">{page.category}</StatCell>}
        {(page.type === 'partner' || page.type === 'competitor') && showParent && <StatCell label="Parent">{parent}</StatCell>}
        {page.type === 'sae' && <StatCell label="Partners">{ownedCount}</StatCell>}
        <StatCell label="Events Tracked">{events.length}</StatCell>
        {highCount > 0 && <div className="stat-cell"><div className="stat-label">High-impact</div><div className="stat-value" style={{ color: 'var(--snap-warning)' }}>{highCount}</div></div>}
        <div className="stat-cell">
          <div className="stat-label">Last Activity</div>
          <div className="stat-value">{last ? fmtLong(last.date) : '—'}<span className="stat-sub">{last ? relativeAge(last.date) : 'no events tracked'}</span></div>
        </div>
      </div>

      {events.length > 0 && (
        <div style={{ display: 'contents' }}>
          <div className="entity-section-label">Activity timeline <span className="esl-count">{events.length} events</span></div>
          <EntityTimeline events={events} navigateTo={navigateTo} />
        </div>
      )}

      {related.length > 0 && (
        <div className="related-panel">
          <div className="entity-section-label">Related</div>
          <div className="related-grid">
            {related.map((col, i) => (
              <div key={i}>
                <div className="related-col-title">{col.title}</div>
                <div className="related-chips">
                  {col.items.map(it => <RelatedChip key={it.slug} page={it} navigateTo={navigateTo} />)}
                </div>
              </div>
            ))}
          </div>
        </div>
      )}

      {events.length > 0 && <hr className="entity-divider" />}
    </div>
  );
}

function WikiPage({ page, navigateTo, onBack, isEdition, navHistory, goHome }) {
  const rendered = useMemo(() => renderMarkdown(page.content), [page.slug]);
  const onContentRef = useCallback((el) => {
    if (!el) return;
    fixHeadingIds(el);
    el.addEventListener('click', (e) => {
      const wl = e.target.closest('.wikilink');
      if (wl) { const slug = wl.getAttribute('data-slug') || wl.textContent.trim(); if (slug && PAGE_MAP[slug]) { e.preventDefault(); navigateTo(slug); } return; }
      const anchor = e.target.closest('a[href^="#"]');
      if (anchor) {
        const href = anchor.getAttribute('href') || ''; if (href.length < 2) return;
        const id = href.slice(1);
        let target = document.getElementById(id);
        if (!target) { for (const h of el.querySelectorAll('h1,h2,h3,h4,h5,h6')) { if (slugifyHeading(h.textContent) === id) { target = h; break; } } }
        if (!target) { for (const node of el.querySelectorAll('[id]')) { if (node.id.includes(id) || id.includes(node.id)) { target = node; break; } } }
        if (target) { e.preventDefault(); target.scrollIntoView({ behavior: 'smooth', block: 'start' }); }
      }
    });
  }, [navigateTo]);

  const isEntity = ['partner', 'competitor', 'sae'].includes(page.type);
  const bodyHtml = useMemo(() => {
    let html = rendered.bodyHtml;
    if (isEntity) { html = html.replace(/<h1[^>]*>.*?<\/h1>/, ''); return html; }
    if (!isEdition) return html;
    html = html.replace(/<h1[^>]*>.*?<\/h1>/, '');
    const emMatch = html.match(/^(\s*<p><em>Prepared for.*?<\/em><\/p>)/);
    if (emMatch) html = html.replace(emMatch[0], '');
    const countsMatch = html.match(/^(\s*<p><strong>\d+<\/strong>.*?<\/p>)/);
    if (countsMatch) html = html.replace(countsMatch[0], '');
    return html;
  }, [rendered.bodyHtml, isEdition, isEntity]);

  return (
    <div className="main-content">
      {navHistory && navHistory.length > 0 ? (
        <Breadcrumb navHistory={navHistory} activeSlug={page.slug} goBack={onBack} goHome={goHome} />
      ) : onBack ? (
        <nav className="page-nav"><button className="back-btn" onClick={onBack}>{'←'} Back to briefing</button></nav>
      ) : null}
      {isEdition ? <EditionHeader fm={rendered.fm} /> : <PageHeader page={page} />}
      {isEntity && <EntityProfile page={page} navigateTo={navigateTo} />}
      {isEdition && <ExecSummary fm={rendered.fm} />}
      {isEdition && <NeedsAttention fm={rendered.fm} navigateTo={navigateTo} />}
      {isEdition && <OrientationCard />}
      <SafeHTML className="md-content" html={bodyHtml} onRef={onContentRef} />
      <div className="footer-note">Managed Accounts Wiki · Snap Finance</div>
    </div>
  );
}

const PALETTE_GROUP_ORDER = ['partner', 'competitor', 'sae', 'edition', 'event', 'source', 'opportunity-list'];
function CmdIcon({ type }) {
  const a = { viewBox: '0 0 16 16', fill: 'none', stroke: 'currentColor', strokeWidth: 1.5, strokeLinecap: 'round', strokeLinejoin: 'round' };
  switch (type) {
    case 'partner': return <svg {...a}><path d="M3 13V6l5-3 5 3v7" /><path d="M6.5 13v-3h3v3" /></svg>;
    case 'competitor': return <svg {...a}><circle cx="8" cy="8" r="5.5" /><path d="M8 5v3l2 1.5" /></svg>;
    case 'sae': return <svg {...a}><circle cx="8" cy="5.4" r="2.3" /><path d="M3.7 13a4.3 4.3 0 0 1 8.6 0" /></svg>;
    case 'edition': return <svg {...a}><rect x="3" y="2.5" width="10" height="11" rx="1.5" /><path d="M5.5 6h5M5.5 8.5h5M5.5 11h3" /></svg>;
    case 'event': return <svg {...a}><rect x="2.5" y="3.5" width="11" height="10" rx="1.5" /><path d="M2.5 6.5h11M5.5 2v3M10.5 2v3" /></svg>;
    default: return <svg {...a}><path d="M8 2.5v11M2.5 8h11" /></svg>;
  }
}

function loadRecents() {
  try { return JSON.parse(localStorage.getItem('snap_wiki_recent') || '[]'); } catch (e) { return []; }
}
function pushRecent(slug) {
  try {
    const r = loadRecents().filter(s => s !== slug);
    r.unshift(slug);
    localStorage.setItem('snap_wiki_recent', JSON.stringify(r.slice(0, 6)));
  } catch (e) {}
}

function CommandPalette({ open, onClose, navigateTo, setActiveView }) {
  const [q, setQ] = useState('');
  const [active, setActive] = useState(0);
  const inputRef = useRef(null);
  const listRef = useRef(null);

  useEffect(() => { if (open) { setQ(''); setActive(0); setTimeout(() => inputRef.current?.focus(), 30); } }, [open]);

  const flat = useMemo(() => {
    const items = [];
    const query = q.trim();
    if (!query) {
      const recents = loadRecents().map(s => PAGE_MAP[s]).filter(Boolean);
      if (recents.length) { items.push({ header: 'Recent' }); recents.forEach(p => items.push({ page: p })); }
      items.push({ header: 'Go to' });
      items.push({ action: 'competitors', title: 'Competitor Watch', icon: 'event' });
      items.push({ action: 'trends', title: 'Trend Analysis', icon: 'event' });
      items.push({ action: 'ask', title: 'Ask Claude', icon: 'sae' });
      return items;
    }
    const results = searchPages(query);
    const groups = {};
    results.forEach(p => { (groups[p.type] = groups[p.type] || []).push(p); });
    const order = PALETTE_GROUP_ORDER.filter(t => groups[t]).concat(Object.keys(groups).filter(t => !PALETTE_GROUP_ORDER.includes(t)));
    order.forEach(t => {
      items.push({ header: pluralLabel(t) });
      groups[t].slice(0, 6).forEach(p => items.push({ page: p }));
    });
    return items;
  }, [q, open]);

  const selectable = flat.map((it, i) => (it.header ? -1 : i)).filter(i => i >= 0);
  const clampActive = (idx) => { const pos = selectable.indexOf(idx); return pos >= 0 ? idx : (selectable[0] ?? 0); };

  useEffect(() => { if (selectable.length && !selectable.includes(active)) setActive(selectable[0]); }, [flat]);

  const choose = (it) => {
    if (it.page) { pushRecent(it.page.slug); setActiveView('page'); navigateTo(it.page.slug); }
    else if (it.action === 'edition') { setActiveView('page'); navigateTo(LATEST_EDITION_SLUG); }
    else if (it.action) { setActiveView(it.action); }
    onClose();
  };

  const onKey = (e) => {
    if (e.key === 'Escape') { onClose(); return; }
    if (e.key === 'ArrowDown') { e.preventDefault(); const pos = selectable.indexOf(active); setActive(selectable[Math.min(selectable.length - 1, pos + 1)] ?? active); }
    else if (e.key === 'ArrowUp') { e.preventDefault(); const pos = selectable.indexOf(active); setActive(selectable[Math.max(0, pos - 1)] ?? active); }
    else if (e.key === 'Enter') { e.preventDefault(); const it = flat[active]; if (it) choose(it); }
  };

  useEffect(() => {
    if (!listRef.current) return;
    const el = listRef.current.querySelector('.cmdk-item.active');
    if (el) el.scrollIntoView({ block: 'nearest' });
  }, [active]);

  if (!open) return null;
  return (
    <div className="cmdk-overlay" onMouseDown={onClose}>
      <div className="cmdk" onMouseDown={e => e.stopPropagation()}>
        <div className="cmdk-input-row">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round"><circle cx="7" cy="7" r="4.5" /><path d="M10.5 10.5 14 14" /></svg>
          <input ref={inputRef} className="cmdk-input" placeholder="Search partners, competitors, SAEs, events…" value={q} onChange={e => setQ(e.target.value)} onKeyDown={onKey} />
          <span className="cmdk-kbd">ESC</span>
        </div>
        <div className="cmdk-results" ref={listRef}>
          {flat.length === 0 ? (
            <div className="cmdk-empty">No matches for “{q}”</div>
          ) : flat.map((it, i) => it.header ? (
            <div key={'h' + i} className="cmdk-group-label">{it.header}</div>
          ) : (
            <div key={(it.page && it.page.slug) || it.action || i} className={'cmdk-item' + (i === active ? ' active' : '')}
                 onMouseEnter={() => setActive(i)} onClick={() => choose(it)}>
              <span className="cmdk-ic"><CmdIcon type={it.page ? it.page.type : it.icon} /></span>
              <span className="cmdk-texts">
                <span className="cmdk-title">{it.page ? (it.page.title || it.page.slug) : it.title}</span>
                {it.page && <span className="cmdk-sub">{TYPE_LABELS[it.page.type] || it.page.type}{it.page.segment ? ' · ' + cleanRef(it.page.segment) : ''}{it.page.ticker ? ' · ' + it.page.ticker : ''}</span>}
              </span>
              {it.page && it.page.date && <span className="cmdk-date">{it.page.date}</span>}
            </div>
          ))}
        </div>
        <div className="cmdk-foot">
          <span><span className="cf-k">↑↓</span> navigate</span>
          <span><span className="cf-k">↵</span> open</span>
          <span><span className="cf-k">esc</span> close</span>
        </div>
      </div>
    </div>
  );
}
