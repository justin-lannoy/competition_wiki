function EntityProfile({ page, navigateTo }) {
  if (!['partner', 'competitor', 'sae'].includes(page.type)) return null;
  const events = eventsForEntity(page);
  const highCount = events.filter(e => e.significance === 'high').length;
  const last = events[0];

  // Related items
  let related = [];
  if (page.type === 'partner') {
    const saeSlug = cleanRef(page.sae);
    const sae = saeSlug && PAGE_MAP[saeSlug] ? PAGE_MAP[saeSlug] : null;
    const seg = cleanRef(page.segment);
    const peers = PARTNER_PAGES.filter(p => p.slug !== page.slug && cleanRef(p.segment) === seg && seg).slice(0, 6);
    related = [
      sae ? { title: 'SAE owner', items: [sae] } : null,
      peers.length ? { title: 'Same segment', items: peers } : null,
    ].filter(Boolean);
  } else if (page.type === 'competitor') {
    const peers = COMPETITOR_PAGES.filter(p => p.slug !== page.slug).slice(0, 6);
    related = peers.length ? [{ title: 'Other competitors', items: peers }] : [];
  } else if (page.type === 'sae') {
    const owned = PARTNER_PAGES.filter(p => cleanRef(p.sae) === page.slug);
    const byActivity = owned.map(p => ({ p, n: EVENT_PAGES.filter(e => cleanRef(e.partner) === p.slug).length }))
      .sort((a, b) => b.n - a.n).map(x => x.p).slice(0, 8);
    related = byActivity.length ? [{ title: 'Partners in book', items: byActivity }] : [];
  }

  const ownedCount = page.type === 'sae' ? PARTNER_PAGES.filter(p => cleanRef(p.sae) === page.slug).length : 0;
  const saeSlug = cleanRef(page.sae);
  const parent = (page.parent || '').replace(/\[\[|\]\]/g, '').trim();
  const showParent = parent && parent !== 'null' && parent.toLowerCase() !== (page.title || '').toLowerCase();

  return (
    <div className="entity-profile">
      <div className="stat-block">
        {page.type === 'partner' && page.segment && <StatCell label="Segment">{cleanRef(page.segment)}</StatCell>}
        {page.type === 'partner' && saeSlug && PAGE_MAP[saeSlug] && (
          <div className="stat-cell">
            <div className="stat-label">SAE Owner</div>
            <div className="stat-value is-link" onClick={() => navigateTo(saeSlug)}>{PAGE_MAP[saeSlug].title}</div>
          </div>
        )}
        {page.type === 'partner' && page.tier && <StatCell label="Tier">{page.tier}</StatCell>}
        {page.type === 'competitor' && page.ticker && <StatCell label="Ticker">{page.ticker}</StatCell>}
        {page.type === 'competitor' && page.category && <StatCell label="Category">{page.category}</StatCell>}
        {(page.type === 'partner' || page.type === 'competitor') && showParent && <StatCell label="Parent">{parent}</StatCell>}
        {page.type === 'sae' && <StatCell label="Partners">{ownedCount}</StatCell>}
        <StatCell label="Events Tracked">{events.length}</StatCell>
        {highCount > 0 && <div className="stat-cell"><div className="stat-label">High-impact</div><div className="stat-value" style={{ color: 'var(--snap-warning)' }}>{highCount}</div></div>}
        <div className="stat-cell">
          <div className="stat-label">Last Activity</div>
          <div className="stat-value">{last ? fmtLong(last.date) : '—'}<span className="stat-sub">{last ? relativeAge(last.date) : 'no events tracked'}</span></div>
        </div>
      </div>

      {events.length > 0 && (
        <div style={{ display: 'contents' }}>
          <div className="entity-section-label">Activity timeline <span className="esl-count">{events.length} events</span></div>
          <EntityTimeline events={events} navigateTo={navigateTo} />
        </div>
      )}

      {related.length > 0 && (
        <div className="related-panel">
          <div className="entity-section-label">Related</div>
          <div className="related-grid">
            {related.map((col, i) => (
              <div key={i}>
                <div className="related-col-title">{col.title}</div>
                <div className="related-chips">
                  {col.items.map(it => <RelatedChip key={it.slug} page={it} navigateTo={navigateTo} />)}
                </div>
              </div>
            ))}
          </div>
        </div>
      )}

      {events.length > 0 && <hr className="entity-divider" />}
    </div>
  );
}

function WikiPage({ page, navigateTo, onBack, isEdition, navHistory, goHome }) {
  const rendered = useMemo(() => renderMarkdown(page.content), [page.slug]);
  const onContentRef = useCallback((el) => {
    if (!el) return;
    fixHeadingIds(el);
    el.addEventListener('click', (e) => {
      const wl = e.target.closest('.wikilink');
      if (wl) { const slug = wl.getAttribute('data-slug') || wl.textContent.trim(); if (slug && PAGE_MAP[slug]) { e.preventDefault(); navigateTo(slug); } return; }
      const anchor = e.target.closest('a[href^="#"]');
      if (anchor) {
        const href = anchor.getAttribute('href') || ''; if (href.length < 2) return;
        const id = href.slice(1);
        let target = document.getElementById(id);
        if (!target) { for (const h of el.querySelectorAll('h1,h2,h3,h4,h5,h6')) { if (slugifyHeading(h.textContent) === id) { target = h; break; } } }
        if (!target) { for (const node of el.querySelectorAll('[id]')) { if (node.id.includes(id) || id.includes(node.id)) { target = node; break; } } }
        if (target) { e.preventDefault(); target.scrollIntoView({ behavior: 'smooth', block: 'start' }); }
      }
    });
  }, [navigateTo]);

  const isEntity = ['partner', 'competitor', 'sae'].includes(page.type);
  const bodyHtml = useMemo(() => {
    let html = rendered.bodyHtml;
    if (isEntity) { html = html.replace(/<h1[^>]*>.*?<\/h1>/, ''); return html; }
    if (!isEdition) return html;
    html = html.replace(/<h1[^>]*>.*?<\/h1>/, '');
    const emMatch = html.match(/^(\s*<p><em>Prepared for.*?<\/em><\/p>)/);
    if (emMatch) html = html.replace(emMatch[0], '');
    const countsMatch = html.match(/^(\s*<p><strong>\d+<\/strong>.*?<\/p>)/);
    if (countsMatch) html = html.replace(countsMatch[0], '');
    return html;
  }, [rendered.bodyHtml, isEdition, isEntity]);

  return (
    <div className="main-content">
      {navHistory && navHistory.length > 0 ? (
        <Breadcrumb navHistory={navHistory} activeSlug={page.slug} goBack={onBack} goHome={goHome} />
      ) : onBack ? (
        <nav className="page-nav"><button className="back-btn" onClick={onBack}>{'←'} Back to briefing</button></nav>
      ) : null}
      {isEdition ? <EditionHeader fm={rendered.fm} /> : <PageHeader page={page} />}
      {isEntity && <EntityProfile page={page} navigateTo={navigateTo} />}
      {isEdition && <ExecSummary fm={rendered.fm} />}
      {isEdition && <NeedsAttention fm={rendered.fm} navigateTo={navigateTo} />}
      {isEdition && <OrientationCard />}
      <SafeHTML className="md-content" html={bodyHtml} onRef={onContentRef} />
      <div className="footer-note">Competitor Intelligence · Snap Finance</div>
    </div>
  );
}

// ─── Command palette (Cmd / Ctrl-K) ──────────────────────────────────────────
const PALETTE_GROUP_ORDER = ['partner', 'competitor', 'sae', 'edition', 'event', 'source', 'opportunity-list'];
function CmdIcon({ type }) {
  const a = { viewBox: '0 0 16 16', fill: 'none', stroke: 'currentColor', strokeWidth: 1.5, strokeLinecap: 'round', strokeLinejoin: 'round' };
  switch (type) {
    case 'partner': return <svg {...a}><path d="M3 13V6l5-3 5 3v7" /><path d="M6.5 13v-3h3v3" /></svg>;
    case 'competitor': return <svg {...a}><circle cx="8" cy="8" r="5.5" /><path d="M8 5v3l2 1.5" /></svg>;
    case 'sae': return <svg {...a}><circle cx="8" cy="5.4" r="2.3" /><path d="M3.7 13a4.3 4.3 0 0 1 8.6 0" /></svg>;
    case 'edition': return <svg {...a}><rect x="3" y="2.5" width="10" height="11" rx="1.5" /><path d="M5.5 6h5M5.5 8.5h5M5.5 11h3" /></svg>;
    case 'event': return <svg {...a}><rect x="2.5" y="3.5" width="11" height="10" rx="1.5" /><path d="M2.5 6.5h11M5.5 2v3M10.5 2v3" /></svg>;
    default: return <svg {...a}><path d="M8 2.5v11M2.5 8h11" /></svg>;
  }
}

function loadRecents() {
  try { return JSON.parse(localStorage.getItem('snap_wiki_recent') || '[]'); } catch (e) { return []; }
}
function pushRecent(slug) {
  try {
    const r = loadRecents().filter(s => s !== slug);
    r.unshift(slug);
    localStorage.setItem('snap_wiki_recent', JSON.stringify(r.slice(0, 6)));
  } catch (e) {}
}

function CommandPalette({ open, onClose, navigateTo, setActiveView }) {
  const [q, setQ] = useState('');
  const [active, setActive] = useState(0);
  const inputRef = useRef(null);
  const listRef = useRef(null);

  useEffect(() => { if (open) { setQ(''); setActive(0); setTimeout(() => inputRef.current?.focus(), 30); } }, [open]);

  const flat = useMemo(() => {
    const items = [];
    const query = q.trim();
    if (!query) {
      const recents = loadRecents().map(s => PAGE_MAP[s]).filter(Boolean);
      if (recents.length) { items.push({ header: 'Recent' }); recents.forEach(p => items.push({ page: p })); }
      items.push({ header: 'Go to' });
      items.push({ action: 'competitors', title: 'Competitor Watch', icon: 'event' });
      items.push({ action: 'trends', title: 'Trend Analysis', icon: 'event' });
      items.push({ action: 'ask', title: 'Ask Claude', icon: 'sae' });
      return items;
    }
    const results = searchPages(query);
    const groups = {};
    results.forEach(p => { (groups[p.type] = groups[p.type] || []).push(p); });
    const order = PALETTE_GROUP_ORDER.filter(t => groups[t]).concat(Object.keys(groups).filter(t => !PALETTE_GROUP_ORDER.includes(t)));
    order.forEach(t => {
      items.push({ header: pluralLabel(t) });
      groups[t].slice(0, 6).forEach(p => items.push({ page: p }));
    });
    return items;
  }, [q, open]);

  const selectable = flat.map((it, i) => (it.header ? -1 : i)).filter(i => i >= 0);
  const clampActive = (idx) => { const pos = selectable.indexOf(idx); return pos >= 0 ? idx : (selectable[0] ?? 0); };

  useEffect(() => { if (selectable.length && !selectable.includes(active)) setActive(selectable[0]); }, [flat]);

  const choose = (it) => {
    if (it.page) { pushRecent(it.page.slug); setActiveView('page'); navigateTo(it.page.slug); }
    else if (it.action === 'edition') { setActiveView('page'); navigateTo(LATEST_EDITION_SLUG); }
    else if (it.action) { setActiveView(it.action); }
    onClose();
  };

  const onKey = (e) => {
    if (e.key === 'Escape') { onClose(); return; }
    if (e.key === 'ArrowDown') { e.preventDefault(); const pos = selectable.indexOf(active); setActive(selectable[Math.min(selectable.length - 1, pos + 1)] ?? active); }
    else if (e.key === 'ArrowUp') { e.preventDefault(); const pos = selectable.indexOf(active); setActive(selectable[Math.max(0, pos - 1)] ?? active); }
    else if (e.key === 'Enter') { e.preventDefault(); const it = flat[active]; if (it) choose(it); }
  };

  useEffect(() => {
    if (!listRef.current) return;
    const el = listRef.current.querySelector('.cmdk-item.active');
    if (el) el.scrollIntoView({ block: 'nearest' });
  }, [active]);

  if (!open) return null;
  return (
    <div className="cmdk-overlay" onMouseDown={onClose}>
      <div className="cmdk" onMouseDown={e => e.stopPropagation()}>
        <div className="cmdk-input-row">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round"><circle cx="7" cy="7" r="4.5" /><path d="M10.5 10.5 14 14" /></svg>
          <input ref={inputRef} className="cmdk-input" placeholder="Search partners, competitors, SAEs, events…" value={q} onChange={e => setQ(e.target.value)} onKeyDown={onKey} />
          <span className="cmdk-kbd">ESC</span>
        </div>
        <div className="cmdk-results" ref={listRef}>
          {flat.length === 0 ? (
            <div className="cmdk-empty">No matches for “{q}”</div>
          ) : flat.map((it, i) => it.header ? (
            <div key={'h' + i} className="cmdk-group-label">{it.header}</div>
          ) : (
            <div key={(it.page && it.page.slug) || it.action || i} className={'cmdk-item' + (i === active ? ' active' : '')}
                 onMouseEnter={() => setActive(i)} onClick={() => choose(it)}>
              <span className="cmdk-ic"><CmdIcon type={it.page ? it.page.type : it.icon} /></span>
              <span className="cmdk-texts">
                <span className="cmdk-title">{it.page ? (it.page.title || it.page.slug) : it.title}</span>
                {it.page && <span className="cmdk-sub">{TYPE_LABELS[it.page.type] || it.page.type}{it.page.segment ? ' · ' + cleanRef(it.page.segment) : ''}{it.page.ticker ? ' · ' + it.page.ticker : ''}</span>}
              </span>
              {it.page && it.page.date && <span className="cmdk-date">{it.page.date}</span>}
            </div>
          ))}
        </div>
        <div className="cmdk-foot">
          <span><span className="cf-k">↑↓</span> navigate</span>
          <span><span className="cf-k">↵</span> open</span>
          <span><span className="cf-k">esc</span> close</span>
        </div>
      </div>
    </div>
  );
}

function MobileBar({ onMenu, openPalette }) {
  return (
    <div className="mobile-bar">
      <button className="mb-burger" onClick={onMenu} aria-label="Menu"><span /><span /><span /></button>
      <div className="mb-brand">Snap Finance<small>MANAGED ACCOUNTS</small></div>
      <button className="mb-search" onClick={openPalette} aria-label="Search">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round"><circle cx="7" cy="7" r="4.5" /><path d="M10.5 10.5 14 14" /></svg>
      </button>
    </div>
  );
}

// ─── App ─────────────────────────────────────────────────────────────────────
function App() {
  const [activeView, setActiveView] = useState('competitors');
  const [activeSlug, setActiveSlug] = useState(LATEST_EDITION_SLUG);
  const [navHistory, setNavHistory] = useState([]);
  const [paletteOpen, setPaletteOpen] = useState(false);
  const [navOpen, setNavOpen] = useState(false);

  useEffect(() => {
    const onKey = (e) => {
      if ((e.metaKey || e.ctrlKey) && (e.key === 'k' || e.key === 'K')) { e.preventDefault(); setPaletteOpen(o => !o); }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, []);

  const navigateTo = useCallback((slug) => {
    if (activeView === 'industry') { setActiveSlug(slug); return; }
    if (!PAGE_MAP[slug]) return;
    pushRecent(slug);
    setNavOpen(false);
    setNavHistory(h => activeSlug ? [...h, activeSlug] : h);
    setActiveSlug(slug);
    setActiveView('page');
    const main = document.querySelector('.main-content');
    if (main) main.scrollTo({ top: 0, behavior: 'smooth' });
  }, [activeSlug, activeView]);

  const goBack = useCallback(() => {
    if (navHistory.length > 0) {
      setActiveSlug(navHistory[navHistory.length - 1]);
      setNavHistory(h => h.slice(0, -1));
      setActiveView('page');
    } else if (LATEST_EDITION_SLUG) {
      setActiveSlug(LATEST_EDITION_SLUG);
      setActiveView('page');
    } else {
      setActiveView('competitors');
    }
    const main = document.querySelector('.main-content');
    if (main) main.scrollTo({ top: 0, behavior: 'smooth' });
  }, [navHistory]);

  let content;
  if (activeView === 'ask') {
    content = <AskClaudePanel />;
  } else if (activeView === 'trends') {
    content = <TrendView />;
  } else if (activeView === 'competitors') {
    content = <CompetitorView navigateTo={(slug) => { setActiveView('page'); navigateTo(slug); }} />;
  } else if (activeView === 'industry') {
    content = <IndustryView industryKey={activeSlug} navigateTo={(slug) => { setActiveView('page'); navigateTo(slug); }} />;
  } else {
    const page = PAGE_MAP[activeSlug];
    if (!page) {
      content = <div className="main-content"><div className="empty-state"><h2>No pages found</h2><p>Run the weekly refresh to populate the wiki.</p></div></div>;
    } else {
      const isEdition = page.type === 'edition';
      const showBack = navHistory.length > 0;
      const goHome = () => { setNavHistory([]); setActiveView('competitors'); };
      content = <WikiPage page={page} navigateTo={navigateTo} onBack={showBack ? goBack : null} isEdition={isEdition} navHistory={navHistory} goHome={goHome} />;
    }
  }

  return (
    <div style={{ display: 'contents' }}>
      <MobileBar onMenu={() => setNavOpen(o => !o)} openPalette={() => setPaletteOpen(true)} />
      <div className={'app-layout' + (navOpen ? ' nav-open' : '')}>
        <div className="scrim" onClick={() => setNavOpen(false)} />
        <Sidebar activeView={activeView} setActiveView={(v) => { setActiveView(v); setNavOpen(false); }} activeSlug={activeSlug} navigateTo={navigateTo} openPalette={() => setPaletteOpen(true)} />
        {content}
      </div>
      <CommandPalette open={paletteOpen} onClose={() => setPaletteOpen(false)} navigateTo={navigateTo} setActiveView={setActiveView} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

</script>
<script>
// wiki_enhance.js — drop-in DOM augmentation for the redesigned wiki.
// Loaded after wiki_app.js. Watches .md-content for re-renders and:
//  1. Tags SAE H2s with a count chip
//  2. Injects a KPI strip + SAE leaderboard at the top of edition pages
//  3. Adds id="silent-partners-today" to the trailing footer H2

(function () {
  const SAE_H2_RE = /^(.+?)\s*\((\d+)\s*events?\)\s*$/i;

  // Escape values taken from page markdown (event/SAE titles can be web-sourced)
  // before they go into any innerHTML string — the React side sanitizes via
  // DOMPurify, but these vanilla-JS builders bypass that path.
  function esc(s) {
    return String(s == null ? '' : s).replace(/[&<>"']/g, (c) => (
      { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]
    ));
  }

  function decorateSaeHeadings(root) {
    const h2s = root.querySelectorAll('h2');
    h2s.forEach((h) => {
      if (h.dataset.saeDecorated) return;
      const txt = (h.textContent || '').trim();
      const m = txt.match(SAE_H2_RE);
      if (!m) return;
      const name = m[1];
      const count = m[2];
      h.classList.add('sae-h2');
      h.textContent = '';
      const nameEl = document.createElement('span');
      nameEl.className = 'sae-name';
      nameEl.textContent = name;
      const chip = document.createElement('span');
      chip.className = 'sae-count-chip';
      chip.innerHTML = '<strong>' + count + '</strong>EVENTS';
      h.appendChild(nameEl);
      h.appendChild(chip);
      h.dataset.saeDecorated = '1';
      h.dataset.saeName = name;
      h.dataset.saeCount = count;
    });
  }

  function tagSilentH2(root) {
    root.querySelectorAll('h2').forEach((h) => {
      const t = (h.textContent || '').trim().toLowerCase();
      if (t.startsWith('silent partners')) h.id = 'silent-partners-today';
    });
  }

  function buildLeaderboard(saeRows) {
    if (document.querySelector('.sae-leaderboard')) return;
    if (!saeRows.length) return;
    const max = Math.max.apply(null, saeRows.map(r => r.count));
    const lb = document.createElement('div');
    lb.className = 'sae-leaderboard';
    lb.innerHTML =
      '<div class="lb-head">' +
        '<span class="lb-title">SAE Leaderboard — Events This Window</span>' +
        '<span class="lb-meta">Sorted by event volume · click to jump</span>' +
      '</div>' +
      '<div class="lb-body">' +
        saeRows.map(r => {
          const w = Math.max(4, Math.round((r.count / max) * 100));
          const high = r.high > 0 ? '<span class="lb-high">' + r.high + ' high</span>' : '';
          return '<div class="led-row" data-anchor="' + esc(r.anchor) + '">' +
                   '<div class="led-name">' + esc(r.name) + '</div>' +
                   '<div class="led-bar-wrap"><div class="led-bar' + (r.high > 0 ? ' has-high' : '') + '" style="width:' + w + '%"></div></div>' +
                   '<div class="lb-count">' + r.count + high + '</div>' +
                 '</div>';
        }).join('') +
      '</div>';
    lb.addEventListener('click', (e) => {
      const row = e.target.closest('.led-row');
      if (!row) return;
      const id = row.getAttribute('data-anchor');
      const target = document.getElementById(id);
      if (target) {
        target.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
    });
    return lb;
  }

  function isEditionView(main) {
    return !!main.querySelector('.briefing-header');
  }

  function collectSaeRows(root) {
    const rows = [];
    root.querySelectorAll('h2.sae-h2').forEach(h => {
      const name = h.dataset.saeName;
      const count = parseInt(h.dataset.saeCount || '0', 10);
      if (!name) return;
      // count high-impact events under this section: inspect siblings until next H2
      let high = 0;
      let n = h.nextElementSibling;
      while (n && n.tagName !== 'H2') {
        if (n.querySelector) {
          high += n.querySelectorAll('a strong, .pill').length;
          // also catch markdown-emitted "**[High Impact]**" inside a link → bold
          n.querySelectorAll('strong').forEach(s => {
            if (/high\s*impact/i.test(s.textContent)) high++;
          });
        }
        n = n.nextElementSibling;
      }
      // dedupe rough estimate
      if (high > count) high = count;
      rows.push({ name, count, high, anchor: h.id || '' });
    });
    rows.sort((a, b) => b.count - a.count);
    return rows;
  }

  function ensureAnchors(root) {
    root.querySelectorAll('h2.sae-h2').forEach(h => {
      if (h.id) return;
      const slug = (h.dataset.saeName || '')
        .toLowerCase().replace(/[^\w\s-]/g, '').replace(/\s+/g, '-');
      h.id = slug + '-' + (h.dataset.saeCount || '0') + '-events';
    });
  }

  function removeJumpNav() {
    const n = document.querySelector('.jump-nav');
    if (n) n.remove();
  }

  function scrollToAnchor(id) {
    const m = document.querySelector('.main-content');
    const t = id && document.getElementById(id);
    if (!m || !t) return;
    const top = t.getBoundingClientRect().top - m.getBoundingClientRect().top + m.scrollTop - 12;
    m.scrollTo({ top, behavior: 'smooth' });
  }

  // ── Signal taxonomy (mirrors the React classifier) ──────────────────────
  var SIG_DEFS = [
    { key: 'growth',  label: 'Expansion',   color: '#1B844A' },
    { key: 'ma',      label: 'M&A',         color: '#3D5CCF' },
    { key: 'partner', label: 'Partnership', color: '#5FA4F9' },
    { key: 'earn',    label: 'Earnings',    color: '#062D4E' },
    { key: 'risk',    label: 'Risk',        color: '#854F0B' },
    { key: 'leader',  label: 'Leadership',  color: '#696969' },
  ];
  var SIG_LABEL = {}; var SIG_COLOR = {};
  SIG_DEFS.forEach(function (d) { SIG_LABEL[d.key] = d.label; SIG_COLOR[d.key] = d.color; });

  function classifyText(t) {
    t = (t || '').toLowerCase();
    if (/lawsuit|class action|investig|bankrupt|deficien|material weakness|noncompli|delist|fraud|wind-down|closure|clos(e|ing|ure)|downgrad|distress|recall|probe/.test(t)) return 'risk';
    if (/acqui|merger|buyout|takeover|\bipo\b|sale-leaseback|divestit|recapitaliz|\bbid\b|spin-?off/.test(t)) return 'ma';
    if (/earning|revenue|q[1-4]\b|quarter|fiscal|dividend|guidance|senior notes|refinanc|buyback|repurchase/.test(t)) return 'earn';
    if (/\bopen(s|ing|ed)?\b|expansion|expand|new store|new location|grand opening|milestone|launch|enters?\b|store count/.test(t)) return 'growth';
    if (/partner|integration|financing|credit card|bnpl|co-?brand/.test(t)) return 'partner';
    if (/\bceo\b|president|chair(man)?\b|board\b|appoint|succession|\bhire|promot|named/.test(t)) return 'leader';
    return 'other';
  }

  // Wrap each ledger event (opp-line / comp date line + its summary & read-
  // through) into a .evt block tagged with its signal, so we can filter.
  function wrapLedgerEvents(md) {
    md.querySelectorAll('.opp-entry').forEach(function (entry) {
      if (entry.dataset.wrapped) return;
      entry.dataset.wrapped = '1';
      var group = null;
      Array.prototype.slice.call(entry.children).forEach(function (node) {
        if (node.classList.contains('opp-name')) { group = null; return; }
        if (node.classList.contains('opp-line')) {
          group = document.createElement('div'); group.className = 'evt';
          var link = node.querySelector('a, .link');
          group.dataset.sig = classifyText(link ? link.textContent : node.textContent);
          entry.insertBefore(group, node); group.appendChild(node);
        } else if (group) { group.appendChild(node); }
      });
    });
    md.querySelectorAll('.comp-entry').forEach(function (entry) {
      if (entry.dataset.wrapped) return;
      entry.dataset.wrapped = '1';
      var group = null;
      Array.prototype.slice.call(entry.children).forEach(function (node) {
        if (node.classList.contains('comp-entry-head')) { group = null; return; }
        if (node.classList.contains('date')) {
          group = document.createElement('div'); group.className = 'evt';
          var link = node.querySelector('a, .link');
          group.dataset.sig = classifyText(link ? link.textContent : node.textContent);
          entry.insertBefore(group, node); group.appendChild(node);
        } else if (group) { group.appendChild(node); }
      });
    });
  }

  var activeFilter = 'all';
  function applyFilter(key) {
    activeFilter = key;
    document.querySelectorAll('.filter-chip').forEach(function (c) {
      var on = c.dataset.sig === key;
      c.classList.toggle('active', on);
      if (c.dataset.sig !== 'all') c.style.background = on ? (c.dataset.color || '') : '';
    });
    var show = function (el, on) { el.classList.toggle('is-hidden', !on); };
    document.querySelectorAll('.evt').forEach(function (e) {
      show(e, key === 'all' || e.dataset.sig === key);
    });
    document.querySelectorAll('.na-card[data-sig]').forEach(function (c) {
      show(c, key === 'all' || c.dataset.sig === key);
    });
    // collapse empty containers
    document.querySelectorAll('.opp-entry').forEach(function (en) {
      var any = en.querySelector('.evt:not(.is-hidden)');
      show(en, !!any);
    });
    document.querySelectorAll('.opp-owner').forEach(function (ow) {
      var any = ow.querySelector('.opp-entry:not(.is-hidden)');
      show(ow, !!any);
    });
    document.querySelectorAll('.comp-entry').forEach(function (ce) {
      var any = ce.querySelector('.evt:not(.is-hidden)');
      show(ce, !!any);
    });
  }

  function buildFilterBar(md) {
    if (md.querySelector('.filter-bar')) return;
    wrapLedgerEvents(md);
    var counts = {}; var total = 0;
    md.querySelectorAll('.evt[data-sig]').forEach(function (e) {
      var k = e.dataset.sig; if (k === 'other') return;
      counts[k] = (counts[k] || 0) + 1; total++;
    });
    var present = SIG_DEFS.filter(function (d) { return counts[d.key]; });
    if (present.length < 2) return; // nothing meaningful to filter
    var bar = document.createElement('div');
    bar.className = 'filter-bar';
    var html = '<span class="filter-bar-label">Filter</span>';
    html += '<button class="filter-chip fc-all active" data-sig="all"><span>All</span><span class="fc-n">' + total + '</span></button>';
    present.forEach(function (d) {
      html += '<button class="filter-chip" data-sig="' + d.key + '" data-color="' + d.color + '">' +
                '<span class="fc-dot" style="background:' + d.color + '"></span>' +
                '<span>' + d.label + '</span><span class="fc-n">' + counts[d.key] + '</span>' +
              '</button>';
    });
    bar.innerHTML = html;
    bar.addEventListener('click', function (e) {
      var chip = e.target.closest('.filter-chip'); if (!chip) return;
      applyFilter(chip.dataset.sig === activeFilter && chip.dataset.sig !== 'all' ? 'all' : chip.dataset.sig);
    });
    var compSection = md.querySelector('section.competitors');
    if (compSection) compSection.parentNode.insertBefore(bar, compSection);
    else md.insertBefore(bar, md.firstChild);
  }

  // ── Sticky context bar ───────────────────────────────────────────────────
  function buildContextBar(main) {
    if (main.querySelector('.context-bar')) return;
    var title = '';
    var h = main.querySelector('.briefing-header h1, .page-header h1');
    if (h) title = h.textContent.trim();
    var bar = document.createElement('div');
    bar.className = 'context-bar';
    bar.innerHTML = '<span class="ctx-title"></span>' +
                    '<span class="ctx-sep" style="display:none">›</span>' +
                    '<span class="ctx-section"></span>' +
                    '<span class="ctx-spacer"></span>' +
                    '<button class="ctx-top">↑ Top</button>';
    bar.querySelector('.ctx-title').textContent = title;
    bar.querySelector('.ctx-top').addEventListener('click', function () {
      main.scrollTo({ top: 0, behavior: 'smooth' });
    });
    main.insertBefore(bar, main.firstChild);
  }

  function attachScrollSpy() {
    var main = document.querySelector('.main-content');
    if (!main || main.dataset.spy) return;
    main.dataset.spy = '1';
    var raf = 0;
    var onScroll = function () {
      if (raf) return;
      raf = requestAnimationFrame(function () {
        raf = 0;
        var nav = document.querySelector('.jump-nav');
        var currentId = null, currentName = '';
        var links = nav ? [].slice.call(nav.querySelectorAll('.jump-link[data-anchor]')) : [];
        links.forEach(function (l) {
          var t = document.getElementById(l.dataset.anchor);
          if (t && t.getBoundingClientRect().top <= 140) { currentId = l.dataset.anchor; currentName = (l.querySelector('span') || {}).textContent || ''; }
        });
        links.forEach(function (l) { l.classList.toggle('current', l.dataset.anchor === currentId); });
        // context bar
        var bar = main.querySelector('.context-bar');
        if (bar) {
          var show = main.scrollTop > 200;
          bar.classList.toggle('show', show);
          var sec = bar.querySelector('.ctx-section'), sep = bar.querySelector('.ctx-sep');
          if (currentName) { sec.textContent = currentName; sep.style.display = ''; }
          else { sec.textContent = ''; sep.style.display = 'none'; }
        }
      });
    };
    main.addEventListener('scroll', onScroll, { passive: true });
    onScroll();
  }

  function buildJumpNav(rows) {
    removeJumpNav();
    if (!rows || !rows.length) return;
    const nav = document.createElement('div');
    nav.className = 'jump-nav';
    const icon = '<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M2.5 4h11M2.5 8h11M2.5 12h7"/></svg>';
    nav.innerHTML =
      '<button class="jump-toggle" type="button">' + icon + '<span>Sections</span></button>' +
      '<div class="jump-panel">' +
        '<div class="jump-panel-head">Jump to SAE</div>' +
        '<div class="jump-link" data-top="1"><span>Top of briefing</span></div>' +
        rows.map(r => '<div class="jump-link" data-anchor="' + esc(r.anchor) + '"><span>' + esc(r.name) + '</span><span class="jl-count">' + esc(r.count) + '</span></div>').join('') +
      '</div>';
    document.body.appendChild(nav);
    nav.querySelector('.jump-toggle').addEventListener('click', () => nav.classList.toggle('open'));
    nav.querySelectorAll('.jump-link').forEach(l => {
      l.addEventListener('click', () => {
        if (l.dataset.top) {
          const m = document.querySelector('.main-content');
          if (m) m.scrollTo({ top: 0, behavior: 'smooth' });
        } else {
          scrollToAnchor(l.dataset.anchor);
        }
        nav.classList.remove('open');
      });
    });
    attachScrollSpy();
  }

  function enhance() {
    const main = document.querySelector('.main-content');
    if (!main) return;
    const md = main.querySelector('.md-content');
    if (!md) { removeJumpNav(); return; }

    decorateSaeHeadings(md);
    tagSilentH2(md);
    ensureAnchors(md);
    buildContextBar(main);
    attachScrollSpy();

    if (!isEditionView(main)) { removeJumpNav(); return; }
    if (document.querySelector('.sae-leaderboard')) return;

    const saeRows = collectSaeRows(md);

    const lb = buildLeaderboard(saeRows);
    if (lb) {
      // place leaderboard AFTER competitor section so the hero stays first
      const compSection = md.querySelector('section.competitors');
      if (compSection && compSection.nextElementSibling) {
        compSection.parentNode.insertBefore(lb, compSection.nextElementSibling);
      } else {
        const insertAfter = main.querySelector('.exec-summary') || main.querySelector('.briefing-header');
        if (insertAfter) insertAfter.parentNode.insertBefore(lb, insertAfter.nextSibling);
      }
    }

    buildFilterBar(md);
    buildJumpNav(saeRows);
  }

  // Run after each render. The React app replaces .main-content children on
  // navigation, so observe .main-content. Pause the observer while we mutate
  // so our own insertions can't retrigger us.
  let obs;
  let running = false;
  function safeEnhance() {
    if (running) return;
    running = true;
    try { enhance(); } finally { running = false; }
  }
  const tick = () => {
    clearTimeout(window.__wikiEnhanceT);
    window.__wikiEnhanceT = setTimeout(safeEnhance, 40);
  };
  obs = new MutationObserver(tick);
  function start() {
    safeEnhance();
    const main = document.querySelector('.main-content') || document.body;
    obs.observe(main, { childList: true, subtree: true });
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', start);
  } else {
    start();
  }
})();

</script>
</body>
</html>
