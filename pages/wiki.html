25-02-19 | 2025-02-19 | [EDGAR](https://www.sec.gov/Archives/edgar/data/1808834/000180883425000008/prg-20250219.htm) | [file](../../sec-filings/prog-holdings/2025-02-19_8-K_0001808834-25-000008.htm) |\n| 8-K | 2024-11-19 | 2024-11-15 | [EDGAR](https://www.sec.gov/Archives/edgar/data/1808834/000119312524261374/d845270d8k.htm) | [file](../../sec-filings/prog-holdings/2024-11-19_8-K_0001193125-24-261374.htm) |\n| 8-K | 2024-11-13 | 2024-11-12 | [EDGAR](https://www.sec.gov/Archives/edgar/data/1808834/000180883424000131/prg-20241112.htm) | [file](../../sec-filings/prog-holdings/2024-11-13_8-K_0001808834-24-000131.htm) |\n| 8-K | 2024-11-08 | 2024-11-07 | [EDGAR](https://www.sec.gov/Archives/edgar/data/1808834/000180883424000119/prg-20241107.htm) | [file](../../sec-filings/prog-holdings/2024-11-08_8-K_0001808834-24-000119.htm) |\n| 10-Q | 2024-10-23 | 2024-09-30 | [EDGAR](https://www.sec.gov/Archives/edgar/data/1808834/000180883424000113/prg-20240930.htm) | [file](../../sec-filings/prog-holdings/2024-10-23_10-Q_0001808834-24-000113.htm) |\n| 8-K | 2024-10-23 | 2024-10-23 | [EDGAR](https://www.sec.gov/Archives/edgar/data/1808834/000180883424000111/prg-20241023.htm) | [file](../../sec-filings/prog-holdings/2024-10-23_8-K_0001808834-24-000111.htm) |\n| 8-K | 2024-08-09 | 2024-08-08 | [EDGAR](https://www.sec.gov/Archives/edgar/data/1808834/000180883424000099/prg-20240808.htm) | [file](../../sec-filings/prog-holdings/2024-08-09_8-K_0001808834-24-000099.htm) |\n| 10-Q | 2024-07-24 | 2024-06-30 | [EDGAR](https://www.sec.gov/Archives/edgar/data/1808834/000180883424000096/prg-20240630.htm) | [file](../../sec-filings/prog-holdings/2024-07-24_10-Q_0001808834-24-000096.htm) |\n| 8-K | 2024-07-24 | 2024-07-24 | [EDGAR](https://www.sec.gov/Archives/edgar/data/1808834/000180883424000094/prg-20240724.htm) | [file](../../sec-filings/prog-holdings/2024-07-24_8-K_0001808834-24-000094.htm) |\n\n## Filing summaries\n\n### 8-K \u2014 2026-05-07\n\n#### Key financials\n- Quarterly cash dividend declared at **$0.14 per share**, payable **June 2, 2026** to shareholders of record as of **May 19, 2026**.\n- CEO Steven A. Michaels received a one-time special equity grant of **$5 million in restricted stock units**, vesting ratably on the **3rd, 4th, and 5th anniversaries** of the grant date (granted May 7, 2026).\n\n#### Segment & competitive notes\n- None noted.\n\n#### Risk-factor changes\n- None noted.\n\n#### Material events\n- At the **May 6, 2026** Annual Meeting, **92% of shares** (36,885,068 of 40,058,369 eligible) were represented; all 10 director nominees elected, Ernst & Young LLP ratified as auditor for 2026, and the Amended and Restated 2015 Equity and Incentive Plan amendment approved (31,505,553 for vs. 3,224,113 against).\n- Effective **May 7, 2026**, the Board elected CEO Steven A. Michaels to the additional role of **Chairman of the Board**; predecessor Chairman **Ray M. Robinson** transitioned to **Lead Independent Director**.\n\n### 10-Q \u2014 2026-04-29\n\n#### Key financials\n- Q1 2026 total revenues of $742.7M vs. $668.4M in Q1 2025 (+11.1%); net earnings from continuing operations of $36.2M ($0.89 diluted EPS) vs. $34.6M ($0.83) in Q1 2025; Purchasing Power contributed $107.1M in revenues but a net loss of $7.5M in Q1 2026.\n- Total assets grew to $2.04B at March 31, 2026 from $1.61B at December 31, 2025, driven by the Purchasing Power acquisition; total debt, net rose to $936.1M from $594.9M, reflecting $291.4M of new asset-backed debt and a $125M Term Loan A drawn January 2, 2026.\n- Operating cash flow declined to $171.7M in Q1 2026 from $209.9M in Q1 2025; cash and equivalents fell sharply to $69.4M from $308.8M, as $391.8M net cash was deployed for the Purchasing Power acquisition.\n- Interest expense nearly doubled to $18.4M in Q1 2026 vs. $10.0M in Q1 2025; provision for credit losses rose to $24.2M from $5.5M, largely reflecting Purchasing Power post-acquisition originations; provision for lease merchandise write-offs declined to $43.7M from $48.0M.\n\n#### Segment & competitive notes\n- Progressive Leasing remains the dominant segment; lease revenues and fees of $596.9M declined ~8.4% vs. $651.6M in Q1 2025, consistent with a continued normalization of origination volumes; POS partner rebates/incentives fell modestly to $8.3M from $9.1M.\n- Purchasing Power (acquired January 2, 2026) operates as a voluntary employee benefit payroll-deduction purchasing platform with 360+ employer partnerships; its product/service revenues of $106.4M and other revenue of $39.4M are entirely new to the consolidated income statement, expanding PRG's addressable market beyond traditional lease-to-own.\n- Four Technologies (BNPL segment) loans receivable, net declined to $65.5M at March 31, 2026 from $84.4M at December 31, 2025; delinquency deteriorated with 60+ days past due rising to 10.0% of gross loans from 2.9% at year-end 2025, and gross charge-offs of $13.7M in Q1 2026 vs. $6.0M in Q1 2025.\n- Vive Financial (second-look credit card) is fully classified as discontinued operations following the October 20, 2025 portfolio sale to Fortiva; contributed only $1.1M in revenues and a $(0.2)M net loss in Q1 2026.\n\n#### Risk-factor changes\n- Tariff risk explicitly added to uncertainty language: management's estimates for lease merchandise write-off allowances and accounts receivable allowances now cite \"impacts of tariffs\" alongside inflation, elevated interest rates, and unemployment as factors creating significant estimation uncertainty.\n- Federal government employee credit risk is a new disclosed risk factor for the Purchasing Power segment: federal employees may elect to discontinue allotment deductions under applicable law, creating greater variability in collection patterns vs. non-federal payroll deductions; the Company manages these populations separately in its credit loss estimates.\n- Leverage covenant step-down schedule introduces future tightening risk: the Credit Facility requires total net debt/EBITDA of \u22643.25x through December 31, 2026, stepping down to 3.00x through 2027, and 2.50x thereafter, limiting financial flexibility as integration costs and Purchasing Power losses continue.\n\n#### Material events\n- On January 2, 2026, PROG Holdings acquired Purchasing Power for $424.2M in cash (negotiated purchase price of $420M plus $4.2M of assumed asset-backed debt repaid at closing), funded by a new $125M Term Loan A, $135M drawn on the revolving facility, and cash on hand; acquisition-related costs of $9.7M were expensed in Q1 2026.\n- On February 26, 2026, Purchasing Power closed its Series 2026-A asset-backed securitization, issuing five classes of notes (Class A\u2013E) with total face value of approximately $219.9M and rates ranging from 4.37% (Class A) to 7.54% (Class E), all maturing August 2030; proceeds refinanced the acquired warehouse facility.\n- The purchase price allocation for Purchasing Power remains preliminary as of March 31, 2026, with $319M of identified intangibles (client relationships $258M, broker relationships $24M, trade name $29M, developed technology $8M) and $110.7M of goodwill subject to adjustment within the one-year measurement period ending January 2, 2027.\n- Vive wind-down continues; remaining discontinued operations assets of $12.5M (primarily $9\n\n### 8-K \u2014 2026-04-29\n\n## PROG Holdings, Inc. \u2013 8-K Filed April 29, 2026\n\n#### Key financials\n- Filing announces Q1 2026 financial results (quarter ended March 31, 2026) via press release (Exhibit 99.1); specific revenue, earnings, and margin figures are contained in the attached exhibits, not the body of the 8-K.\n- No financial figures (revenue, net income, EPS, etc.) are disclosed within the 8-K form itself; detailed metrics require review of Exhibit 99.1 (press release) and Exhibit 99.2 (earnings supplement presentation).\n\n#### Segment & competitive notes\n- None noted.\n\n#### Risk-factor changes\n- None noted.\n\n#### Material events\n- On April 29, 2026, PROG Holdings (NYSE: PRG) filed an 8-K under Item 2.02 reporting Q1 2026 results; the press release and an earnings supplement presentation (Exhibits 99.1 and 99.2) were furnished but not \"filed\" for Section 18 Exchange Act liability purposes.\n- Filing was signed by CFO Brian Garner on April 29, 2026; company is headquartered at 256 W. Data Drive, Draper, Utah 84020.\n\n### 8-K \u2014 2026-03-10\n\n## PROG Holdings, Inc. (PRG) \u2014 8-K Filed March 10, 2026\n\n#### Key financials\n- Filing discloses an updated fiscal year 2026 outlook via press release (Exhibit 99.1), but specific guidance figures are not reproduced in the 8-K body text itself.\n- No historical financial results, revenue figures, or earnings metrics are included in the filing text provided.\n\n#### Segment & competitive notes\n- None noted.\n\n#### Risk-factor changes\n- None noted.\n\n#### Material events\n- On March 10, 2026, PROG Holdings held an Investor Day (webcast beginning 8:30 a.m. ET) at which updated FY2026 guidance was presented via press release and investor presentation (Exhibits 99.1 and 99.2).\n- Filing was made under Item 7.01 (Regulation FD Disclosure), meaning the exhibits are **furnished, not filed**, and are not incorporated by reference into Securities Act or Exchange Act filings unless expressly stated.\n- Chief Legal and Compliance Officer Todd King signed the filing on March 10, 2026; an archived replay was made available at investor.progholdings.com following the event.\n\n> **Analyst note for Snap Finance:** The actual updated FY2026 guidance metrics (GMV, revenue, loss rates, etc.) are contained in Exhibits 99.1 and 99.2, which are not reproduced here. Review those attachments for competitive benchmarking data on PRG/Progressive Leasing and Vive Financial.\n\n### 8-K \u2014 2026-03-02\n\n#### Key financials\n- Board declared a quarterly cash dividend of **$0.14 per share** of common stock on **February 25, 2026**.\n- Dividend payable **March 24, 2026** to shareholders of record as of **March 12, 2026**.\n\n#### Segment & competitive notes\n- None noted.\n\n#### Risk-factor changes\n- None noted.\n\n#### Material events\n- PROG Holdings, Inc. (NYSE: PRG) filed this 8-K on **March 2, 2026** (event date **February 25, 2026**) solely to disclose the quarterly dividend declaration; no other corporate actions, transactions, or operational updates were disclosed.\n- Filing signed by Todd King, Chief Legal and Compliance Officer, on **February 27, 2026**.\n\n### 10-K \u2014 2026-02-18\n\n#### Key financials\n- Progressive Leasing comprised ~96% of PROG Holdings' consolidated revenues for FY2025; the company does not disclose total revenue in the truncated filing text, but the two-segment structure (Progressive Leasing + Four) reflects continuing operations after Vive was classified as discontinued.\n- Personnel costs (excluding stock-based compensation) were $153.9M in 2025, down from $157.4M in 2024 and $170.8M in 2023, reflecting ongoing workforce reductions.\n- Provision for lease merchandise write-offs as a percentage of lease revenues held steady at 7.5% in both 2025 and 2024, up from 6.7% in 2023; targeted range remains 6%\u20138%.\n- Top-3 POS partners generated 54.8% of consolidated revenues in 2025; top-10 generated 77.0%.\n\n#### Segment & competitive notes\n- Progressive Leasing operates through ~24,000 third-party POS partner locations across 45 states, D.C., and Puerto Rico; Furniture/Appliances/Electronics stable at 58% of segment revenue for three consecutive years (2023\u20132025).\n- Four (BNPL segment) shifted revenue mix: Transaction Income fell to 46% of Four revenues in 2025 from 56% in 2024 and 84% in 2023, while Subscription Revenue grew to 29% from 23% in 2024 (none in 2023), signaling a deliberate model transition.\n- Vive Financial (second-look revolving credit) sold substantially all loan receivables on October 20, 2025 and reclassified as discontinued operations; Vive is no longer a reportable segment.\n- BNPL competitive pressure escalating: December 2025 multi-state AG inquiry sent to six BNPL providers (not Four); New York enacted BNPL licensing and ability-to-repay legislation in May 2025.\n\n#### Risk-factor changes\n- New risk added for Purchasing Power (acquired January 2, 2026): payroll-deduction model creates unique exposure to employer headcount reductions, payroll system changes, wage-assignment laws, and supply chain/carrier disruptions not previously relevant to the company.\n- Heightened immigration policy risk explicitly added: potential changes under the \"One Big Beautiful Bill Act\" and federal immigration enforcement cited as factors that could reduce the subprime consumer population and suppress demand.\n- Purchasing Power's reliance on non-recourse securitizations and warehouse facilities added as a distinct debt/liquidity risk; structural or performance trigger breaches could impair receivable origination.\n- AI-specific risk formalized: new language warns of accuracy issues, unintended bias, discriminatory outcomes, and evolving AI regulation as material concerns given increased deployment of generative AI tools across operations.\n\n#### Material events\n- Acquired Purchasing Power on January 2, 2026 for an undisclosed price; Purchasing Power is a voluntary employee-benefit/payroll-deduction retailer serving millions of employees and is expected to represent >30% of consolidated 2026 revenue (Progressive Leasing guided to drop below 70% share).\n- On February 6\u201317, 2026, the company established non-recourse funding debt (secured) at a subsidiary level and simultaneously drew on/modified its revolving credit facility, per subsequent-event disclosures dated February 6, February 17, and February 18, 2026.\n- Big Lots (bankruptcy September 2024, liquidation December 2024) and American Signature/Value City Furniture (bankruptcy November 2025, subsequent liquidation) both cited as former top-10 POS partners whose store closures negatively impacted 2025 results and are expected to further pressure 2026 performance.\n- Share repurchase program remained active through December 31, 2025; aggregate repurchases from program inception through 2022\u20132025 disclosed but specific 2025 dollar amount not provided in the truncated text; 39,575,810 shares outstanding as of February 12, 2026.\n\n### 8-K \u2014 2026-02-18\n\n#### Key financials\n- PROG Holdings filed an 8-K on February 18, 2026 disclosing Q4 and full-year results for fiscal year ended December 31, 2025; specific revenue, earnings, and margin figures are contained in Exhibit 99.1 (press release) and Exhibit 99.2 (earnings supplement), which are furnished but not filed and were not included in the truncated filing text.\n- No specific financial metrics (revenue, EPS, GMV, lease portfolio size) are available from the 8-K body itself.\n\n#### Segment & competitive notes\n- None noted. The 8-K body contains no segment-level disclosures or competitive commentary; any such detail would be in the unfurnished Exhibit 99.1/99.2.\n\n#### Risk-factor changes\n- None noted. This is a results-announcement 8-K (Item 2.02 only); no risk-factor updates were included.\n\n#### Material events\n- PROG Holdings (NYSE: PRG), headquartered in Draper, Utah, issued a press release on February 18, 2026 announcing Q4 and full-year FY2025 financial results alongside an earnings supplement presentation (Exhibits 99.1 and 99.2).\n- The filing was signed by CFO Brian Garner on February 18, 2026; exhibits are furnished (not filed) under SEC rules, limiting Section 18 liability.\n\n### 8-K \u2014 2026-01-02\n\n## PROG Holdings, Inc. \u2014 8-K Filed January 2, 2026\n\n#### Key financials\n- Acquisition of P-Squared, LLC (Purchasing Power) closed January 2, 2026 for approximately **$420 million in cash** (subject to customary adjustments), funded via $125M incremental term loan, $135M revolving borrowings, and cash on hand.\n- Acquired entity carries approximately **$330 million of non-recourse funding debt** under securitization and warehouse facilities, which remained in place post-closing.\n- New $125M term loan matures **November 15, 2029**; pricing set at SOFR + 1.50%\u20132.75% (or base rate equivalent, 1.00% lower), based on total net leverage.\n\n#### Segment & competitive notes\n- Acquired business is a **voluntary employee benefit program** enabling workers to purchase brand-name products/services via automatic payroll deductions with **no credit checks** \u2014 a distinct channel from traditional lease-to-own, targeting employer-sponsored point-of-sale financing.\n- This acquisition diversifies PROG beyond its core progressive leasing segment into the **workplace/payroll-deduction lending space**, a channel competitors such as Snap Finance do not prominently occupy.\n\n#### Risk-factor changes\n- Maximum permitted total net leverage covenant increased to **3.25x in FY2026**, stepping down to **3.00x in FY2027** and **2.50x thereafter**, reflecting meaningfully higher post-acquisition leverage.\n- Credit Agreement amended to add a new **$150 million restricted payment basket** and require pro forma total net leverage \u22642.50x for certain ratio-based baskets, tightening conditions on future capital returns/transactions.\n\n#### Material events\n- PROG Beach, LLC (wholly-owned subsidiary) completed acquisition of P-Squared, LLC from Purchasing Power Parent, LLC on **January 2, 2026**, pursuant to a Unit Purchase Agreement dated **December 1, 2025**.\n- Financial statements and pro forma financials for the acquired business are **not included** in this filing; PROG has up to **71 calendar days** from the filing date to submit them via amendment.\n\n### 8-K \u2014 2025-12-02\n\n#### Key financials\n- PROG Holdings agreed to acquire P-Squared, LLC (Purchasing Power) for **$420 million cash consideration**, to be funded via cash on hand and new debt financing.\n- The Acquired Entity carries approximately **$330 million of non-recourse funding debt** under existing securitization and warehouse facilities, which will remain in place post-closing; total transaction value implies roughly **$750 million in enterprise consideration**.\n\n#### Segment & competitive notes\n- The acquisition adds a **voluntary employee benefit (VEB) program** that enables workers to purchase brand-name products/services via automatic payroll deductions with **no credit checks** \u2014 a complementary, employer-channel origination model adjacent to PROG's existing lease-to-own/point-of-sale business.\n- The payroll-deduction, no-credit-check structure diversifies PROG's origination away from retail point-of-sale, potentially competing more directly with workplace benefits fintech players.\n\n#### Risk-factor changes\n- Transaction is subject to **HSR antitrust waiting period** expiration and standard regulatory/governmental order conditions; closing targeted for **early 2026** with a **120-day termination right** (~deadline late March 2026) if closing has not occurred.\n- PROG is taking on incremental debt financing risk to fund the $420 million purchase price; the $330 million non-recourse securitization debt at the target adds contingent balance sheet complexity.\n\n#### Material events\n- On **December 1, 2025**, PROG Beach, LLC (wholly-owned PROG subsidiary) entered into a Unit Purchase Agreement with Purchasing Power Parent, LLC to acquire **100% of the equity interests of P-Squared, LLC**.\n- PROG will hold an **investor conference call on December 2, 2025** to discuss the transaction; the full Purchase Agreement text will be filed as an exhibit to PROG's **Form 10-K for fiscal year ended December 31, 2025**.\n\n### 8-K \u2014 2025-11-07\n\n#### Key financials\n- PROG Holdings declared a quarterly cash dividend of **$0.13 per share** of common stock on **November 6, 2025**.\n- Dividend payable **December 2, 2025** to shareholders of record as of **November 18, 2025**.\n\n#### Segment & competitive notes\n- None noted.\n\n#### Risk-factor changes\n- None noted.\n\n#### Material events\n- Board of Directors declared the **$0.13/share quarterly cash dividend** via Item 8.01 (Other Events) on **November 6, 2025**; supporting press release filed as Exhibit 99.1.\n- Filing signed by **Todd King**, Chief Legal and Compliance Officer, on November 6, 2025.\n\n### 10-Q \u2014 2025-10-22\n\n#### Key financials\n- Q3 2025 total revenues were $595.1M, down 1.8% from $606.1M in Q3 2024; nine-month revenues were $1.884B, up 2.4% from $1.840B in the same 2024 period.\n- Q3 2025 earnings before income tax were $45.6M vs. $41.8M in Q3 2024 (+9.1%); nine-month EBT was $145.5M vs. $121.8M (+19.5%); net earnings were $33.1M in Q3 2025 vs. $84.0M in Q3 2024, with the prior-year quarter inflated by a $53.6M non-cash tax benefit reversal.\n- Cash and cash equivalents increased to $292.6M at September 30, 2025 from $95.7M at December 31, 2024; operating cash flow for the nine months was $389.9M vs. $223.0M in 2024; the company repaid its $50M revolving credit balance in January 2025 and held no borrowings at quarter-end against $350M available capacity.\n- Diluted EPS for the nine months was $2.60 vs. $3.19 in 2024; the company repurchased $51.8M of treasury stock in the nine months ended September 30, 2025 and paid $0.39/share in dividends.\n\n#### Segment & competitive notes\n- Progressive Leasing Q3 2025 GMV fell 10.0% to $410.9M from $456.7M in Q3 2024, driven by the late-2024 bankruptcy and store closures of Big Lots (a major POS partner), tightened decisioning in Q1 2025, and weak consumer confidence; active Progressive Leasing customers declined to 784K from 848K year-over-year.\n- Vive segment Q3 2025 revenues were $17.4M (vs. $16.0M in Q3 2024) with GMV up 19.5% to $46.3M, driven by expanded origination programs with national retail merchants; Vive active customers grew to 96K from 91K.\n- Four (BNPL, reported in \"Other\") GMV surged 162.8% in Q3 2025 to $163.1M and 159.0% for the nine months; Other segment interest/fee revenue reached $21.1M in Q3 2025 vs. $7.6M in Q3 2024, with $5.1M of that being subscription fee revenue; active Four customers reached 338K vs. 148K a year earlier.\n- E-commerce channels represented 23.0% of Progressive Leasing's GMV in Q3 2025, up from 16.6% in Q3 2024, indicating channel-mix shift toward digital as brick-and-mortar partners face headwinds.\n\n#### Risk-factor changes\n- The filing explicitly flags elevated macroeconomic uncertainty\u2014persistent inflation, high cost of living, elevated interest rates, rising unemployment, and tariff-related policy changes\u2014as ongoing risks that could materially affect allowance estimates for both lease merchandise write-offs and loan losses.\n- The FTC sent a written request in Q3 2024 (not a civil investigative demand) requiring Progressive Leasing to provide compliance evidence under the April 2020 FTC Settlement (originally settled for $175M); the company states it is fully cooperating, but the inquiry remains open as of the filing date.\n- The FASB issued ASU 2025-06 in September 2025 updating internal-use software accounting to a principles-based framework (effective for periods beginning after December 15, 2027); the company is still evaluating the impact, which introduces accounting-policy execution risk.\n\n#### Material events\n- On October 20, 2025, PROG Holdings completed the sale of substantially all Vive assets (primarily its credit card receivable portfolio plus customer and merchant relationships) for an estimated $149.0M cash; the company expects to recognize a pretax gain of approximately $30.0M in Q4 2025, and Vive will be reclassified as discontinued operations beginning in Q4 2025; an additional $3.0M\u2013$5.0M of restructuring costs (severance, contract termination, asset impairments) will be recorded.\n- On July 4, 2025, the One Big Beautiful Bill Act was enacted, making 100% bonus depreciation permanent for qualified property placed in service after January 19, 2025; this increased PROG's net deferred tax liability by $33.4M and income tax receivable by $38.0M, with no material expected impact to income tax expense.\n- A cybersecurity class-action consolidation arising from the Q3 2023 data breach (affecting Social Security numbers and other PII of Progressive Leasing customers) reached a settlement agreement on June 30, 2025 for $3.3M, to be paid entirely by the company's cybersecurity insurance, pending final District Court approval.\n\n### 8-K \u2014 2025-10-22\n\n#### Key financials\n- On October 20, 2025, PROG Holdings' subsidiary Vive Financial LLC sold ~$165 million in receivables (credit card and retail loan accounts) to Fortiva Funding LLC for ~$150 million in cash, implying a ~9% discount to face value.\n- Q3 2025 financial results were announced via press release on October 22, 2025 (Exhibit 99.1); specific revenue/earnings figures are not included in the 8-K body text.\n\n#### Segment & competitive notes\n- The sale covers Vive Financial's open-end credit card and retail loan portfolio, effectively exiting that product segment; a 3-year non-compete restricts Vive and its affiliates from originating, marketing, or servicing substantially similar open-end credit card products.\n- The buyer, Fortiva Funding LLC, is a subsidiary of Atlanticus Holdings Corporation (ATLC), a direct competitor in the subprime/near-prime consumer credit space.\n\n#### Risk-factor changes\n- The 3-year non-compete provision limits PROG/Vive's ability to re-enter the open-end credit card origination business, narrowing future product optionality.\n- PROG Holdings, Inc. is party to the Purchase Agreement as guarantor of Vive Financial's obligations, creating contingent liability exposure subject to customary indemnification deductibles and caps.\n\n#### Material events\n- Sale and Purchase Agreement executed October 20, 2025; Vive Financial (seller) and Fortiva Funding LLC (buyer/Atlanticus subsidiary) closed the ~$165M portfolio sale for ~$150M cash proceeds.\n- A Transition Services Agreement was simultaneously entered into, requiring Vive Financial to provide receivables processing, collection, and administration services to Fortiva for a limited post-closing period.\n\n### 8-K \u2014 2025-08-07\n\n#### Key financials\n- Board declared a quarterly cash dividend of **$0.13 per share** of common stock on **August 6, 2025**.\n- Dividend payable **September 4, 2025** to shareholders of record as of **August 19, 2025**.\n\n#### Segment & competitive notes\n- None noted.\n\n#### Risk-factor changes\n- None noted.\n\n#### Material events\n- This 8-K (filed **August 7, 2025**) reports solely a routine quarterly dividend declaration under Item 8.01 (Other Events); no acquisitions, leadership changes, or litigation disclosures were included.\n- Exhibit 99.1 (press release dated **August 7, 2025**) and an Inline XBRL cover page (Exhibit 104) are the only attachments.\n\n### 10-Q \u2014 2025-07-23\n\n#### Key financials\n- Q2 2025 total revenues: $604.7M (+2.1% vs. Q2 2024 $592.2M); H1 2025 revenues: $1,288.8M (+4.4% vs. H1 2024 $1,234.0M); revenue growth driven entirely by Interest & Fees on Loans Receivable (+61.6% to $35.0M in Q2, +57.2% to $67.5M in H1), while lease revenues were essentially flat (-0.1% Q2, +2.5% H1).\n- Q2 2025 net earnings: $38.5M (+13.9% vs. $33.8M); H1 2025 net earnings: $73.2M (+31.3% vs. $55.7M); diluted EPS Q2 $0.95 vs. $0.77; H1 $1.78 vs. $1.26; effective tax rate declined to 26.7\u201326.8% in 2025 from ~30% in 2024 due to absence of 2024 discrete tax items.\n- Balance sheet as of June 30, 2025: cash $222.0M (up $126.4M from $95.7M at Dec 31, 2024); debt net $594.2M (down $49.4M after repaying $50.0M revolver in January 2025); $350.0M revolver fully undrawn; total shareholders' equity $668.7M vs. $650.3M.\n- H1 2025 operating cash flow: $279.8M (vs. $191.1M in H1 2024); share repurchases: $51.8M in H1 2025 vs. $61.2M in H1 2024; dividends declared $0.26/share ($0.13/quarter) vs. $0.24/share in H1 2024; 39.5M shares outstanding as of July 18, 2025.\n\n#### Segment & competitive notes\n- Progressive Leasing Q2 2025 GMV: $413.9M (-8.9% vs. $454.5M in Q2 2024); active customers 802K (down from 834K); declines attributed to Big Lots bankruptcy (late 2024 store closures) and deliberate tightening of credit decisioning; e-commerce share of GMV rose to 20.9% from 14.4% year-over-year, indicating channel shift away from brick-and-mortar POS partners.\n- Vive Q2 2025 GMV: $44.0M (+23.0% vs. $35.8M); active customers 93K (up from 85K); revenue $16.2M vs. $15.4M; segment near breakeven (EBT $0.5M Q2 2025 vs. $0.6M Q2 2024); growth driven by expansion with national retail merchants.\n- Four (BNPL, reported in \"Other\"): Q2 2025 GMV $149.6M (+166.5% vs. $56.1M); Other segment revenue $18.8M vs. $6.2M; Other segment swung to EBT profit of $0.5M in Q2 2025 vs. loss of $(6.3M) in Q2 2024; Four loans receivable $32.0M at June 30, 2025 vs. $34.9M at Dec 31, 2024; loan past-dues rising (17.5% of gross loans past due vs. 16.4% at Dec 31, 2024).\n- Provision for lease merchandise write-offs improved to 7.5% of lease revenues in Q2 2025 (vs. 7.7% Q2 2024) due to tighter decisioning, but remains elevated; macroeconomic headwinds cited include persistent inflation, elevated interest rates, tariff uncertainty, and Big Lots exit as a key POS partner.\n\n#### Risk-factor changes\n- No new risk factors were added in this 10-Q (Item 1A references the 2024 Annual Report); however, management explicitly expanded qualitative disclosures around tariff-related policy uncertainty as an incremental factor affecting allowance estimation for both lease merchandise write-offs and loan losses as of June 30, 2025.\n- Legal accrual for probable losses increased to $3.8M at June 30, 2025 from $0.5M at December 31, 2024, primarily reflecting the June 30, 2025 cybersecurity litigation settlement of $3.3M (fully covered by cybersecurity insurance; receivable recorded in prepaid assets); FTC compliance inquiry (initiated Q3 2024) ongoing with full cooperation.\n\n#### Material events\n- On June 30, 2025, Progressive Leasing reached a $3.3M settlement (subject to District Court approval) resolving consolidated cybersecurity incident lawsuits stemming from the Q3 2023 data breach; the full amount is expected to be paid by the\n\n### 8-K \u2014 2025-07-23\n\n## PROG Holdings, Inc. (PRG) \u2014 8-K Filed July 23, 2025\n\n#### Key financials\n- Filing announces Q2 2025 financial results (quarter ended June 30, 2025) via press release (Exhibit 99.1) and earnings supplement presentation (Exhibit 99.2); specific revenue, earnings, and margin figures are contained in those exhibits, which are not reproduced in the 8-K body text.\n- No standalone financial figures (revenue, net income, EPS, GMV, etc.) are disclosed within the 8-K form itself.\n\n#### Segment & competitive notes\n- None noted.\n\n#### Risk-factor changes\n- None noted.\n\n#### Material events\n- On July 23, 2025, PROG Holdings filed an Item 2.02 8-K disclosing Q2 2025 results; the press release and earnings supplement are furnished (not \"filed\") under the Securities Exchange Act, meaning they carry no Section 18 liability.\n- CFO Brian Garner signed the filing on July 23, 2025; no management changes or other corporate actions were disclosed.\n\n---\n**Analyst note for Snap Finance:** This 8-K is a routine earnings announcement shell; substantive competitive data (GMV, lease portfolio size, write-off rates, merchant count) would require review of Exhibit 99.1 and 99.2, which were not included in the provided text. PRG's Progressive Leasing segment is a direct LTO competitor to Snap Finance.\n\n### 8-K \u2014 2025-05-08\n\n#### Key financials\n- Board declared a quarterly cash dividend of **$0.13 per share**, payable **June 3, 2025** to shareholders of record as of **May 20, 2025**.\n- As of the **March 10, 2025** record date, **40,604,576** shares of common stock were outstanding and entitled to vote.\n\n#### Segment & competitive notes\n- None noted.\n\n#### Risk-factor changes\n- None noted.\n\n#### Material events\n- PROG Holdings held its **2025 Annual Meeting on May 7, 2025** in Salt Lake City, Utah, with **36,765,059 shares (~91%)** represented in person or by proxy.\n- All **10 director nominees** were elected to serve until the **2026 annual meeting**; most received >89% of votes cast, though Cynthia N. Day and Ray M. Robinson received comparatively lower support (~91% and ~94% of votes cast, respectively).\n- Say-on-pay (Proposal 2) passed with **32,080,007 for vs. 1,895,381 against**; Ernst & Young LLP was ratified as independent auditor for 2025 with **35,833,814 for vs. 922,280 against**.\n\n### 10-Q \u2014 2025-04-23\n\n#### Key financials\n- Q1 2025 total revenues of $684.1 million, up 6.6% from $641.9 million in Q1 2024; lease revenues and fees $651.6 million (+5.0%) and interest/fees on loans $32.5 million (+52.6%).\n- Net earnings of $34.7 million ($0.83 diluted EPS) vs. $22.0 million ($0.49 diluted EPS) in Q1 2024, a 58.1% increase; earnings before income taxes rose to $47.2 million from $31.6 million.\n- Operating cash flow of $209.9 million in Q1 2025 vs. $135.7 million in Q1 2024; cash and equivalents ended at $213.3 million vs. $95.7 million at December 31, 2024, aided by repayment of $50.0 million revolving facility balance in January 2025.\n- Provision for lease merchandise write-offs increased to 7.4% of lease revenues vs. 7.0% in Q1 2024, with the allowance balance rising to $55.1 million from $51.9 million at year-end 2024.\n\n#### Segment & competitive notes\n- Progressive Leasing GMV declined $16.6 million (\u22124.0%) to $402.0 million in Q1 2025, attributed to a major POS partner bankruptcy in late 2024 and tightened decisioning; e-commerce share rose modestly to 16.8% of GMV from 16.3%.\n- Vive GMV increased $4.7 million (+14.8%) to $36.3 million driven by expanded origination programs with national retail merchants; Vive swung to a pre-tax loss of $0.8 million from a profit of $0.9 million in Q1 2024 due to higher loan-loss provisions amid macroeconomic uncertainty.\n- Four (BNPL segment, reported in \"Other\") GMV surged $71.1 million (+145.7%) to $119.9 million in Q1 2025 vs. $48.8 million in Q1 2024; active customers in \"Other\" grew to 388,000 from 99,000 year-over-year, reflecting continued Four expansion.\n\n#### Risk-factor changes\n- The filing explicitly states: \"The Company does not have any updates to its risk factors disclosure from that previously reported in the 2024 Annual Report.\"\n- Management added qualitative emphasis on tariff-related policy uncertainty as an incremental macroeconomic headwind affecting consumer confidence, allowance estimation, and GMV demand\u2014noted in multiple sections though not a formally new risk factor.\n\n#### Material events\n- In Q3 2024, Progressive Leasing received an FTC written request to evidence compliance with the April 2020 FTC Settlement (which had originally cost $175 million); the company is cooperating as of the filing date.\n- The cybersecurity incident (Q3 2023) litigation was partially resolved on January 16, 2025, when the U.S. District Court for the District of Utah granted in part and denied in part Progressive Leasing's June 2024 motion to dismiss the consolidated complaint; litigation remains ongoing with no estimable loss range.\n- The Company repurchased 935,992 shares for $26.1 million in Q1 2025 at average prices of $28.74\u2013$27.47; $335.2 million of the $500 million Board authorization (effective February 21, 2024) remained available as of March 31, 2025.\n\n### 8-K \u2014 2025-04-23\n\n## PROG Holdings, Inc. (PRG) \u2014 8-K Filed April 23, 2025\n\n#### Key financials\n- Filing announces Q1 2025 financial results for the quarter ended March 31, 2025, via press release (Exhibit 99.1); specific revenue, earnings, and margin figures are contained in the attached exhibit, not reproduced in the 8-K body.\n- No standalone financial figures (revenue, EPS, GMV, or loss rates) are disclosed within the 8-K text itself.\n\n#### Segment & competitive notes\n- None noted.\n\n#### Risk-factor changes\n- None noted.\n\n#### Material events\n- On April 23, 2025, PROG Holdings filed an Item 2.02 8-K disclosing Q1 2025 results, accompanied by a press release (Exhibit 99.1) and an Earnings Supplement Presentation (Exhibit 99.2).\n- The filing was signed by CFO Brian Garner on April 23, 2025; the company is headquartered at 256 W. Data Drive, Draper, Utah 84020, and trades on the NYSE under ticker **PRG**.\n\n### 8-K \u2014 2025-02-27\n\n#### Key financials\n- PROG Holdings (NYSE: PRG) declared a quarterly cash dividend of **$0.13 per share** of common stock on **February 26, 2025**.\n- Dividend payable **March 25, 2025** to shareholders of record as of **March 13, 2025**.\n\n#### Segment & competitive notes\n- None noted.\n\n#### Risk-factor changes\n- None noted.\n\n#### Material events\n- This 8-K (filed **February 27, 2025**; event date **February 26, 2025**) was filed solely under Item 8.01 (Other Events) to disclose the dividend declaration; no operational, M&A, or litigation events were reported.\n- The filing was signed by CFO **Brian Garner**; no other executive actions or guidance were included.\n\n### 10-K \u2014 2025-02-19\n\n#### Key financials\n- FY2024 total consolidated revenues were heavily concentrated in Progressive Leasing (~96% of consolidated revenues); Vive contributed ~3%; Four was immaterial (reported in \"Other\").\n- Personnel costs (excluding stock-based compensation) were $172.5M in 2024, down from $187.2M in 2023 and $194.2M in 2022, reflecting ongoing cost reduction initiatives.\n- Share repurchases in FY2024 totaled ~8.0% of outstanding shares for $138.7M; cumulative repurchases since Q4 2021 total ~29.9% of shares for $501.8M; $361.3M remaining authorization as of December 31, 2024.\n- Provision for lease merchandise write-offs as a percentage of lease revenues was 7.5% in 2024 vs. 6.7% in 2023 and 7.7% in 2022; company's targeted annual range is 6%\u20138%.\n\n#### Segment & competitive notes\n- Progressive Leasing operates through ~23,000 third-party POS partner locations across 45 states, DC, and Puerto Rico; top 3 POS partners generated 52.6% of consolidated revenues in 2024, top 10 generated 78.2%.\n- Big Lots, Inc. (a top-10 POS partner) filed Chapter 11 bankruptcy in September 2024, negatively impacting Q4 2024 results and expected to weigh on 2025 performance.\n- Vive (second reportable segment, ~3% of revenues) serves customers with FICO scores primarily between 580\u2013700 via revolving credit cards through third-party bank partners; network exceeds 6,200 POS locations.\n- Four (BNPL, reported in \"Other\") competes with larger, better-capitalized BNPL providers and faces increasing state-level regulatory scrutiny (e.g., New York legislation on fees, licensing, and ability-to-repay requirements).\n\n#### Risk-factor changes\n- New/elevated risk flagged for federal immigration policy changes that could reduce the subprime consumer population and depress demand for Progressive Leasing's products\u2014not prominently cited in prior filings.\n- Tariff risk added explicitly: potential imposition of significant tariffs on imported goods could raise POS partner merchandise prices and reduce consumer discretionary spending, pressuring GMV.\n- FTC compliance monitoring risk elevated: in Q3 2024, the FTC issued a written request for information and documents to verify Progressive Leasing's compliance with the April 2020 FTC Settlement ($175M); company is cooperating.\n- ERP/technology modernization risk introduced for FY2025: company expects to begin implementing a new ERP system and migrate a large portion of enterprise applications to a third-party cloud provider, with execution and cybersecurity risks flagged.\n\n#### Material events\n- Pennsylvania Attorney General settlement approved by court on January 26, 2024, resolving a complaint (filed August 2022) alleging violations of the Pennsylvania Rental Purchase Agreement Act; financial terms not disclosed.\n- Board of Directors authorized initiation of a quarterly cash dividend in February 2024; dividends paid each quarter of FY2024 (first dividend program in company history).\n- September 2023 cybersecurity incident at Progressive Leasing continued to generate costs and contingent liabilities through FY2024; cybersecurity insurance coverage in place but with retention and coverage limits; accrued liability balance disclosed as of December 31, 2024.\n- Share repurchase program re-authorized on February 21, 2024; as of December 31, 2024, $361.3M of repurchase authority remained outstanding under the program first established November 3, 2021.\n\n### 8-K \u2014 2025-02-19\n\n#### Key financials\n- Filing references Q4 and full-year fiscal 2024 results (period ended December 31, 2024), announced via press release dated February 19, 2025; detailed financials contained in Exhibit 99.1 (not included in truncated text).\n- No specific revenue, earnings, or balance sheet figures are disclosed within the 8-K body itself; quantitative results are embedded in the attached press release and earnings supplement presentation (Exhibit 99.2).\n\n#### Segment & competitive notes\n- None noted.\n\n#### Risk-factor changes\n- None noted.\n\n#### Material events\n- PROG Holdings, Inc. (NYSE: PRG) filed an 8-K on February 19, 2025 under Item 2.02 to report Q4 and full-year 2024 financial results, accompanied by an earnings supplement presentation (Exhibit 99.2).\n- Filing was signed by CFO Brian Garner on February 19, 2025; exhibits are furnished (not filed) and therefore not subject to Section 18 liability or automatic incorporation by reference under the Securities Act of 1933.\n\n### 8-K \u2014 2024-11-19\n\n## PROG Holdings, Inc. \u2013 8-K Summary (Filed: 2024-11-19, Event Date: 2024-11-15)\n\n#### Key financials\n- No revenue, earnings, or balance sheet figures disclosed in this filing.\n- Filing relates solely to a credit agreement amendment; no new borrowing capacity or pricing terms were disclosed in the body of the 8-K.\n\n#### Segment & competitive notes\n- None noted.\n\n#### Risk-factor changes\n- None noted.\n\n#### Material events\n- On November 15, 2024, PROG Holdings (via subsidiary Progressive Finance Holdings, LLC as borrower) executed the **Third Amendment** to its credit agreement originally dated November 24, 2020, with JPMorgan Chase Bank, N.A. as administrative agent.\n- The sole stated purpose of the amendment was to **extend the credit agreement maturity date from November 24, 2025 to November 15, 2029**, adding approximately four years of runway.\n- The amendment involves PROG Holdings and certain subsidiaries as guarantors, alongside an unnamed syndicate of bank lenders; no updated financial covenants, interest rate terms, or facility size were disclosed in the filing text.\n\n### 8-K \u2014 2024-11-13\n\n#### Key financials\n- None noted.\n\n#### Segment & competitive notes\n- None noted.\n\n#### Risk-factor changes\n- None noted.\n\n#### Material events\n- Effective November 12, 2024, PROG Holdings' Board expanded from 9 to 11 directors, appointing Robert Julian and Daniela Mielke to fill the two newly created seats.\n- Both Julian and Mielke were simultaneously appointed to the Board's Audit Committee and determined to be independent under NYSE listing standards and SEC rules applicable to audit committee members.\n- Both new directors will receive standard non-employee director compensation per the Company's Compensation Plan for Non-Employee Directors and will each execute the Company's standard indemnification agreement (form previously filed as Exhibit 10.19 to the 10-K dated February 21, 2024).\n\n### 8-K \u2014 2024-11-08\n\n## PROG Holdings, Inc. (PRG) \u2013 8-K Filed 2024-11-08\n\n#### Key financials\n- Board declared a quarterly cash dividend of **$0.12 per share** of common stock on **November 7, 2024**.\n- Dividend payable on **December 3, 2024** to shareholders of record as of **November 19, 2024**.\n\n#### Segment & competitive notes\n- None noted.\n\n#### Risk-factor changes\n- None noted.\n\n#### Material events\n- This filing is limited to a routine dividend declaration under Item 8.01 (Other Events); no acquisitions, litigation, or operational announcements were disclosed.\n- CFO **Brian Garner** signed the filing on **November 7, 2024**.\n\n### 10-Q \u2014 2024-10-23\n\n#### Key financials\n- Q3 2024 total revenues were $606.1M (+4.0% vs. $582.9M in Q3 2023); nine-month revenues were $1.840B (+0.5% vs. $1.831B). Progressive Leasing lease revenues grew 3.3% to $582.6M in Q3; Vive interest/fee revenue declined to $16.0M from $17.5M.\n- Q3 2024 net earnings were $83.9M vs. $35.0M in Q3 2023, boosted by a $53.6M non-cash income tax benefit from reversal of an uncertain tax position (FTC settlement statute of limitations expired September 2024); nine-month net earnings were $139.7M vs. $120.3M.\n- Earnings before income tax fell to $41.8M in Q3 2024 from $48.1M in Q3 2023 (-13.0%), driven by a $7.8M increase in provision for lease merchandise write-offs (7.7% of lease revenues vs. 6.6%) and a $4.6M increase in provision for loan losses.\n- Cash and cash equivalents were $221.7M at September 30, 2024 vs. $155.4M at December 31, 2023; the company repurchased $98.2M in treasury stock and paid $15.4M in dividends in the nine months ended September 30, 2024.\n\n#### Segment & competitive notes\n- Progressive Leasing GMV rose 11.6% to $456.7M in Q3 2024 vs. $409.2M in Q3 2023, driven by e-commerce integrations, direct-to-consumer marketing, and tightening of credit supply above Progressive Leasing; e-commerce share of GMV grew to 16.6% from 14.8%.\n- Vive GMV increased 10.0% to $38.8M in Q3 2024; active Vive customers were 91K vs. 88K a year earlier, with growth from expanded product offerings, though Vive posted a pre-tax loss of $1.4M in Q3 2024 vs. profit of $0.6M in Q3 2023 due to higher delinquencies.\n- Four (BNPL segment, reported in \"Other\") GMV surged to $62.1M in Q3 2024 from $19.6M in Q3 2023; active Other customers grew to 148K from 35K, reflecting rapid but still sub-reportable-threshold scale.\n- POS partner incentive costs increased to $9.0M in Q3 2024 ($25.7M YTD) from $6.3M in Q3 2023 ($20.7M YTD), reflecting increased exclusivity and volume-based payments to retail partners.\n\n#### Risk-factor changes\n- No new risk factors were added in this 10-Q (Item 1A references the 2023 Annual Report risk factors without modification); the filing notes ongoing macroeconomic risks from persistent inflation and elevated interest rates disproportionately affecting the company's non-prime customer base.\n- The FTC, pursuant to the 2020 FTC Settlement ($175M paid), issued a written request in Q3 2024 for compliance documentation including customer complaints and advertising materials; this is not a civil investigative demand but represents incremental regulatory scrutiny.\n- California DFPI subpoena (issued January 2021) regarding compliance with state consumer protection laws remains ongoing and unresolved, with potential for enforcement action and/or consent order.\n\n#### Material events\n- In September 2024, the statute of limitations expired on the uncertain tax position related to the 2020 FTC settlement deduction, resulting in a $53.6M non-cash net income tax benefit recognized in Q3 2024, including reversal of $8.6M in accrued interest; the uncertain tax position liability dropped from $55.0M at December 31, 2023 to $1.1M at September 30, 2024.\n- Consolidated cybersecurity lawsuit (plaintiffs' complaint filed April 19, 2024; Progressive Leasing motion to dismiss filed June 24, 2024) is pending in U.S. District Court for the District of Utah; aggregate incident costs net of insurance proceeds were $3.2M since Q3 2023, with $0.4M accrued as of September 30, 2024; cybersecurity insurance has a $1.0M retention.\n- Nine-month restructuring charges totaled $20.9M (vs. $2.0M in the same period 2023), driven by $9.75M in early contract termination costs, $4.5M in ROU asset impairments, $1.5M in property/equipment impairments, and $5.0M in severance; cumulative charges since 2022 inception reached $42.4M.\n\n### 8-K \u2014 2024-10-23\n\n## PROG Holdings, Inc. (PRG) \u2013 8-K Filed October 23, 2024\n\n#### Key financials\n- Filing announces Q3 2024 financial results for the quarter ended September 30, 2024, via press release (Exhibit 99.1) dated October 23, 2024; specific revenue, earnings, and margin figures are contained in the attached exhibit, which is not included in the filing text provided.\n- An earnings supplement presentation (Exhibit 99.2) was also furnished on October 23, 2024, but detailed figures are not reproduced in the filing body.\n\n#### Segment & competitive notes\n- None noted; no segment-level detail or competitive commentary is included in the 8-K filing text itself.\n\n#### Risk-factor changes\n- None noted; this is a results-announcement 8-K (Item 2.02) and contains no updated risk-factor disclosures.\n\n#### Material events\n- PROG Holdings filed under Item 2.02 (Results of Operations and Financial Condition) on October 23, 2024, reporting Q3 2024 earnings; press release and supplement are furnished but explicitly not \"filed\" for Section 18 liability purposes.\n- CFO Brian Garner signed the filing on October 23, 2024; company is headquartered at 256 W. Data Drive, Draper, Utah, and trades on NYSE under ticker **PRG**.\n\n### 8-K \u2014 2024-08-09\n\n#### Key financials\n- Board declared a quarterly cash dividend of **$0.12 per share** of common stock on **August 8, 2024**.\n- Dividend payable **September 3, 2024** to shareholders of record as of **August 20, 2024**.\n\n#### Segment & competitive notes\n- None noted.\n\n#### Risk-factor changes\n- None noted.\n\n#### Material events\n- PROG Holdings (NYSE: PRG) filed this 8-K on **August 9, 2024** under Item 8.01 (Other Events) solely to disclose the quarterly dividend declaration.\n- No other corporate actions, acquisitions, guidance updates, or operational announcements were included in the filing.\n\n### 10-Q \u2014 2024-07-24\n\n#### Key financials\n- Q2 2024 total revenues were $592.2M, essentially flat vs. $592.8M in Q2 2023; H1 2024 revenues were $1.234B, down 1.1% from $1.248B in H1 2023.\n- Q2 2024 net earnings declined 9.3% to $33.8M ($0.77 diluted EPS) from $37.2M ($0.79) in Q2 2023; H1 2024 net earnings fell 34.6% to $55.7M from $85.3M, driven largely by $20.9M in restructuring charges (vs. $1.7M in H1 2023).\n- Cash and cash equivalents rose to $250.1M at June 30, 2024 from $155.4M at December 31, 2023; operating cash flow was $191.1M for H1 2024 vs. $205.4M in H1 2023.\n- Total debt remained ~$592.9M (6.00% Senior Notes due 2029; $350M revolving facility fully undrawn); company repurchased $61.2M of shares in H1 2024 and initiated a $0.12/share quarterly dividend (aggregate $10.3M paid in H1 2024).\n\n#### Segment & competitive notes\n- Progressive Leasing Q2 2024 GMV increased 7.9% to $454.5M vs. $421.2M in Q2 2023, attributed to tightening of credit supply above Progressive Leasing driving increased lease applications and e-commerce/direct-to-consumer initiatives; e-commerce was 14.4% of GMV (vs. 15.0% in Q2 2023).\n- Vive GMV declined 10.3% to $35.8M in Q2 2024 vs. $39.9M in Q2 2023 due to weaker customer demand at Vive POS partners; Vive segment pretax earnings fell 64.1% to $0.6M in Q2 2024 from $1.8M in Q2 2023.\n- Four (BNPL subsidiary) GMV surged to $56.1M in Q2 2024 from $14.6M in Q2 2023 (+284%); H1 2024 Four GMV rose approximately 272% vs. H1 2023, with Four revenue (within \"Other\") reaching $6.2M in Q2 2024 vs. $0.8M in Q2 2023, but the segment continues to generate pretax losses ($6.3M loss in Q2 2024).\n- Progressive Leasing active customers were 834K at June 30, 2024, slightly below 843K a year earlier, reflecting the challenging macro environment despite improved GMV trends.\n\n#### Risk-factor changes\n- No new risk factors were added in this 10-Q; the filing references readers to risk factors in the 2023 Annual Report (filed February 21, 2024), with no material modifications disclosed in Item 1A.\n- The filing reiterates ongoing macro risks\u2014elevated inflation (particularly housing, food, gas), high interest rates, and potential recession\u2014as disproportionately affecting the company's subprime/near-prime customer base and suppressing consumer demand at POS partners.\n\n#### Material events\n- Cybersecurity incident (Q3 2023): Multiple lawsuits consolidated into a single action in the U.S. District Court for the District of Utah; plaintiffs filed a consolidated complaint April 19, 2024; Progressive Leasing filed a motion to dismiss June 24, 2024; aggregate costs since incident totaled $3.1M through June 30, 2024, with $0.4M accrued; cybersecurity insurance maintained subject to $1.0M retention.\n- Restructuring: Company recorded $20.9M in restructuring charges in H1 2024 (vs. $1.7M in H1 2023), including $7.8M for early termination of an independent sales agent agreement, $6.0M in ROU asset and fixed asset impairments tied to office space reductions, and $5.0M in employee severance; aggregate charges since 2022 inception reached $42.4M.\n- California DFPI subpoena (received January 2021) regarding compliance with state consumer protection laws remains open; the company acknowledges it may lead to an enforcement action or consent order but has fully cooperated.\n\n### 8-K \u2014 2024-07-24\n\n#### Key financials\n- Filing announces Q2 2024 financial results (quarter ended June 30, 2024), disclosed via press release (Exhibit 99.1) and earnings supplement presentation (Exhibit 99.2) dated July 24, 2024; detailed figures are contained in those exhibits, which are not reproduced in the 8-K body.\n- No specific revenue, EPS, or balance sheet figures are included in the 8-K form itself; full financials require review of Exhibit 99.1.\n\n#### Segment & competitive notes\n- None noted.\n\n#### Risk-factor changes\n- None noted.\n\n#### Material events\n- PROG Holdings, Inc. (NYSE: PRG) filed an 8-K on July 24, 2024 under Item 2.02, reporting Q2 2024 results via press release; the exhibit is furnished (not filed) and thus not subject to Section 18 liability.\n- CFO Brian Garner signed the filing; company is headquartered at 256 W. Data Drive, Draper, Utah 84020.\n"}, {"slug": "upbound-group", "type": "sec-filing", "title": "Upbound Group \u2014 SEC Filings", "significance": "", "significance_reason": "", "category": "", "tier": "", "segment": "", "sae": "", "partner": "", "competitor": "acima", "date": "", "parent": "Upbound Group", "ticker": "UPBD", "publisher": "", "url": "", "owner_name": "", "owner_slug": "", "count": "28", "tags": [], "sources": [], "content": "---\ntitle: Upbound Group \u2014 SEC Filings\ntype: sec-filing\ncompetitor: [[acima]]\nparent: Upbound Group\nticker: UPBD\ncount: 28\ncreated: 2026-06-15\nupdated: 2026-06-15\n---\n\n# Upbound Group \u2014 SEC Filings\n\n_Updated: June 15, 2026_  \u00b7  Filer for [[acima]] (UPBD)\n\n## Filings\n\n| Form | Filed | Period | Document | Local |\n| --- | --- | --- | --- | --- |\n| 8-K | 2026-06-03 | 2026-06-02 | [EDGAR](https://www.sec.gov/Archives/edgar/data/933036/000110465926069652/tm2616108d1_8k.htm) | [file](../../sec-filings/upbound-group/2026-06-03_8-K_0001104659-26-069652.htm) |\n| 8-K | 2026-05-19 | 2026-05-15 | [EDGAR](https://www.sec.gov/Archives/edgar/data/933036/000110465926063514/tm2614908d1_8k.htm) | [file](../../sec-filings/upbound-group/2026-05-19_8-K_0001104659-26-063514.htm) |\n| 10-Q | 2026-05-01 | 2026-03-31 | [EDGAR](https://www.sec.gov/Archives/edgar/data/933036/000162828026029049/upbd-20260331.htm) | [file](../../sec-filings/upbound-group/2026-05-01_10-Q_0001628280-26-029049.htm) |\n| 8-K | 2026-04-30 | 2026-04-30 68.htm) |\n| 10-Q | 2024-10-31 | 2024-09-30 | [EDGAR](https://www.sec.gov/Archives/edgar/data/933036/000093303624000181/upbd-20240930.htm) | [file](../../sec-filings/upbound-group/2024-10-31_10-Q_0000933036-24-000181.htm) |\n| 8-K | 2024-10-31 | 2024-10-31 | [EDGAR](https://www.sec.gov/Archives/edgar/data/933036/000093303624000177/upbd-20241031.htm) | [file](../../sec-filings/upbound-group/2024-10-31_8-K_0000933036-24-000177.htm) |\n| 8-K | 2024-09-10 | 2024-09-10 | [EDGAR](https://www.sec.gov/Archives/edgar/data/933036/000110465924098378/tm2423294d1_8k.htm) | [file](../../sec-filings/upbound-group/2024-09-10_8-K_0001104659-24-098378.htm) |\n| 10-Q | 2024-08-01 | 2024-06-30 | [EDGAR](https://www.sec.gov/Archives/edgar/data/933036/000093303624000137/upbd-20240630.htm) | [file](../../sec-filings/upbound-group/2024-08-01_10-Q_0000933036-24-000137.htm) |\n| 8-K | 2024-08-01 | 2024-08-01 | [EDGAR](https://www.sec.gov/Archives/edgar/data/933036/000093303624000133/upbd-20240801.htm) | [file](../../sec-filings/upbound-group/2024-08-01_8-K_0000933036-24-000133.htm) |\n| 8-K | 2024-07-23 | 2024-07-22 | [EDGAR](https://www.sec.gov/Archives/edgar/data/933036/000110465924081581/tm2419929d1_8k.htm) | [file](../../sec-filings/upbound-group/2024-07-23_8-K_0001104659-24-081581.htm) |\n\n## Filing summaries\n\n### 8-K \u2014 2026-06-03\n\n#### Key financials\n- None noted.\n\n#### Segment & competitive notes\n- None noted.\n\n#### Risk-factor changes\n- None noted.\n\n#### Material events\n- On June 2, 2026, Upbound Group (UPBD) held its 2026 Annual Meeting; stockholders approved the 2026 Long-Term Incentive Plan (2026 LTIP) with 40,285,981 votes for vs. 1,785,824 against; upon approval, the prior 2021 LTIP was closed to new awards and all remaining unissued shares under it were cancelled.\n- The 2026 LTIP authorizes up to 4,590,636 shares of common stock (reduced from the originally authorized 4,700,000 by shares granted under the 2021 LTIP between March 11, 2026 and June 2, 2026); award forms filed include RSU, PSU, and Director DSU agreements (Exhibits 10.3\u201310.5).\n- All seven director nominees were re-elected (Proposal 1); Deloitte & Touche LLP was ratified as auditor for fiscal year ending December 31, 2026 with 51,048,562 votes for; named executive officer compensation for FY2025 received advisory approval with 41,399,464 votes for.\n- Stockholders voted in favor of annual say-on-pay frequency (40,078,425 votes for \"1 Year\"); the Board confirmed it will hold annual advisory say-on-pay votes through at least the 2032 annual meeting.\n\n### 8-K \u2014 2026-05-19\n\n#### Key financials\n- None noted.\n\n#### Segment & competitive notes\n- None noted.\n\n#### Risk-factor changes\n- Departure of EVP, General Counsel & Corporate Secretary Bryan Pechersky (effective June 5, 2026) removes a key legal/compliance officer; no successor named in the filing, creating a potential short-term governance gap.\n\n#### Material events\n- Bryan Pechersky notified Upbound Group (UPBD) of his resignation as EVP, General Counsel and Corporate Secretary on May 15, 2026, effective June 5, 2026.\n- The company explicitly stated the resignation was not due to any disagreement over operations, policies, or practices.\n- Filing signed May 19, 2026 by CFO Hal Khouri; no interim or permanent replacement disclosed.\n\n### 10-Q \u2014 2026-05-01\n\n#### Key financials\n- Q1 2026 total revenues of $1.219B, up 3.7% from $1.176B in Q1 2025; net earnings of $35.8M ($0.61 diluted EPS) vs. $24.8M ($0.42 diluted EPS) in Q1 2025.\n- Operating profit improved to $77.4M from $62.6M in Q1 2025; gross profit rose to $586.5M from $550.1M; interest expense declined slightly to $26.9M from $27.8M.\n- Cash from operations of $170.7M (vs. $148.0M in Q1 2025); cash ended at $98.4M vs. $120.5M at Dec. 31, 2025, after net debt repayment of ~$131M in Q1 2026.\n- Total debt at March 31, 2026: Term Loan $870.6M (rate 6.42%), ABL $135.0M (rate 5.76%), Senior Notes $450M (6.375%, due Feb. 2029); legal accruals rose to $74.2M from $72.0M at Dec. 31, 2025.\n\n#### Segment & competitive notes\n- Acima (virtual LTO) Q1 2026 revenues $648.7M (+1.8% YoY), segment operating profit $77.3M vs. $73.7M; lease charge-offs $57.3M vs. $56.7M; primary growth driver for UPBD and direct competitor to Snap Finance in point-of-sale LTO.\n- Brigit (financial health/EWA) contributed $67.7M in subscription/fee revenues in Q1 2026 vs. $31.9M for the partial period (Feb.\u2013Mar.) in Q1 2025; segment operating profit $18.6M vs. $8.8M; customer cash advances grew to $63.7M from $59.0M at Dec. 31, 2025, with 74% current (0\u201315 days).\n- Rent-A-Center Q1 2026 revenues $481.6M (down 1.5% YoY), segment operating profit $62.3M vs. $66.4M; e-commerce represented ~28% of LTO revenues vs. ~27% in Q1 2025, signaling continued channel shift.\n- Mexico segment swung to a segment operating loss of $(0.1M) in Q1 2026 vs. profit of $1.2M in Q1 2025 on revenues of $21.8M vs. $18.2M, pressured by FX and cost headwinds.\n\n#### Risk-factor changes\n- Multistate/DC Attorneys General investigation (43 states) of Acima's LTO practices: DC settlement finalized in Q1 2026; company states it is \"nearing a non-binding agreement in principle\" with the Multistate Executive Committee, but no binding deal exists; $74.2M legal accrual as of March 31, 2026 includes expected Multistate monetary relief.\n- New tariff/trade policy risk explicitly added: the filing flags \"ongoing changes in tariff policies, including impacts from tariffs proposed or imposed by the current U.S. Presidential Administration on the price of imported goods\" as a material forward-looking risk to costs and target consumers.\n- AI governance risk newly enumerated: filing adds \"risks from development, deployment and governance of artificial intelligence (AI) and adjacent technologies, including technical failures or inaccuracies, rapid adoption by our competitors, and evolving regulatory requirements\" as a distinct risk factor.\n\n#### Material events\n- McBurnie class action (California Acceptance Now fees) settled for $14.0M; settlement approved by the U.S. District Court for the Northern District of California and payment made in April 2026; fully reserved as of March 31, 2026.\n- Brigit acquisition (closed Jan. 31, 2025, $395.4M total consideration) purchase price allocation finalized as of Dec. 31, 2025; $37.5M deferred consideration payment due ~Feb. 1, 2026 (30 days post first anniversary) and remaining $37.5M due by ~Feb. 1, 2027; up to $60M earnout based on 2026 Brigit financial metrics (fair valued at $10.6M at close).\n- Executive change: Balaji Kumar appointed EVP & Chief Technology Officer effective March 30, 2026, bringing 25+ years of financial services and retail technology leadership.\n- Cash flow statement correction disclosed: Q1 2025 cash provided by operating activities and cash used in investing activities were each understated by $10.2M due to misclassification of Brigit customer cash advance net originations; restated in this filing with no P&L or balance sheet impact.\n\n### 8-K \u2014 2026-04-30\n\n#### Key financials\n- Q1 2026 financial results announced via press release and earnings release dated April 30, 2026, covering the quarter ended March 31, 2026; specific revenue, EPS, and EBITDA figures are contained in Exhibits 99.1 and 99.2, which are not reproduced in the 8-K body text.\n- No quantitative financial metrics (revenue, net income, margins, or guidance) are disclosed within the 8-K filing text itself.\n\n#### Segment & competitive notes\n- None noted.\n\n#### Risk-factor changes\n- None noted.\n\n#### Material events\n- On April 30, 2026, Upbound Group, Inc. (UPBD) filed an 8-K under Items 2.02 and 7.01 to furnish Q1 2026 earnings materials, including a press release (Exhibit 99.1), earnings release (Exhibit 99.2), and investor presentation (Exhibit 99.3).\n- The filing was signed by Hal Khouri, EVP and CFO, on April 30, 2026; exhibits are furnished (not filed) and therefore not subject to Section 18 liability or automatic incorporation by reference under the Securities Act of 1933.\n\n### 10-K \u2014 2026-02-23\n\n#### Key financials\n- Filing covers FY2025 (ended December 31, 2025); aggregate market cap of non-affiliate shares was ~$1.41B as of June 30, 2025, with 58.1M shares outstanding as of February 13, 2026.\n- Four operating segments reported for FY2025: Acima, Rent-A-Center, Brigit (new, from January 31, 2025), and Mexico; Franchising segment was folded into Rent-A-Center effective January 1, 2025.\n- Top merchandise suppliers in 2025: Ashley Furniture Industries (~37% of purchases), LG Electronics (~11%), and Whirlpool (~10%); no other single supplier exceeded 10%.\n- Term loan refinanced August 19, 2025; revolving credit facility amended June 7, 2024; company carries senior notes issued February 17, 2021, plus outstanding senior term loan and ABL revolver.\n\n#### Segment & competitive notes\n- Acima (virtual/staffed LTO via third-party retailers) remains the largest segment; competes directly with other virtual LTO providers including BNPL, fintech, and subprime lenders; third-party retailers may simultaneously offer competing LTO solutions at the same locations.\n- Rent-A-Center segment (company-owned stores + e-commerce + franchising, U.S. and Puerto Rico) operated 84 LTO stores and 22 Acima staffed locations in North Carolina, 30 Get It Now installment stores in Wisconsin, 18 stores in New Jersey, and 20 Home Choice stores in Minnesota as of December 31, 2025.\n- Brigit segment (acquired January 31, 2025) competes in EWA, credit-building, and financial health technology; faces competition from other EWA providers and fintech companies; Brigit previously settled with the FTC and carries ongoing compliance obligations.\n- Mexico segment operates company-owned LTO stores; appliances sourced locally; total employee base at December 31, 2025 was 12,050, including 1,050 in Mexico operations.\n\n#### Risk-factor changes\n- New Brigit-specific risks added for FY2025, including: reliance on regulated bank partners, FTC settlement compliance obligations, evolving EWA state/federal regulation (noting December 2025 CFPB advisory opinion withdrawing prior proposed interpretive rule treating EWA as credit), and licensing/registration requirements across states.\n- Tariff risk materially expanded: filing explicitly calls out the current U.S. Presidential Administration's enacted and potential future tariffs on imports as a new risk to merchandise costs, consumer discretionary income, and demand; previously a more generic trade risk.\n- AI governance risk added as a distinct risk factor, covering technical failures, rapid competitor adoption, and evolving regulatory requirements that may restrict AI uses or increase compliance costs.\n- Brigit acquisition integration risks formalized as a standalone risk category, including inability to realize synergies, retention of key Brigit personnel, unanticipated liabilities, and higher-than-expected integration costs.\n\n#### Material events\n- Acquisition of Bridge IT, Inc. (\"Brigit\") closed January 31, 2025; consideration included cash plus restricted stock/RSU replacement awards issued at closing; Brigit established as a new operating segment with results consolidated from January 31, 2025 onward; transaction costs incurred in both FY2024 and FY2025.\n- Divestiture of a Rent-A-Center related entity closed September 9, 2024, generating a gain recognized in FY2024; financial data for the Rent-A-Center segment has been recast for prior periods to reflect the January 1, 2025 combination of Franchising into Rent-A-Center.\n- Term loan facility amended and repriced on August 19, 2025 under the Credit Agreement, replacing prior terms; revolving credit facility was also modified on June 7, 2024, with SOFR-based pricing ranging from minimum to maximum spreads.\n- CFPB withdrew its proposed interpretive rule on EWA in December 2025 nd during the week of January 25, 2026; trading restrictions apply to company securities acquired in connection with director or executive officer service.\n- Filing is pursuant to Section 306 of Sarbanes-Oxley Act of 2002 and SEC Regulation BTR Rule 104; inquiries may be directed to Upbound's Benefits Department at (866) 331-2769 for up to two years following the blackout end date.\n\n### 10-Q \u2014 2025-10-31\n\n**Upbound Group, Inc. (UPBD) \u2014 10-Q for Quarter Ended September 30, 2025 (Filed October 31, 2025)**\n\n---\n\n#### Key financials\n- Q3 2025 total revenues of $1.165B vs. $1.069B in Q3 2024 (+9.0% YoY); 9-month 2025 revenues of $3.499B vs. $3.241B in 9-month 2024 (+8.0% YoY), driven largely by Brigit subscription/fee revenue of $57.7M in Q3 and $141.4M YTD (no prior-year equivalent).\n- Q3 2025 net earnings of $13.2M ($0.22 diluted EPS) vs. $30.9M ($0.55) in Q3 2024; 9-month 2025 net earnings of $53.5M ($0.91 diluted EPS) vs. $92.5M ($1.66), with operating profit declining to $166.1M from $212.5M, pressured by $162.1M in other gains and charges YTD (vs. $79.9M prior year), including $55.8M in legal accruals and $43.2M in Brigit-related costs.\n- Total assets rose to $3.212B at September 30, 2025 from $2.650B at December 31, 2024, primarily reflecting Brigit acquisition goodwill of $196.9M and intangibles of $152.3M; total debt (senior debt + senior notes) increased to ~$1.564B from ~$1.310B, with Term Loan at $875.0M and ABL at $239.0M outstanding.\n- Cash from operations for 9 months 2025 was $264.0M vs. $166.7M in 2024; dividends declared of $1.17 per share YTD 2025 vs. $1.11 in 2024; no share repurchases in either 9-month period; ~$235.0M remaining under the December 2021 buyback authorization.\n\n---\n\n#### Segment & competitive notes\n- Acima (virtual lease-to-own, primary competitor-relevant segment): Q3 2025 revenues of $625.3M vs. $566.2M in Q3 2024 (+10.5%); YTD revenues of $1.882B vs. $1.680B (+12.0%); segment operating profit of $63.7M in
