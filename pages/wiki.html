<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Managed Accounts — Weekly Events Briefing</title>
<meta name="wiki-proxy-url" content="">
<meta name="wiki-api-key" content="">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.9/dist/purify.min.js"></script>
<style>
/* ============================================================
   Managed Accounts Wiki — re-skin v3
   Snap Finance / OneSnap-Sparkles tokens, Bloomberg/FT density.
   Drop-in replacement for the prior Arial+green theme.
   ============================================================ */

/* ---- Brand face ----
   Brand mandates Arial only (SNAP_DESIGN_GUIDE §4) — no web-font import.
   (Dead Gellix @font-face block removed: the woff files were never deployed
   and the brand face is Arial.) */

:root{
  color-scheme: light;

  /* Snap canonical brand palette (SNAP_DESIGN_GUIDE §1) */
  --snap-blue:        #3D5CCF;   /* links / secondary interactive */
  --snap-blue-hover:  #324BA8;
  --snap-blue-pressed:#26397f;
  --snap-medium-blue: #5FA4F9;
  --snap-light-blue:  #EAF2FF;   /* info tint */
  --snap-pale-blue:   #F0F5FA;   /* soft blue surface */
  --snap-yellow:      #FFCA4D;   /* caution / decorative accent only */
  --snap-yellow-pale: #FFF7E1;

  --snap-green:       #1B844A;   /* primary brand accent / CTA / active */
  --snap-green-hover: #156B3C;
  --snap-green-2:     #67B25E;   /* eyebrow on dark */
  --snap-green-tint:  rgba(27,132,74,.10);
  --snap-navy:        #062D4E;   /* structural / sidebar / headings */
  --snap-navy-2:      #04223C;

  --snap-black:    #062D4E;      /* use navy where you'd reach for black */
  --snap-grey-700: #353849;      /* body text (brand Dark Gray) */
  --snap-grey-500: #696969;
  --snap-grey-400: #888888;
  --snap-grey-300: #CCCCCC;
  --snap-grey-200: #E0E0E0;
  --snap-grey-100: #ECECEC;
  --snap-grey-50:  #F8F8F8;

  --snap-success:   #27500A;
  --snap-success-bg:#EAF3DE;
  --snap-warning:   #854F0B;
  --snap-warning-bg:#FAEEDA;
  --snap-error:     #A32D2D;
  --snap-error-bg:  #FCEBEB;

  /* Aliases used by the rest of the file */
  --accent:        var(--snap-blue);     /* links stay blue (guide) */
  --accent-hover:  var(--snap-blue-hover);
  --accent-tint:   var(--snap-light-blue);
  --brand:         var(--snap-green);    /* primary brand weight */
  --brand-hover:   var(--snap-green-hover);
  --ink:           var(--snap-navy);     /* headings / strong / numerals */
  --ink-2:         var(--snap-grey-700); /* body */
  --muted:         var(--snap-grey-500);
  --faint:         var(--snap-grey-400);
  --line:          var(--snap-grey-200);
  --line-strong:   var(--snap-grey-300);
  --bg:            #FFFFFF;
  --bg-soft:       var(--snap-grey-50);

  --hi-bg:         var(--snap-yellow-pale);
  --hi-fg:         #854F0B;
  --risk-fg:       var(--snap-warning);
  --risk-bg:       var(--snap-warning-bg);
  --growth-fg:     var(--snap-green);
  --growth-bg:     var(--snap-success-bg);
  --ma-fg:         var(--snap-blue);
  --ma-bg:         var(--snap-light-blue);

  --font-sans: 'Arial', 'Helvetica Neue', Helvetica, sans-serif;
  --font-mono: ui-monospace, 'SF Mono', 'JetBrains Mono', Menlo, Consolas, monospace;

  --radius-sm: 2px;
  --radius-md: 4px;
  --radius-lg: 8px;

  --shadow-1: 0 1px 2px rgba(26,26,26,.05), 0 1px 3px rgba(26,26,26,.06);
  --shadow-2: 0 2px 4px rgba(26,26,26,.06), 0 6px 16px rgba(26,26,26,.06);
}

*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
html, body, #root { height:100%; overflow:hidden; background:var(--bg); }
body{
  font-family:var(--font-sans);
  font-size:14px; line-height:1.5;
  color:var(--ink);
  background:var(--bg);
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
  font-feature-settings:"ss01","cv11","tnum";
  letter-spacing:.005em;
}
button{ font-family:inherit; }

/* tabular numerals for any data-y span */
.briefing-header .meta strong,
.comp-entry .ticker, .comp-entry .date,
.industry-event-date,
.trend-number,
time, .num,
.led-row .led-bar-wrap .led-count,
.sae-jump-count, .lb-count,
.kpi-value,
.event-row .ev-date,
.stat-strip .stat-num,
table td, table th{
  font-variant-numeric: tabular-nums;
}

/* ============================================================
   App layout
   ============================================================ */
.app-layout{ display:flex; height:100%; background:var(--bg); }
.sidebar{
  width:240px; min-width:240px; flex-shrink:0;
  background:var(--bg);
  color:var(--ink-2);
  border-right:1px solid var(--line);
  display:flex; flex-direction:column;
  overflow-y:auto;
  padding:18px 14px 24px;
}
.main-content{
  flex:1; overflow-y:auto;
  padding:0 0 80px;
  background:var(--bg);
}
.wrap{ max-width:1180px; margin:0; padding:24px 32px 80px; }

/* sidebar sections */
.sidebar::before{
  content:"OneSnap"; display:block;
  font-size:10px; font-weight:700; letter-spacing:.18em; text-transform:uppercase;
  color:var(--snap-blue); padding:0 8px 4px;
}
.sidebar::after{
  content:""; display:block; height:1px; background:var(--line);
  margin:0 4px 14px;
}
.sidebar-section{ margin-bottom:14px; }
.sidebar-section-title{
  font-size:10px; font-weight:700; letter-spacing:.12em; text-transform:uppercase;
  color:var(--faint);
  margin-bottom:6px; padding:4px 8px;
  cursor:pointer; display:flex; align-items:center; gap:6px; user-select:none;
}
.sidebar-section-title .sidebar-chevron{
  font-size:8px; transition:transform .18s ease; display:inline-block; color:var(--faint);
}
.sidebar-section-title .sidebar-chevron.open{ transform:rotate(90deg); }
.sidebar-section-items{ overflow:hidden; transition:max-height .2s ease; }
.sidebar-section-items.collapsed{ max-height:0 !important; }

.sidebar-item{
  display:flex; align-items:center; justify-content:space-between;
  padding:6px 10px; border-radius:var(--radius-md);
  cursor:pointer; font-size:13px; line-height:18px;
  color:var(--ink-2); user-select:none;
  border-left:2px solid transparent;
  transition:background .12s, border-color .12s, color .12s;
}
.sidebar-item:hover{ background:var(--bg-soft); color:var(--ink); }
.sidebar-item.active{
  background:var(--snap-pale-blue);
  color:var(--snap-blue);
  border-left-color:var(--snap-blue);
  font-weight:600;
}
.sidebar-item .count-badge{
  font-size:10px; color:var(--muted); font-family:var(--font-mono);
  background:transparent; padding:0; border-radius:0;
  font-variant-numeric:tabular-nums;
  min-width:18px; text-align:right;
}
.sidebar-item.active .count-badge{ color:var(--snap-blue); }

.sidebar-divider{ height:1px; background:var(--line); margin:10px 4px; }

/* Hide sidebar sections that have no items (e.g. SAE Books / Industries
   when no pages of that type exist in the dataset). */
.sidebar-section:has(.sidebar-section-items:empty){ display:none; }

/* global search */
.sidebar-search{ position:relative; margin-bottom:14px; }
.sidebar-search-input{
  width:100%; box-sizing:border-box;
  padding:8px 10px; font-size:13px;
  border:1px solid var(--line); border-radius:7px;
  background:var(--snap-grey-50); color:var(--ink);
  outline:none; transition:border-color .15s ease, box-shadow .15s ease;
}
.sidebar-search-input::placeholder{ color:var(--faint); }
.sidebar-search-input:focus{
  border-color:var(--accent);
  box-shadow:0 0 0 3px var(--accent-tint);
  background:#fff;
}
.sidebar-search-results{
  margin-top:6px;
  max-height:360px; overflow-y:auto;
  border:1px solid var(--line); border-radius:7px;
  background:#fff;
  box-shadow:0 4px 14px rgba(0,0,0,.06);
}
.sidebar-search-empty{ padding:10px; font-size:12px; color:var(--muted); }
.sidebar-search-item{
  display:flex; flex-direction:column; gap:2px;
  padding:7px 10px; cursor:pointer;
  border-bottom:1px solid var(--snap-grey-100);
}
.sidebar-search-item:last-child{ border-bottom:none; }
.sidebar-search-item:hover{ background:var(--accent-tint); }
.sidebar-search-type{
  font-size:9px; font-weight:700; letter-spacing:.1em; text-transform:uppercase;
  color:var(--accent);
}
.sidebar-search-title{ font-size:12.5px; line-height:1.3; color:var(--ink); }
.sidebar-search-date{ font-size:10px; color:var(--faint); }

/* ============================================================
   Briefing masthead — newspaper-style
   ============================================================ */
.briefing-header{
  position:relative;
  padding:24px 32px 0;
  margin:0 0 0;
  border-bottom:1px solid var(--line);
  background:var(--bg);
}
.briefing-header::before{
  content:""; position:absolute; left:0; right:0; top:0; height:3px;
  background:var(--snap-blue);
}
.briefing-header h1{
  font-family:var(--font-sans);
  font-size:30px; line-height:36px; letter-spacing:-.02em; font-weight:700;
  color:var(--ink); margin:14px 0 4px;
}
.briefing-header .sub{
  color:var(--muted); font-size:13px; margin-bottom:18px;
}
.briefing-header .sub::before{
  content:"DAILY BRIEFING";
  display:inline-block;
  background:var(--snap-blue); color:#fff;
  font-size:10px; line-height:1; font-weight:700; letter-spacing:.14em;
  padding:5px 8px; margin-right:10px; border-radius:2px;
  vertical-align:1px;
  font-feature-settings:normal;
  white-space:nowrap;
}

/* Stat strip – Bloomberg-y, single row, large numerals.
   Underlying markup is `<strong>46</strong> partner events`; for the first
   three counts we want the number BIG above the label. The fourth span has
   `<strong>Window:</strong> May 1 – May 8, 2026` — different shape — so we
   render it inline.
*/
.briefing-header .meta{
  display:grid; grid-template-columns:repeat(4, minmax(0,1fr));
  gap:0;
  border-top:1px solid var(--line);
  margin:0 -32px;
  padding:0;
  font-size:13px; color:var(--muted);
}
.briefing-header .meta > span{
  display:flex; flex-direction:column-reverse; align-items:flex-start;
  gap:4px;
  padding:14px 32px;
  border-right:1px solid var(--line);
  font-size:11px; text-transform:uppercase; letter-spacing:.1em;
  color:var(--muted); line-height:1.3;
  position:relative; min-height:74px;
}
.briefing-header .meta > span:last-child{ border-right:none; }
.briefing-header .meta strong{
  display:block;
  font-size:24px; line-height:28px;
  font-weight:700; letter-spacing:-.02em;
  color:var(--ink);
  font-variant-numeric:tabular-nums;
  text-transform:none;
}
/* Last span is "Window: <date range>" — flatten back to inline */
.briefing-header .meta > span:last-child{
  flex-direction:column; align-items:flex-start;
  font-size:13px; text-transform:none; letter-spacing:0; color:var(--ink);
  font-weight:500;
}
.briefing-header .meta > span:last-child strong{
  font-size:10px; line-height:14px; font-weight:700; letter-spacing:.12em;
  text-transform:uppercase; color:var(--muted);
  margin-bottom:4px;
}

/* ============================================================
   Page header (non-edition)
   ============================================================ */
.page-header{
  margin:0 0 18px; padding:24px 32px 18px;
  border-bottom:1px solid var(--line);
  background:var(--bg);
}
.page-header .page-type{
  display:inline-block; font-size:10px; font-weight:700;
  text-transform:uppercase; letter-spacing:.14em;
  background:var(--snap-pale-blue); color:var(--snap-blue);
  padding:3px 8px; border-radius:2px; margin-bottom:10px;
}
.page-header h1{ font-size:26px; font-weight:700; letter-spacing:-.02em; margin-bottom:6px; }
.page-header .page-meta{
  display:flex; gap:18px; flex-wrap:wrap; font-size:12.5px; color:var(--muted);
}
.page-header .page-meta span{ position:relative; }
.page-header .page-meta span + span::before{
  content:""; position:absolute; left:-9px; top:50%;
  width:2px; height:2px; background:var(--snap-grey-300); border-radius:50%;
}

/* page-nav (back) */
.page-nav{
  display:flex; align-items:center; gap:10px;
  padding:14px 32px 0;
  margin-bottom:0;
}
.page-nav .back-btn{
  display:inline-flex; align-items:center; gap:6px;
  font-size:12px; font-weight:600; color:var(--snap-blue);
  background:none; border:none; cursor:pointer; padding:4px 0;
  letter-spacing:.01em;
}
.page-nav .back-btn:hover{ color:var(--snap-blue-hover); }

/* ============================================================
   Exec summary — calmer, full-width quote-card
   ============================================================ */
.exec-summary{
  background:var(--snap-pale-blue);
  border:1px solid var(--snap-light-blue);
  border-left:3px solid var(--snap-blue);
  color:var(--ink);
  border-radius:var(--radius-lg);
  padding:14px 18px;
  margin:18px 32px 22px;
  position:relative; overflow:hidden;
  box-shadow:none;
}
.exec-summary::after{ display:none; }
.exec-summary-label{
  font-size:10px; font-weight:700; text-transform:uppercase;
  letter-spacing:.14em; color:var(--snap-blue);
  margin-bottom:6px;
}
.exec-summary-text{
  font-size:14.5px; line-height:1.55; color:var(--ink); font-weight:400;
}
.exec-summary-text strong{ color:var(--ink); font-weight:700; }

/* ============================================================
   Markdown content
   ============================================================ */
.md-content{
  font-size:14px; line-height:1.6; color:var(--ink-2);
  max-width:none;
  padding:0 32px;
}
.md-content > h1:first-child{ display:none; } /* edition body H1 already in header */

/* TOC: "Jump to section" — this is the first H2 in editions; render as compact rail */
.md-content h2:first-of-type{
  font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.14em;
  color:var(--faint);
  background:none; padding:0; margin:0 0 8px;
  display:block; border-radius:0;
  border-bottom:1px solid var(--line); padding-bottom:6px;
}
.md-content h2:first-of-type + ul{
  display:flex; flex-wrap:wrap; gap:6px 4px;
  margin:0 0 24px; padding:0; list-style:none;
}
.md-content h2:first-of-type + ul > li{
  border:1px solid var(--line); border-radius:var(--radius-md);
  padding:5px 10px; font-size:12px; line-height:1; background:var(--bg);
  list-style:none; position:relative;
}
.md-content h2:first-of-type + ul > li::before{ display:none; }
.md-content h2:first-of-type + ul > li:hover{ border-color:var(--snap-blue); color:var(--snap-blue); }
.md-content h2:first-of-type + ul > li a{
  color:var(--ink-2); text-decoration:none; border:none;
  display:inline-flex; align-items:center; gap:6px; letter-spacing:0;
}
.md-content h2:first-of-type + ul > li a strong{ font-weight:700; color:var(--ink); }
.md-content h2:first-of-type + ul > li a:hover{ color:var(--snap-blue); }

/* Default H2 for SAE sections — section bar */
.md-content h2{
  font-size:18px; font-weight:700; letter-spacing:-.01em;
  margin:36px 0 6px; padding:8px 0 6px;
  background:none; color:var(--ink);
  border:none; border-top:2px solid var(--snap-blue);
  border-radius:0;
  display:flex; align-items:baseline; gap:12px;
}
/* trailing "(N events)" — render slightly smaller/faint */
.md-content h2{ position:relative; }

.md-content h3{
  font-size:14px; font-weight:700; color:var(--ink);
  letter-spacing:0; margin:18px 0 6px; padding:0;
  text-transform:none;
}
.md-content h4{
  font-size:11px; font-weight:700; text-transform:uppercase;
  letter-spacing:.1em; color:var(--muted); margin:14px 0 6px;
}

.md-content p{ margin-bottom:10px; }
.md-content em{ font-style:italic; color:var(--muted); }
.md-content strong{ font-weight:700; color:var(--ink); }

.md-content a{
  color:var(--ink); text-decoration:none;
  border-bottom:1px solid var(--line-strong);
  transition:border-color .1s, color .1s;
}
.md-content a:hover{ border-bottom-color:var(--snap-blue); color:var(--snap-blue); }
.md-content hr{ border:none; border-top:1px solid var(--line); margin:24px 0; }

/* Tables — terminal/data feel */
.md-content table{
  width:100%; border-collapse:collapse; margin:8px 0 16px; font-size:12.5px;
}
.md-content th{
  text-align:left; font-weight:600; font-size:10.5px;
  text-transform:uppercase; letter-spacing:.1em;
  padding:8px 12px; background:var(--bg-soft);
  color:var(--muted);
  border-bottom:1px solid var(--line-strong);
}
.md-content td{
  padding:8px 12px; border-bottom:1px solid var(--line);
  vertical-align:top;
}
.md-content tr:last-child td{ border-bottom:none; }

.md-content blockquote{
  border-left:2px solid var(--snap-blue);
  background:var(--snap-pale-blue);
  padding:10px 14px; margin:0 0 14px;
  border-radius:0 var(--radius-md) var(--radius-md) 0;
  color:var(--ink); font-size:13px;
}
.md-content code{
  font-family:var(--font-mono); font-size:12px;
  background:var(--bg-soft); padding:1px 5px;
  border-radius:2px; color:var(--snap-blue);
}
.md-content pre{
  background:var(--bg-soft); border:1px solid var(--line);
  border-radius:var(--radius-md); padding:12px 14px;
  overflow-x:auto; margin-bottom:14px;
}
.md-content pre code{ background:none; padding:0; color:var(--ink); font-size:12.5px; }

/* ── PARTNER LISTINGS ──
 * The body of each SAE H2 section is a series of H3 (partner) followed by
 * a UL of events. Style this as a tabular partner ledger with one event
 * per row, dense, FT-style.
 */
.md-content ul{
  margin:0 0 16px; padding:0; list-style:none;
}
/* Default partner-event row layout (left date rail). Scoped to lists that
   follow an H3 — the TOC list (after the first H2) is exempted below. */
.md-content h3 + ul > li,
.md-content h3 ~ ul > li{
  position:relative;
  padding:10px 0 10px 100px;
  border-top:1px solid var(--line);
  font-size:13px; line-height:1.55;
}
/* Generic <ul> items elsewhere (TOC, silent-partners) get neutral layout */
.md-content ul > li{
  font-size:13px; line-height:1.55; padding:4px 0;
}
.md-content ul > li::before{
  content:""; display:none;
}
.md-content h3 + ul > li:first-child,
.md-content h3 ~ ul > li:first-child{ border-top:1px solid var(--line); }
.md-content h3 + ul > li:last-child,
.md-content h3 ~ ul > li:last-child{ border-bottom:1px solid var(--line); }

/* the leading "**2026-05-08** ·" pattern → pull date out as a left rail.
   Scoped: only inside H3-rooted partner sub-lists (NOT the TOC list). */
.md-content h3 + ul > li > strong:first-child,
.md-content h3 ~ ul > li > strong:first-child{
  position:absolute; left:0; top:11px;
  font-size:11px; font-weight:600; color:var(--muted);
  font-variant-numeric:tabular-nums;
  letter-spacing:.02em;
  width:88px;
  display:inline-block;
}
/* The first character right after the date strong is " · " — hide this leading separator */
.md-content ul > li > strong:first-child + a,
.md-content ul > li > strong:first-child ~ a:first-of-type{
  font-weight:600; color:var(--ink); font-size:13.5px;
}
/* Italic source name " · _Source_" */
.md-content ul > li em{
  display:inline; font-style:normal; color:var(--muted); font-size:11.5px;
  font-variant-numeric:tabular-nums; letter-spacing:.01em;
  text-transform:uppercase;
}
.md-content ul > li em::before{ content:""; }

/* nested paragraph (the summary) — quieter, smaller */
.md-content ul > li p,
.md-content ul + p{ margin:6px 0 0; color:var(--ink-2); font-size:13px; line-height:1.55; }

/* Markdown-emitted "**[High Impact]**" tag inside link text — render as pill */
.md-content h3 ~ ul > li a strong,
.md-content h3 ~ ul > li > strong:not(:first-child){
  display:inline-block;
  background:var(--snap-yellow); color:var(--snap-black);
  font-size:9.5px; font-weight:800; letter-spacing:.08em;
  text-transform:uppercase;
  padding:2px 6px; border-radius:2px;
  vertical-align:1px; margin-left:6px;
  font-variant-numeric:normal;
}

/* TOC bullet variant: "Jump to section" links use plain styling */
.md-content h2:first-of-type + ul > li{ padding:5px 10px; border:1px solid var(--line); border-radius:var(--radius-md); }
.md-content h2:first-of-type + ul > li a{ border:none; }

/* ============================================================
   Pills, links, wikilinks
   ============================================================ */
.pill{
  display:inline-block; background:var(--snap-yellow); color:var(--snap-black);
  font-size:9.5px; font-weight:800; padding:2px 7px;
  border-radius:2px; vertical-align:1px; margin-left:6px;
  letter-spacing:.08em; text-transform:uppercase;
  font-variant-numeric:normal;
}

.wikilink{
  color:var(--snap-blue); cursor:pointer; text-decoration:none;
  border-bottom:1px dashed rgba(45,68,226,.35);
}
.wikilink:hover{ border-bottom-color:var(--snap-blue); border-bottom-style:solid; }
.wikilink-dead{ color:var(--faint); text-decoration:line-through; font-style:italic; }

/* ============================================================
   Competitor Watch — HERO at top of every edition
   ============================================================ */
.md-content section.competitors{
  margin:20px 0 36px;
  padding:18px 0 0;
  border:none; background:none;
  position:relative;
}
.md-content section.competitors::before{
  content:""; display:block;
  position:absolute; left:0; right:0; top:0;
  height:1px; background:var(--ink);
}

.md-content section.competitors > h2{
  display:inline-flex; align-items:center; gap:10px;
  margin:0 0 4px; padding:0;
  background:none; color:var(--ink);
  font-size:22px; font-weight:800; letter-spacing:-.015em;
  border:none; border-radius:0;
}
.md-content section.competitors > h2::before{
  content:"●"; color:var(--snap-blue); font-size:10px; line-height:1;
  animation: pulse 2.4s ease-in-out infinite;
}
@keyframes pulse{
  0%,100%{ opacity:.35; }
  50%{ opacity:1; }
}
.md-content section.competitors .compsub{
  color:var(--muted); font-size:12.5px; line-height:1.5;
  margin:4px 0 14px;
  max-width:780px;
}
.md-content section.competitors .comp-tldr{
  background:var(--snap-yellow-pale); border:1px solid #F5E27A;
  border-radius:var(--radius-md); padding:10px 14px; margin:10px 0 18px;
  font-size:13px; font-weight:500; color:#5A4500;
  line-height:1.5;
  position:relative; padding-left:60px;
}
.md-content section.competitors .comp-tldr::before{
  content:"TL;DR"; position:absolute; left:14px; top:11px;
  font-size:10px; font-weight:800; letter-spacing:.12em;
  color:#8a6800;
}

/* 2-column hero card grid */
.comp-grid{
  display:grid; grid-template-columns:repeat(2, minmax(0,1fr));
  gap:0;
  border-top:1px solid var(--line);
}
.comp-entry{
  padding:16px 20px 18px;
  border-right:1px solid var(--line);
  border-bottom:1px solid var(--line);
  background:var(--bg);
  display:flex; flex-direction:column; gap:6px;
  position:relative;
}
.comp-entry:nth-child(2n){ border-right:none; }
.comp-entry::before{
  content:""; position:absolute; left:0; top:0; bottom:0; width:2px;
  background:transparent;
  transition:background .15s;
}
.comp-entry:hover::before{ background:var(--snap-blue); }

.comp-entry-head{
  display:flex; justify-content:space-between; align-items:center;
  gap:12px; margin-bottom:0;
}
.comp-entry .name{
  font-weight:700; font-size:15px; color:var(--ink);
  letter-spacing:-.01em;
}
.comp-entry .name .wikilink{ color:inherit; border-bottom:none; }
.comp-entry .name .wikilink:hover{ color:var(--snap-blue); }
.comp-entry .ticker{
  font-family:var(--font-mono); font-size:10.5px;
  color:var(--snap-blue); font-weight:600;
  letter-spacing:.06em; white-space:nowrap;
  background:var(--snap-pale-blue);
  padding:2px 7px; border-radius:2px;
}
.comp-entry .date{
  font-size:11.5px; color:var(--muted);
  margin:2px 0 4px;
  line-height:1.45;
  font-weight:500;
}
/* The leading "YYYY-MM-DD ·" portion of the date line */
.comp-entry .date::first-line{ /* not reliable; keep as is */ }

.comp-entry .summ{
  font-size:13px; color:var(--ink-2); line-height:1.55;
  margin:0;
}
.comp-entry .read-through{
  font-size:12.5px; color:var(--ink); line-height:1.5;
  margin-top:4px;
  padding:8px 10px;
  background:var(--snap-pale-blue);
  border-radius:var(--radius-md);
  border-left:2px solid var(--snap-blue);
}
.comp-entry .read-through .rt-label{
  font-weight:700; color:var(--snap-blue); margin-right:4px;
  font-size:10.5px; text-transform:uppercase; letter-spacing:.1em;
}
.comp-entry-foot{ margin-top:auto; padding-top:6px; }
.comp-entry a.link{
  font-size:11px; color:var(--muted); text-decoration:none; font-weight:600;
  text-transform:uppercase; letter-spacing:.08em;
  display:inline-flex; align-items:center; gap:4px;
}
.comp-entry a.link:hover{ color:var(--snap-blue); }
hr.comp-divider{
  border:none; border-top:1px dashed var(--line);
  margin:8px 0 4px;
}

/* ============================================================
   Opportunity Watch
   ============================================================ */
.md-content section.opportunities{
  margin:18px 0 24px;
  background:#FFFDF7;
  border:1px solid #EFE4C2;
  border-radius:var(--radius-lg);
  padding:18px 22px 22px;
}
.md-content section.opportunities h2{
  font-size:17px; margin:0 0 6px;
  border:none; padding:0;
  color:#5A4500;
}
.md-content section.opportunities .oppsub{
  font-size:12px; color:#7A6500; margin-bottom:14px;
  line-height:1.5;
}
.opp-empty{
  font-size:13px; color:var(--muted);
  background:var(--bg); border:1px dashed var(--line);
  border-radius:var(--radius-md); padding:14px 16px;
}
.opp-grid{ display:flex; flex-direction:column; gap:16px; }
.opp-owner{
  background:var(--bg); border:1px solid var(--line);
  border-radius:var(--radius-md);
  padding:12px 14px 14px;
}
.opp-owner-head{
  font-weight:700; font-size:14px; color:var(--ink);
  margin-bottom:8px;
  padding-bottom:6px; border-bottom:1px solid var(--line);
}
.opp-owner-head .wikilink{ color:inherit; border-bottom:none; }
.opp-owner-head .wikilink:hover{ color:var(--snap-blue); }
.opp-owner-head .opp-count{
  font-size:11px; color:var(--muted); font-weight:500;
  margin-left:4px;
}
.opp-entry{
  padding:8px 0 10px;
  border-top:1px dashed var(--line);
}
.opp-entry:first-of-type{ border-top:none; padding-top:4px; }
.opp-entry .opp-name{
  font-weight:600; font-size:13px; color:var(--ink-2);
  margin-bottom:4px;
}
.opp-line{
  font-size:12.5px; color:var(--ink); margin:2px 0 4px;
  line-height:1.5;
}
.opp-line .opp-date{
  font-family:var(--font-mono); font-size:11px;
  color:var(--muted); font-weight:500;
}
.opp-line .pill-high{
  background:var(--snap-yellow); color:var(--snap-navy);
  font-size:10px; font-weight:700;
  padding:1px 6px; border-radius:2px;
  letter-spacing:.06em; text-transform:uppercase;
  margin-left:4px;
}
.opp-line a.link{ color:var(--ink); text-decoration:none; border-bottom:1px solid var(--line); }
.opp-line a.link:hover{ color:var(--snap-blue); border-bottom-color:var(--snap-blue); }
.opp-summ{
  font-size:12.5px; color:var(--ink-2); line-height:1.5;
  margin:2px 0 4px;
}
.opp-rt{
  font-size:12px; color:var(--ink); line-height:1.5;
  padding:6px 10px;
  background:var(--snap-pale-blue);
  border-radius:var(--radius-md);
  border-left:2px solid var(--snap-blue);
}
.opp-rt .rt-label{
  font-weight:700; color:var(--snap-blue); margin-right:4px;
  font-size:10px; text-transform:uppercase; letter-spacing:.1em;
}

/* ============================================================
   Footer
   ============================================================ */
.footer-note{
  margin:32px 32px 0; padding-top:18px;
  border-top:1px solid var(--line);
  font-size:11px; color:var(--faint); text-align:left;
  letter-spacing:.04em; text-transform:uppercase;
}

/* ============================================================
   Empty / Claude / collapsibles / industry / trends
   ============================================================ */
.empty-state{ text-align:center; padding:60px 20px; color:var(--muted); }
.empty-state h2{ font-size:18px; margin-bottom:8px; color:var(--ink); border:none; padding:0; }

.claude-panel{ max-width:760px; padding:24px 32px; }
.claude-setup{
  background:var(--bg-soft); border:1px solid var(--line);
  border-radius:var(--radius-lg); padding:24px;
}
.claude-setup h2{ font-size:18px; margin-bottom:8px; border:none; padding:0; }
.claude-setup p{ font-size:13px; color:var(--muted); margin-bottom:16px; line-height:1.5; }
.claude-key-row{ display:flex; gap:8px; }
.claude-key-row input{
  flex:1; height:38px; padding:0 12px;
  border:1px solid var(--line-strong); border-radius:var(--radius-md);
  font-size:13px; font-family:var(--font-mono);
  outline:none; background:#fff; color:var(--ink);
}
.claude-key-row input:focus{ border-color:var(--snap-blue); box-shadow:0 0 0 3px rgba(45,68,226,.15); }
.claude-key-row button{
  height:38px; padding:0 18px; background:var(--snap-blue); color:#fff;
  border:none; border-radius:var(--radius-md);
  font-size:13px; font-weight:600; cursor:pointer; white-space:nowrap;
}
.claude-key-row button:hover{ background:var(--snap-blue-hover); }
.claude-clear{ background:none; border:none; font-size:12px; color:var(--muted); cursor:pointer; }
.claude-clear:hover{ color:var(--snap-blue); }

.claude-ask-row{ display:flex; gap:8px; align-items:flex-start; margin-bottom:6px; }
.claude-ask-row textarea{
  flex:1; padding:10px 12px; border:1px solid var(--line-strong);
  border-radius:var(--radius-md);
  font-size:14px; font-family:var(--font-sans); outline:none; resize:vertical;
  line-height:1.5; color:var(--ink); background:#fff;
}
.claude-ask-row textarea:focus{ border-color:var(--snap-blue); box-shadow:0 0 0 3px rgba(45,68,226,.15); }
.claude-ask-row button{
  height:40px; padding:0 20px; background:var(--snap-blue); color:#fff; border:none;
  border-radius:var(--radius-md); font-size:14px; font-weight:600; cursor:pointer;
  white-space:nowrap; flex-shrink:0; align-self:flex-end;
}
.claude-ask-row button:hover:not(:disabled){ background:var(--snap-blue-hover); }
.claude-ask-row button:disabled{ opacity:.4; cursor:not-allowed; }
.claude-hint{ font-size:11px; color:var(--muted); margin-bottom:16px; }
.claude-error{
  background:var(--snap-error-bg); border:1px solid #f3b5bf; border-radius:var(--radius-md);
  padding:10px 14px; font-size:13px; color:var(--snap-error); margin:10px 0;
}
.claude-loading{ padding:20px 0; font-size:13px; color:var(--muted); }
.claude-response{
  background:var(--bg); border:1px solid var(--line);
  border-radius:var(--radius-lg); overflow:hidden; margin-top:8px;
}
.claude-response-header{
  padding:10px 16px; background:var(--snap-pale-blue);
  border-bottom:1px solid var(--line);
  font-size:12px; font-weight:700; color:var(--snap-blue);
  letter-spacing:.06em; text-transform:uppercase;
}
.claude-response-body{ padding:16px 20px; }

/* Collapsibles (rare in edition view) */
.collapsible-header{
  display:flex; align-items:center; gap:8px;
  cursor:pointer; user-select:none;
  padding:4px 0; margin:28px 0 8px;
}
.collapsible-header:first-child{ margin-top:0; }
.collapsible-header .chevron{
  display:inline-flex; align-items:center; justify-content:center;
  width:18px; height:18px; font-size:9px; color:var(--muted);
  transition:transform .2s ease; flex-shrink:0;
}
.collapsible-header .chevron.open{ transform:rotate(90deg); }
.collapsible-header h2{
  margin:0; padding:0; font-size:16px;
  background:none; color:var(--ink);
  border:none; border-radius:0;
  letter-spacing:-.01em; font-weight:700;
}
.collapsible-header .section-count{ font-size:12px; color:var(--muted); font-weight:500; margin-left:4px; }
.collapsible-body{ overflow:hidden; transition:max-height .25s ease; }
.collapsible-body.collapsed{ max-height:0 !important; }

/* Industry & trends views */
.industry-partner{
  padding:10px 0; border-bottom:1px solid var(--line);
  cursor:pointer; transition:background .1s;
}
.industry-partner:hover{ background:var(--bg-soft); margin:0 -8px; padding:10px 8px; border-radius:var(--radius-md); }
.industry-partner-name{ font-weight:600; font-size:14px; color:var(--ink); }
.industry-partner-meta{ font-size:11.5px; color:var(--muted); margin-top:2px; display:flex; gap:12px; }

.industry-event{
  padding:8px 12px; border-bottom:1px solid var(--line);
  font-size:13px; cursor:pointer; display:flex; align-items:center; gap:10px;
  border-radius:var(--radius-md); transition:background .1s;
}
.industry-event:hover{ background:var(--bg-soft); color:var(--snap-blue); }
.industry-event-date{ font-size:11px; color:var(--muted); min-width:90px; }
.industry-event-title{ flex:1; }

.trend-grid{
  display:grid; grid-template-columns:repeat(4, 1fr); gap:0;
  margin:16px 0 24px;
  border:1px solid var(--line); border-radius:var(--radius-lg);
  overflow:hidden;
}
.trend-card{
  background:#fff; border:none;
  border-right:1px solid var(--line);
  padding:18px 20px; text-align:left;
  position:relative;
}
.trend-card:last-child{ border-right:none; }
.trend-card.trend-expansion::before,
.trend-card.trend-ma::before,
.trend-card.trend-risk::before,
.trend-card.trend-high::before{
  content:""; position:absolute; left:0; top:0; bottom:0; width:3px;
}
.trend-card.trend-expansion::before{ background:var(--growth-fg); }
.trend-card.trend-ma::before{ background:var(--ma-fg); }
.trend-card.trend-risk::before{ background:var(--risk-fg); }
.trend-card.trend-high::before{ background:var(--snap-yellow); }
.trend-number{ font-size:32px; font-weight:700; color:var(--ink); line-height:1; letter-spacing:-.02em; }
.trend-label{ font-size:12px; font-weight:700; color:var(--ink); margin-top:6px; text-transform:uppercase; letter-spacing:.08em; }
.trend-desc{ font-size:11px; color:var(--muted); margin-top:4px; line-height:1.4; }

.activity-bar{
  display:inline-block; padding:2px 8px; border-radius:2px;
  font-size:10px; font-weight:700; letter-spacing:.08em; text-transform:uppercase;
}
.activity-high{ background:var(--snap-light-blue); color:var(--snap-blue); }
.activity-med{  background:var(--snap-yellow-pale); color:#7d5a00; }
.activity-low{  background:var(--bg-soft); color:var(--muted); }

.trend-event{
  padding:10px 12px; border-bottom:1px solid var(--line);
  font-size:13px; line-height:1.55;
}
.trend-event:hover{ background:var(--bg-soft); }
.trend-event:last-child{ border-bottom:none; }
.trend-event.event-high-impact{
  border-left:3px solid var(--snap-yellow);
  background:var(--snap-yellow-pale);
  padding-left:12px;
}
.event-high-impact{
  border-left:3px solid var(--snap-yellow);
  background:var(--snap-yellow-pale);
  padding-left:10px;
}
.trend-competitor{ padding:8px 0; font-size:13px; border-bottom:1px solid var(--line); }
.trend-competitor:last-child{ border-bottom:none; }
.section-divider{ border:none; border-top:1px solid var(--line); margin:32px 0 8px; }

/* Breadcrumb */
.breadcrumb{
  display:flex; align-items:center; gap:6px;
  font-size:11.5px; color:var(--muted);
  padding:14px 32px 12px;
  border-bottom:1px solid var(--line);
}
.breadcrumb-item{
  cursor:pointer; color:var(--snap-blue);
  background:none; border:none; font-size:11.5px; font-family:var(--font-sans); padding:0;
}
.breadcrumb-item:hover{ text-decoration:underline; }
.breadcrumb-sep{ color:var(--snap-grey-300); }
.breadcrumb-current{ color:var(--ink); font-weight:600; }

/* ============================================================
   Custom enhancements injected by wiki_enhance.js
   ============================================================ */

/* Today's quick stats bar (above competitor watch) */
.kpi-strip{
  display:grid; grid-template-columns:repeat(4, minmax(0,1fr));
  gap:0;
  margin:0 32px 22px;
  border:1px solid var(--line); border-radius:var(--radius-lg);
  overflow:hidden; background:var(--bg);
}
.kpi-strip .kpi{
  padding:14px 18px; border-right:1px solid var(--line);
  position:relative;
}
.kpi-strip .kpi:last-child{ border-right:none; }
.kpi-strip .kpi-label{
  font-size:10px; font-weight:700; letter-spacing:.12em; text-transform:uppercase;
  color:var(--muted); margin-bottom:6px;
}
.kpi-strip .kpi-value{
  font-size:24px; font-weight:700; color:var(--ink); letter-spacing:-.02em;
  line-height:1; display:flex; align-items:baseline; gap:6px;
}
.kpi-strip .kpi-value .delta{
  font-size:11px; font-weight:600; padding:1px 6px; border-radius:2px;
}
.kpi-strip .kpi-value .delta.up{ background:var(--growth-bg); color:var(--growth-fg); }
.kpi-strip .kpi-value .delta.down{ background:var(--risk-bg); color:var(--risk-fg); }
.kpi-strip .kpi-sub{ font-size:11px; color:var(--muted); margin-top:6px; }

/* SAE Leaderboard — horizontal bars, dense */
.sae-leaderboard{
  margin:0 32px 28px;
  border:1px solid var(--line); border-radius:var(--radius-lg);
  background:var(--bg); overflow:hidden;
}
.sae-leaderboard .lb-head{
  display:flex; align-items:center; justify-content:space-between;
  padding:12px 16px;
  border-bottom:1px solid var(--line);
  background:var(--bg-soft);
}
.sae-leaderboard .lb-title{
  font-size:11px; font-weight:700; letter-spacing:.14em; text-transform:uppercase;
  color:var(--ink);
}
.sae-leaderboard .lb-meta{
  font-size:10.5px; color:var(--muted); letter-spacing:.06em; text-transform:uppercase;
}
.sae-leaderboard .lb-body{ padding:6px 0; }
.led-row{
  display:grid; grid-template-columns:160px 1fr 80px;
  align-items:center; gap:12px;
  padding:7px 16px;
  font-size:12.5px;
  border-bottom:1px dashed var(--line);
  cursor:pointer;
  transition:background .1s;
}
.led-row:last-child{ border-bottom:none; }
.led-row:hover{ background:var(--snap-pale-blue); }
.led-name{ font-weight:600; color:var(--ink); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.led-bar-wrap{
  height:10px; background:var(--bg-soft);
  border-radius:2px; position:relative; overflow:hidden;
}
.led-bar{
  position:absolute; left:0; top:0; bottom:0;
  background:var(--snap-blue);
  border-radius:2px;
}
.led-bar.has-high{ background:var(--snap-blue); }
.led-bar.has-high::after{
  content:""; position:absolute; right:0; top:0; bottom:0; width:30%;
  background:repeating-linear-gradient(45deg, var(--snap-yellow) 0 4px, rgba(255,210,0,.6) 4px 8px);
}
.led-row .lb-count{
  font-size:12px; font-weight:700; color:var(--ink);
  text-align:right;
  font-variant-numeric:tabular-nums;
}
.led-row .lb-count .lb-high{ color:var(--hi-fg); font-size:10.5px; font-weight:700; margin-left:6px; }

/* SAE H2: enhanced row anchor — show count chip */
.md-content h2.sae-h2{
  display:flex; justify-content:space-between; align-items:baseline;
  border-top:2px solid var(--snap-blue);
  padding:10px 0 6px;
  margin-top:36px;
}
.md-content h2.sae-h2 .sae-count-chip{
  font-size:10px; font-weight:700; letter-spacing:.1em; text-transform:uppercase;
  color:var(--muted);
  font-variant-numeric:tabular-nums;
}
.md-content h2.sae-h2 .sae-count-chip strong{
  color:var(--ink); font-size:13px; margin-right:4px; letter-spacing:0;
}

/* Silent partners footer rebuild */
.md-content h2#silent-partners-today{
  font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.14em;
  color:var(--faint);
  background:none; padding:0; margin:36px 0 8px;
  border:none; border-top:1px solid var(--line);
  padding-top:14px;
}

/* ── Responsive ── */
@media (max-width:1100px){
  .briefing-header .meta{ grid-template-columns:repeat(2, minmax(0,1fr)); }
  .briefing-header .meta > span:nth-child(2){ border-right:none; }
  .kpi-strip{ grid-template-columns:repeat(2, minmax(0,1fr)); }
  .kpi-strip .kpi:nth-child(2){ border-right:none; }
  .trend-grid{ grid-template-columns:repeat(2, 1fr); }
  .trend-card:nth-child(2){ border-right:none; }
}
@media (max-width:900px){
  .sidebar{ width:200px; min-width:200px; }
  .comp-grid{ grid-template-columns:1fr; }
  .comp-entry{ border-right:none; }
}
@media (max-width:720px){
  .sidebar{ display:none; }
  .briefing-header, .page-header, .md-content, .kpi-strip, .sae-leaderboard, .exec-summary, .footer-note{
    padding-left:16px; padding-right:16px; margin-left:0; margin-right:0;
  }
  .briefing-header .meta{ grid-template-columns:1fr; }
  .briefing-header .meta > span{ border-right:none; border-bottom:1px solid var(--line); }
  .kpi-strip{ grid-template-columns:1fr; }
  .kpi-strip .kpi{ border-right:none; border-bottom:1px solid var(--line); }
  .trend-grid{ grid-template-columns:1fr; }
}

/* ============================================================
   Snap canonical brand alignment (SNAP_DESIGN_GUIDE.md)
   Arial · Snap Green primary · Snap Dark Blue structural ·
   Snap Blue links. Appended last so these win over earlier rules.
   ============================================================ */

/* Body copy = brand Dark Gray (not navy); drop the airy tracking */
body{ color:var(--ink-2); letter-spacing:0; }

/* ---- Sidebar → navy "AI canvas" (guide §10) ---- */
.sidebar{
  background:var(--snap-navy);
  color:rgba(255,255,255,.82);
  border-right:1px solid rgba(255,255,255,.08);
  padding:0 14px 24px;
}
.sidebar::before, .sidebar::after{ content:none; display:none; }

.brand{
  padding:18px 8px 14px; margin-bottom:14px;
  border-bottom:1px solid rgba(255,255,255,.10);
}
.brand-mark{ font-size:19px; font-weight:700; letter-spacing:-.01em; color:#fff; line-height:1.05; }
.brand-sub{
  font-size:10px; font-weight:700; letter-spacing:.16em; text-transform:uppercase;
  color:var(--snap-green-2); margin-top:7px;
}

.sidebar-section-title{ color:rgba(255,255,255,.45); }
.sidebar-section-title .sidebar-chevron{ color:rgba(255,255,255,.45); }
.sidebar-item{ color:rgba(255,255,255,.82); border-left:2px solid transparent; }
.sidebar-item:hover{ background:rgba(255,255,255,.08); color:#fff; }
.sidebar-item.active{
  background:rgba(27,132,74,.30); color:#fff; font-weight:700;
  border-left-color:var(--snap-green);
}
.sidebar-item .count-badge{ color:rgba(255,255,255,.5); }
.sidebar-item.active .count-badge{ color:#fff; }
.sidebar-divider{ background:rgba(255,255,255,.10); }

.sidebar-search-input{
  background:rgba(255,255,255,.08); border-color:rgba(255,255,255,.16); color:#fff;
}
.sidebar-search-input::placeholder{ color:rgba(255,255,255,.45); }
.sidebar-search-input:focus{
  background:rgba(255,255,255,.12); border-color:var(--snap-green-2);
  box-shadow:0 0 0 3px rgba(103,178,94,.25);
}
.sidebar-search-results{ background:#fff; color:var(--ink-2); }
.sidebar-search-type{ color:var(--snap-green); }
.sidebar-search-title{ color:var(--ink); }

/* ---- Masthead ---- */
.briefing-header::before{ background:var(--snap-green); }
.briefing-header .sub{ line-height:1.5; }
.briefing-header .sub::before{
  content:"DAILY BRIEFING";
  background:none; color:var(--snap-green); padding:0; margin-right:12px;
  border-radius:0; vertical-align:baseline;
  font-weight:700; letter-spacing:.14em; font-size:11px;
}
.briefing-header .meta strong{ color:var(--snap-navy); }

/* ---- Eyebrow chips → green (guide §4) ---- */
.page-header .page-type{ background:var(--snap-green-tint); color:var(--snap-green); }

/* ---- Section headers: navy text + thin green top-rule ---- */
.md-content h2{ color:var(--snap-navy); border-top-color:var(--snap-green); }
.md-content h2:first-of-type{ border-top:none; color:var(--faint); }
.md-content h2.sae-h2{ border-top-color:var(--snap-green); }
.md-content section.competitors > h2{ color:var(--snap-navy); }
.md-content section.competitors > h2::before{ color:var(--snap-green); }
.md-content section.competitors::before{ background:var(--snap-navy); }

/* ---- Links / wikilinks → Snap Blue ---- */
.wikilink{ color:var(--snap-blue); border-bottom-color:rgba(61,92,207,.35); }
.wikilink:hover{ border-bottom-color:var(--snap-blue); }

/* ---- High-impact pill → yellow caution + navy text ---- */
.pill,
.md-content h3 ~ ul > li a strong,
.md-content h3 ~ ul > li > strong:not(:first-child){
  background:var(--snap-yellow); color:var(--snap-navy);
}

/* ---- Data viz / signals → brand families ---- */
.led-bar, .led-bar.has-high{ background:var(--snap-green); }
.activity-high{ background:var(--snap-green-tint); color:var(--snap-green); }
.trend-card.trend-expansion::before{ background:var(--snap-green); }
.trend-card.trend-ma::before{ background:var(--snap-blue); }
.trend-card.trend-risk::before{ background:var(--snap-warning); }
.trend-card.trend-high::before{ background:var(--snap-yellow); }
.trend-number{ color:var(--snap-navy); }

/* ---- Primary CTA = Snap Green (guide §5) ---- */
.claude-ask-row button, .claude-key-row button{ background:var(--snap-green); }
.claude-ask-row button:hover:not(:disabled), .claude-key-row button:hover{ background:var(--snap-green-hover); }
.claude-response-header{ background:var(--snap-green-tint); color:var(--snap-green); }
.claude-ask-row textarea:focus, .claude-key-row input:focus{
  border-color:var(--snap-blue); box-shadow:0 0 0 3px rgba(61,92,207,.25);
}

/* ---- "Start here" orientation card ---- */
.orient{
  position:relative; margin:18px 32px 24px;
  background:#fff; border:1px solid var(--line);
  border-left:4px solid var(--snap-green); border-radius:var(--radius-lg);
  padding:16px 20px 18px; box-shadow:var(--shadow-1);
}
.orient-eyebrow{
  font-size:10px; font-weight:700; letter-spacing:.14em; text-transform:uppercase;
  color:var(--snap-green); margin-bottom:4px;
}
.orient-title{
  font-size:16px; font-weight:700; color:var(--snap-navy);
  margin-bottom:14px; letter-spacing:-.01em;
}
.orient-steps{ display:grid; grid-template-columns:repeat(3,1fr); gap:18px; }
.orient-step{ display:flex; gap:10px; align-items:flex-start; }
.orient-num{
  flex-shrink:0; width:22px; height:22px; border-radius:50%;
  background:var(--snap-green-tint); color:var(--snap-green);
  font-size:12px; font-weight:700; font-variant-numeric:tabular-nums;
  display:flex; align-items:center; justify-content:center;
}
.orient-step strong{ display:block; font-size:13px; color:var(--snap-navy); margin-bottom:2px; }
.orient-step p{ font-size:12px; color:var(--muted); line-height:1.45; margin:0; }
.orient-close{
  position:absolute; top:8px; right:12px;
  background:none; border:none; cursor:pointer;
  font-size:20px; line-height:1; color:var(--faint);
}
.orient-close:hover{ color:var(--snap-navy); }
@media (max-width:880px){ .orient-steps{ grid-template-columns:1fr; gap:12px; } }
@media (max-width:720px){ .orient{ margin-left:16px; margin-right:16px; } }

/* ---- Signal chips (consistent event taxonomy) ---- */
.sig-chip{
  display:inline-flex; align-items:center; gap:5px;
  padding:2px 9px 2px 7px; border-radius:999px;
  font-size:10.5px; font-weight:700; letter-spacing:.04em; text-transform:uppercase;
  white-space:nowrap; vertical-align:middle;
}
.sig-chip .sig-ic{ flex-shrink:0; }
.trend-event .sig-chip{ margin-right:8px; }
.trend-event.event-high-impact strong{ vertical-align:middle; }

/* ---- "Needs attention" triage board ---- */
.needs-attn{ margin:18px 32px 24px; }
.needs-attn-head{
  display:flex; align-items:baseline; justify-content:space-between;
  gap:12px; margin-bottom:10px;
  border-bottom:1px solid var(--line); padding-bottom:8px;
}
.na-eyebrow{
  font-size:11px; font-weight:700; letter-spacing:.14em; text-transform:uppercase;
  color:var(--snap-green);
}
.na-meta{ font-size:11px; color:var(--muted); letter-spacing:.04em; text-transform:uppercase; }
.na-grid{ display:grid; grid-template-columns:repeat(2, minmax(0,1fr)); gap:12px; }
.na-card{
  border:1px solid var(--line); border-left:3px solid var(--line-strong);
  border-radius:var(--radius-lg); background:#fff;
  padding:12px 14px; cursor:pointer;
  transition:box-shadow .15s, transform .15s, border-color .15s;
}
.na-card:hover{
  box-shadow:0 6px 18px rgba(6,45,78,.08); transform:translateY(-1px);
}
.na-card-top{ display:flex; align-items:center; gap:8px; margin-bottom:7px; }
.na-who{
  font-size:12px; font-weight:700; color:var(--snap-navy);
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.na-date{ margin-left:auto; font-size:11px; color:var(--muted); font-variant-numeric:tabular-nums; flex-shrink:0; }
.na-title{
  font-size:13.5px; font-weight:600; line-height:1.4; color:var(--snap-navy);
  margin-bottom:6px;
  display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;
}
.na-rt{
  font-size:12px; line-height:1.45; color:var(--muted);
  display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;
}
.na-rt-label{
  font-size:9.5px; font-weight:700; letter-spacing:.1em; text-transform:uppercase;
  color:var(--snap-green); margin-right:6px;
}
.na-more{ font-size:12px; color:var(--muted); margin-top:10px; }
@media (max-width:880px){ .na-grid{ grid-template-columns:1fr; } }
@media (max-width:720px){ .needs-attn{ margin-left:16px; margin-right:16px; } }

/* ---- Floating "jump to section" nav (editions) ---- */
.jump-nav{
  position:fixed; right:20px; bottom:20px; z-index:60;
  display:flex; flex-direction:column; align-items:flex-end; gap:8px;
}
.jump-toggle{
  display:inline-flex; align-items:center; gap:7px;
  background:var(--snap-navy); color:#fff; border:none; border-radius:999px;
  padding:9px 15px; font-size:12px; font-weight:700; letter-spacing:.04em;
  cursor:pointer; box-shadow:0 6px 18px rgba(6,45,78,.25); font-family:var(--font-sans);
}
.jump-toggle:hover{ background:var(--snap-navy-2); }
.jump-toggle svg{ width:14px; height:14px; }
.jump-panel{
  display:none; background:#fff; border:1px solid var(--line);
  border-radius:10px; box-shadow:0 18px 40px rgba(6,45,78,.18);
  width:262px; max-height:60vh; overflow-y:auto; padding:6px;
}
.jump-nav.open .jump-panel{ display:block; }
.jump-panel-head{
  font-size:10px; font-weight:700; letter-spacing:.12em; text-transform:uppercase;
  color:var(--faint); padding:8px 10px 6px;
}
.jump-link{
  display:flex; align-items:center; justify-content:space-between; gap:10px;
  padding:7px 10px; border-radius:6px; cursor:pointer;
  font-size:12.5px; color:var(--ink-2);
  border-left:2px solid transparent;
}
.jump-link:hover{ background:var(--bg-soft); }
.jump-link.current{
  background:var(--snap-green-tint); color:var(--snap-green);
  border-left-color:var(--snap-green); font-weight:700;
}
.jump-link .jl-count{ font-size:11px; color:var(--faint); font-variant-numeric:tabular-nums; }
.jump-link.current .jl-count{ color:var(--snap-green); }
@media (max-width:900px){ .jump-nav{ display:none; } }

/* ============================================================
   Entity profile — stat block · timeline · related
   ============================================================ */
.entity-profile{ margin:0 32px 8px; }

.stat-block{
  display:grid; grid-template-columns:repeat(auto-fit, minmax(120px,1fr));
  gap:0; margin:4px 0 26px;
  border:1px solid var(--line); border-radius:var(--radius-lg);
  overflow:hidden; background:#fff;
}
.stat-cell{
  padding:13px 16px; border-right:1px solid var(--line);
  border-bottom:1px solid var(--line);
}
.stat-label{
  font-size:10px; font-weight:700; letter-spacing:.1em; text-transform:uppercase;
  color:var(--faint); margin-bottom:5px;
}
.stat-value{
  font-size:15px; font-weight:700; color:var(--snap-navy); line-height:1.25;
  font-variant-numeric:tabular-nums;
}
.stat-value.is-link{ color:var(--snap-blue); cursor:pointer; }
.stat-value.is-link:hover{ text-decoration:underline; }
.stat-value .stat-sub{ display:block; font-size:11px; font-weight:400; color:var(--muted); margin-top:2px; letter-spacing:0; text-transform:none; }
.stat-pill-row{ display:flex; flex-wrap:wrap; gap:5px; }

.entity-section-label{
  font-size:11px; font-weight:700; letter-spacing:.12em; text-transform:uppercase;
  color:var(--snap-green); margin:0 0 12px;
  display:flex; align-items:baseline; gap:8px;
}
.entity-section-label .esl-count{ color:var(--faint); font-weight:700; letter-spacing:.04em; }

/* Timeline */
.timeline{ position:relative; margin:0 0 28px; padding-left:4px; }
.tl-item{
  position:relative; display:grid; grid-template-columns:54px 1fr; gap:14px;
  padding:0 0 16px 0;
}
.tl-rail{ position:relative; text-align:right; padding-top:1px; }
.tl-date{ font-size:11px; font-weight:700; color:var(--muted); font-variant-numeric:tabular-nums; white-space:nowrap; }
.tl-year{ display:block; font-size:10px; font-weight:400; color:var(--faint); margin-top:1px; }
.tl-body{
  position:relative; padding-left:20px;
  border-left:2px solid var(--line);
}
.tl-item:last-child .tl-body{ border-left-color:transparent; }
.tl-dot{
  position:absolute; left:-7px; top:3px; width:12px; height:12px; border-radius:50%;
  background:#fff; border:2.5px solid var(--line-strong);
}
.tl-card{ cursor:pointer; }
.tl-top{ display:flex; align-items:center; gap:8px; margin-bottom:3px; flex-wrap:wrap; }
.tl-title{ font-size:13.5px; font-weight:600; color:var(--snap-navy); line-height:1.4; }
.tl-card:hover .tl-title{ color:var(--snap-blue); }
.tl-rt{ font-size:12px; color:var(--muted); line-height:1.45; margin-top:2px;
  display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
.tl-sig-high{ width:7px; height:7px; border-radius:50%; background:var(--snap-yellow); box-shadow:0 0 0 2px var(--snap-yellow-pale); flex-shrink:0; }

/* Related panel */
.related-panel{
  margin:6px 0 4px; border-top:1px solid var(--line); padding-top:18px;
}
.related-grid{ display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:18px; }
.related-col-title{
  font-size:10px; font-weight:700; letter-spacing:.1em; text-transform:uppercase;
  color:var(--faint); margin-bottom:8px;
}
.related-chips{ display:flex; flex-direction:column; gap:5px; }
.related-chip{
  display:flex; align-items:center; gap:8px; padding:7px 10px;
  border:1px solid var(--line); border-radius:7px; cursor:pointer;
  font-size:12.5px; color:var(--ink-2); background:#fff; transition:border-color .12s, background .12s;
}
.related-chip:hover{ border-color:var(--snap-blue); background:var(--snap-light-blue); color:var(--snap-navy); }
.related-chip .rc-type{ font-size:9.5px; font-weight:700; letter-spacing:.06em; text-transform:uppercase; color:var(--faint); }
.related-chip .rc-name{ font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.entity-divider{ border:none; border-top:1px solid var(--line); margin:26px 0 24px; }
@media (max-width:720px){ .entity-profile{ margin-left:16px; margin-right:16px; } }

/* ============================================================
   Command palette (Cmd / Ctrl-K)
   ============================================================ */
.cmdk-overlay{
  position:fixed; inset:0; z-index:200;
  background:rgba(6,45,78,.38); backdrop-filter:blur(2px);
  display:flex; align-items:flex-start; justify-content:center;
  padding-top:12vh;
}
.cmdk{
  width:min(620px, 92vw); max-height:70vh; display:flex; flex-direction:column;
  background:#fff; border-radius:14px; overflow:hidden;
  box-shadow:0 30px 80px rgba(6,45,78,.40); border:1px solid rgba(255,255,255,.2);
}
.cmdk-input-row{ display:flex; align-items:center; gap:11px; padding:15px 18px; border-bottom:1px solid var(--line); }
.cmdk-input-row svg{ width:18px; height:18px; color:var(--faint); flex-shrink:0; }
.cmdk-input{
  flex:1; border:none; outline:none; font-size:16px; font-family:var(--font-sans);
  color:var(--snap-navy); background:none;
}
.cmdk-input::placeholder{ color:var(--faint); }
.cmdk-kbd{
  font-size:10px; font-weight:700; color:var(--muted); background:var(--bg-soft);
  border:1px solid var(--line); border-radius:5px; padding:3px 6px; letter-spacing:.04em;
}
.cmdk-results{ overflow-y:auto; padding:6px; }
.cmdk-group-label{
  font-size:10px; font-weight:700; letter-spacing:.12em; text-transform:uppercase;
  color:var(--faint); padding:10px 12px 5px;
}
.cmdk-item{
  display:flex; align-items:center; gap:11px; padding:9px 12px; border-radius:8px; cursor:pointer;
}
.cmdk-item.active{ background:var(--snap-light-blue); }
.cmdk-ic{
  width:28px; height:28px; border-radius:7px; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  background:var(--bg-soft); color:var(--snap-green);
}
.cmdk-item.active .cmdk-ic{ background:#fff; }
.cmdk-ic svg{ width:15px; height:15px; }
.cmdk-texts{ min-width:0; flex:1; }
.cmdk-title{ font-size:13.5px; font-weight:600; color:var(--snap-navy); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.cmdk-sub{ font-size:11px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.cmdk-date{ font-size:11px; color:var(--faint); font-variant-numeric:tabular-nums; flex-shrink:0; }
.cmdk-empty{ padding:34px 12px; text-align:center; color:var(--muted); font-size:13px; }
.cmdk-foot{
  display:flex; gap:16px; align-items:center; padding:9px 16px;
  border-top:1px solid var(--line); background:var(--bg-soft);
  font-size:11px; color:var(--muted);
}
.cmdk-foot .cf-k{ font-weight:700; color:var(--ink-2); }

/* Sidebar search → hint it opens the palette */
.sidebar-search-kbd{
  position:absolute; right:10px; top:50%; transform:translateY(-50%);
  font-size:10px; font-weight:700; color:rgba(255,255,255,.5);
  border:1px solid rgba(255,255,255,.22); border-radius:5px; padding:2px 6px;
  pointer-events:none; letter-spacing:.04em;
}
.sidebar-search{ position:relative; }

/* ---- Event ledger row hierarchy (briefing SAE lists) ---- */
.md-content .sae-section ul > li{ position:relative; }
.md-content .sae-section ul > li::marker{ color:var(--line-strong); }

/* ============================================================
   Signal filter bar (briefing + timelines)
   ============================================================ */
.filter-bar{
  display:flex; align-items:center; flex-wrap:wrap; gap:8px;
  margin:0 0 8px; padding:11px 0;
}
.filter-bar-label{
  font-size:10px; font-weight:700; letter-spacing:.12em; text-transform:uppercase;
  color:var(--faint); margin-right:4px;
}
.filter-chip{
  display:inline-flex; align-items:center; gap:6px;
  padding:5px 12px; border-radius:999px; cursor:pointer;
  font-size:12px; font-weight:600; font-family:var(--font-sans);
  border:1px solid var(--line); background:#fff; color:var(--ink-2);
  transition:border-color .12s, background .12s, color .12s;
}
.filter-chip:hover{ border-color:var(--line-strong); }
.filter-chip .fc-dot{ width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.filter-chip .fc-n{ font-size:11px; color:var(--faint); font-variant-numeric:tabular-nums; }
.filter-chip.active{ color:#fff; border-color:transparent; }
.filter-chip.active .fc-n{ color:rgba(255,255,255,.8); }
.filter-chip.active .fc-dot{ background:#fff !important; }
.filter-chip.fc-all.active{ background:var(--snap-navy); }
.filter-empty{
  padding:26px 0; color:var(--muted); font-size:13px; text-align:center;
}

/* In-briefing filter bar sits in the ledger flow */
.md-content .filter-bar{ margin:18px 0 14px; padding:12px 16px; background:var(--bg-soft); border-radius:var(--radius-lg); border:1px solid var(--line); }
.evt.is-hidden, .comp-entry.is-hidden, .opp-entry.is-hidden, .opp-owner.is-hidden, .na-card.is-hidden{ display:none !important; }

/* ============================================================
   Sticky context bar
   ============================================================ */
.context-bar{
  position:sticky; top:0; z-index:40;
  display:flex; align-items:center; gap:10px;
  margin:0 -32px 0; padding:0 32px;
  height:0; overflow:hidden;
  background:rgba(255,255,255,.92); backdrop-filter:saturate(1.4) blur(8px);
  border-bottom:1px solid transparent;
  transition:height .16s ease, border-color .16s ease;
}
.context-bar.show{ height:46px; border-bottom-color:var(--line); }
.ctx-title{ font-size:13px; font-weight:700; color:var(--snap-navy); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.ctx-sep{ color:var(--line-strong); }
.ctx-section{ font-size:12.5px; color:var(--snap-green); font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.ctx-spacer{ flex:1; }
.ctx-top{
  font-size:11px; font-weight:700; color:var(--muted); cursor:pointer;
  border:1px solid var(--line); border-radius:999px; padding:4px 11px; background:#fff;
  white-space:nowrap;
}
.ctx-top:hover{ border-color:var(--snap-green); color:var(--snap-green); }
@media (max-width:720px){
  .context-bar{ margin-left:-16px; margin-right:-16px; padding-left:16px; padding-right:16px; }
}

/* ============================================================
   Mobile navigation (hamburger + drawer)
   ============================================================ */
.mobile-bar{ display:none; }
.scrim{ display:none; }
@media (max-width:720px){
  .mobile-bar{
    display:flex; align-items:center; gap:12px;
    position:fixed; top:0; left:0; right:0; z-index:90;
    background:var(--snap-navy); color:#fff;
    padding:11px 16px; height:52px;
  }
  .mobile-bar .mb-burger{
    width:30px; height:30px; display:flex; flex-direction:column; justify-content:center; gap:5px;
    background:none; border:none; cursor:pointer; padding:4px;
  }
  .mobile-bar .mb-burger span{ display:block; height:2px; background:#fff; border-radius:2px; }
  .mobile-bar .mb-brand{ font-size:15px; font-weight:700; color:#fff; }
  .mobile-bar .mb-brand small{ display:block; font-size:9px; font-weight:700; letter-spacing:.14em; color:var(--snap-green-2); }
  .mobile-bar .mb-search{

 "publisher": "", "url": "", "owner_name": "", "owner_slug": "", "count": "", "tags": [], "sources": "2026-04-29-prog-holdings-investor-relations-prog-holdings-q1-2026-results, 2026-04-29-stock-analysis-business-wire-prog-q1-2026-earnings-beat", "content": "---\ntitle: PROG Holdings Reports Strong Q1 2026; Progressive Leasing GMV Returns to Growth in March\ntype: event\ndate: 2026-04-29\ncompetitor: [[progressive-leasing]]\ncategory: earnings\nsignificance: high\nsignificance_reason: direct competitor earnings beat with GMV inflection\nsource: [[2026-04-29-prog-holdings-investor-relations-prog-holdings-q1-2026-results]]\ncreated: 2026-05-08\nupdated: 2026-06-08\nsources: 2026-04-29-prog-holdings-investor-relations-prog-holdings-q1-2026-results, 2026-04-29-stock-analysis-business-wire-prog-q1-2026-earnings-beat\n---\n\n# PROG Holdings Reports Strong Q1 2026; Progressive Leasing GMV Returns to Growth in March\n\n## What happened\n\nPROG Holdings reported Q1 2026 consolidated revenue of $742.7M (+11.1% YoY) and non-GAAP EPS of $1.24, beating the Street estimate of $0.81. Progressive Leasing GMV declined 2.2% YoY to $393M overall but returned to low single-digit YoY growth in March. The company raised its full-year 2026 revenue guidance to $3.0B\u2013$3.1B and highlighted improved portfolio yield and macro resilience.\n\n## Read-through for Snap\n\nProgressive Leasing's GMV inflection signals stabilizing competitive intensity in LTO; Snap should monitor whether this momentum continues into Q2 as a leading indicator of shared merchant activity.\n\n## Related\n\n[[progressive-leasing]] \u00b7 [[2026-04-29-prog-holdings-investor-relations-prog-holdings-q1-2026-results]] \u00b7 [[2026-04-29-stock-analysis-business-wire-prog-q1-2026-earnings-beat]]\n"}, {"slug": "2026-04-30-acima-amazon-furniture-ecommerce-partnership", "type": "event", "title": "Acima Launches Nationwide Amazon Partnership and Exclusive E-Commerce Furniture Checkout Deal", "significance": "high", "significance_reason": "Major retail distribution expansion", "category": "partnership", "tier": "", "segment": "", "sae": "", "partner": "", "competitor": "acima", "date": "2026-04-30", "parent": "", "ticker": "", "publisher": "", "url": "", "owner_name": "", "owner_slug": "", "count": "", "tags": [], "sources": "2026-05-01-the-motley-fool-upbound-acima-amazon-ecommerce-partnership, 2026-05-01-the-motley-fool-acima-amazon-ecommerce-furniture-partnership", "content": "---\ntitle: Acima Launches Nationwide Amazon Partnership and Exclusive E-Commerce Furniture Checkout Deal\ntype: event\ndate: 2026-04-30\ncompetitor: [[acima]]\ncategory: partnership\nsignificance: high\nsignificance_reason: Major retail distribution expansion\nsource: [[2026-05-01-the-motley-fool-upbound-acima-amazon-ecommerce-partnership]]\ncreated: 2026-05-07\nupdated: 2026-06-08\nsources: 2026-05-01-the-motley-fool-upbound-acima-amazon-ecommerce-partnership, 2026-05-01-the-motley-fool-acima-amazon-ecommerce-furniture-partnership\n---\n\n# Acima Launches Nationwide Amazon Partnership and Exclusive E-Commerce Furniture Checkout Deal\n\n## What happened\n\nDuring Upbound's Q1 2026 earnings call, management highlighted the launch of a nationwide Amazon partnership and an exclusive checkout agreement with the largest e-commerce furniture retailer as substantial strategic steps for Acima. These deals are expected to enhance customer traffic, brand reach, and Acima's GMV in the second half of 2026.\n\n## Read-through for Snap\n\nAcima's expanded digital retail footprint via Amazon and a leading furniture e-tailer intensifies competition with Snap Finance for non-prime consumers shopping online.\n\n## Related\n\n[[acima]] \u00b7 [[2026-05-01-the-motley-fool-upbound-acima-amazon-ecommerce-partnership]] \u00b7 [[2026-05-01-the-motley-fool-acima-amazon-ecommerce-furniture-partnership]]\n"}, {"slug": "2026-04-30-upbound-q1-2026-earnings", "type": "event", "title": "Upbound Group Reports Q1 2026 Earnings: EPS Beats, Revenue Misses; Acima Tightens Underwriting", "significance": "high", "significance_reason": "direct competitor earnings + underwriting posture shift", "category": "earnings", "tier": "", "segment": "", "sae": "", "partner": "", "competitor": "acima", "date": "2026-04-30", "parent": "", "ticker": "", "publisher": "", "url": "", "owner_name": "", "owner_slug": "", "count": "", "tags": [], "sources": [], "content": "---\ntitle: \"Upbound Group Reports Q1 2026 Earnings: EPS Beats, Revenue Misses; Acima Tightens Underwriting\"\ntype: event\ndate: 2026-04-30\ncompetitor: [[acima]]\ncategory: earnings\nsignificance: high\nsignificance_reason: direct competitor earnings + underwriting posture shift\nsource: [[2026-05-05-investing-com-upbound-q1-2026-earnings-transcript]]\ncreated: 2026-05-08\nupdated: 2026-05-08\n---\n\n# Upbound Group Reports Q1 2026 Earnings: EPS Beats, Revenue Misses; Acima Tightens Underwriting\n\n## What happened\n\nUpbound Group (UPBD) reported Q1 2026 EPS of $1.08, beating estimates of $1.07, while revenue of $1.2B missed the $1.23B forecast. At the Acima segment, management revised its outlook to account for Q1 results, deliberate underwriting tightening, and continued macro headwinds. The company reaffirmed full-year 2026 guidance of $4.7B\u2013$4.95B revenue and non-GAAP EPS of $4.00\u2013$4.35.\n\n## Read-through for Snap\n\nAcima's tightened underwriting and macro-driven caution may push non-prime applicants toward Snap Finance, creating a near-term volume opportunity.\n\n## Related\n\n[[acima]] \u00b7 [[2026-05-05-investing-com-upbound-q1-2026-earnings-transcript]]\n"}, {"slug": "2026-05-01-firstcash-750m-senior-notes-2034", "type": "event", "title": "FirstCash Completes Upsized $750M Senior Notes Offering at 6.125% Due 2034", "significance": "medium", "significance_reason": "significant balance sheet firepower for AFF parent's growth", "category": "financing", "tier": "", "segment": "", "sae": "", "partner": "", "competitor": "american-first-finance", "date": "2026-05-01", "parent": "", "ticker": "", "publisher": "", "url": "", "owner_name": "", "owner_slug": "", "count": "", "tags": [], "sources": [], "content": "---\ntitle: FirstCash Completes Upsized $750M Senior Notes Offering at 6.125% Due 2034\ntype: event\ndate: 2026-05-01\ncompetitor: [[american-first-finance]]\ncategory: financing\nsignificance: medium\nsignificance_reason: \"significant balance sheet firepower for AFF parent's growth\"\nsource: [[2026-04-28-globenewswire-firstcash-senior-notes-2034-offering]]\ncreated: 2026-05-08\nupdated: 2026-05-08\n---\n\n# FirstCash Completes Upsized $750M Senior Notes Offering at 6.125% Due 2034\n\n## What happened\n\nFirstCash Holdings closed a privately placed $750M offering of 6.125% senior unsecured notes due May 1, 2034, upsized from an initial $600M. Proceeds are intended to repay existing indebtedness and provide liquidity for future growth and general corporate purposes. The offering was sold to qualified institutional buyers under Rule 144A and Reg S.\n\n## Read-through for Snap\n\nRefinancing and liquidity buildup at FirstCash (parent of American First Finance) strengthens AFF's ability to invest in merchant growth, technology, and competitive pricing, raising the stakes for Snap in the LTO/retail-finance space.\n\n## Related\n\n[[american-first-finance]] \u00b7 [[2026-04-28-globenewswire-firstcash-senior-notes-2034-offering]]\n"}, {"slug": "2026-05-01-firstcash-q1-2026-earnings-10q", "type": "event", "title": "FirstCash Holdings Files Q1 2026 10-Q; Revenue Rises to $1.05B, Net Income $107.7M", "significance": "medium", "significance_reason": "parent financial health signals AFF investment capacity", "category": "earnings", "tier": "", "segment": "", "sae": "", "partner": "", "competitor": "american-first-finance", "date": "2026-05-01", "parent": "", "ticker": "", "publisher": "", "url": "", "owner_name": "", "owner_slug": "", "count": "", "tags": [], "sources": [], "content": "---\ntitle: FirstCash Holdings Files Q1 2026 10-Q; Revenue Rises to $1.05B, Net Income $107.7M\ntype: event\ndate: 2026-05-01\ncompetitor: [[american-first-finance]]\ncategory: earnings\nsignificance: medium\nsignificance_reason: parent financial health signals AFF investment capacity\nsource: [[2026-05-01-stock-titan-sec-firstcash-q1-2026-quarterly-report]]\ncreated: 2026-05-12\nupdated: 2026-05-12\n---\n\n# FirstCash Holdings Files Q1 2026 10-Q; Revenue Rises to $1.05B, Net Income $107.7M\n\n## What happened\n\nFirstCash Holdings filed its Q1 2026 10-Q with revenue of $1.05 billion and net income of $107.7 million, reflecting growth across pawn loans, scrap gold sales, and U.K. operations following the August 2025 acquisition of H&T Group. The Retail POS Payment Solutions segment, which houses American First Finance (AFF), continued to operate as a key growth vertical alongside pawn.\n\n## Read-through for Snap\n\nA financially healthy FirstCash parent supports continued investment in American First Finance's LTO and retail installment platform, maintaining its competitive position against Snap Finance in the non-prime point-of-sale finance market.\n\n## Related\n\n[[american-first-finance]] \u00b7 [[2026-05-01-stock-titan-sec-firstcash-q1-2026-quarterly-report]]\n"}, {"slug": "2026-05-01-upbound-q1-2026-earnings", "type": "event", "title": "Upbound Group Reports Q1 2026 Results; Reaffirms 2026 Guidance Amid Macro Headwinds", "significance": "high", "significance_reason": "guidance reaffirmed; Amazon partnership launched", "category": "earnings", "tier": "", "segment": "", "sae": "", "partner": "", "competitor": "acima", "date": "2026-05-01", "parent": "", "ticker": "", "publisher": "", "url": "", "owner_name": "", "owner_slug": "", "count": "", "tags": [], "sources": [], "content": "---\ntitle: Upbound Group Reports Q1 2026 Results; Reaffirms 2026 Guidance Amid Macro Headwinds\ntype: event\ndate: 2026-05-01\ncompetitor: [[acima]]\ncategory: earnings\nsignificance: high\nsignificance_reason: guidance reaffirmed; Amazon partnership launched\nsource: [[2026-05-01-the-motley-fool-upbound-q1-2026-earnings-transcript]]\ncreated: 2026-05-12\nupdated: 2026-05-12\n---\n\n# Upbound Group Reports Q1 2026 Results; Reaffirms 2026 Guidance Amid Macro Headwinds\n\n## What happened\n\nUpbound Group reported Q1 2026 revenue of $1.2 billion (up 3.7% YoY) and reaffirmed full-year 2026 guidance of $4.7B\u2013$4.95B revenue and $500M\u2013$535M adjusted EBITDA. Management highlighted the launch of a nationwide Amazon partnership and an exclusive checkout agreement with a major e-commerce furniture retailer, both expected to drive Acima GMV in H2 2026. Acima's underwriting was deliberately tightened in Q1 in response to macro headwinds.\n\n## Read-through for Snap\n\nAcima's Amazon distribution deal and tightened underwriting signal it is trading near-term volume for credit quality \u2014 a dynamic that may pressure Snap Finance merchants to fill approval gaps Acima steps back from.\n\n## Related\n\n[[acima]] \u00b7 [[2026-05-01-the-motley-fool-upbound-q1-2026-earnings-transcript]]\n"}, {"slug": "2026-05-06-klarna-minor-hotels-partnership", "type": "event", "title": "Klarna Partners with Minor Hotels to Offer Flexible Payments Across 13 European Markets Ahead of Summer Travel Season", "significance": "low", "significance_reason": "European expansion; limited direct US LTO overlap", "category": "partnership", "tier": "", "segment": "", "sae": "", "partner": "", "competitor": "klarna", "date": "2026-05-06", "parent": "", "ticker": "", "publisher": "", "url": "", "owner_name": "", "owner_slug": "", "count": "", "tags": [], "sources": "2026-05-06-business-wire-klarna-minor-hotels-europe-partnership, 2026-05-06-business-wire-klarna-minor-hotels-europe-bnpl-partnership", "content": "---\ntitle: Klarna Partners with Minor Hotels to Offer Flexible Payments Across 13 European Markets Ahead of Summer Travel Season\ntype: event\ndate: 2026-05-06\ncompetitor: [[klarna]]\ncategory: partnership\nsignificance: low\nsignificance_reason: European expansion; limited direct US LTO overlap\nsource: [[2026-05-06-business-wire-klarna-minor-hotels-europe-partnership]]\ncreated: 2026-05-12\nupdated: 2026-06-08\nsources: 2026-05-06-business-wire-klarna-minor-hotels-europe-partnership, 2026-05-06-business-wire-klarna-minor-hotels-europe-bnpl-partnership\n---\n\n# Klarna Partners with Minor Hotels to Offer Flexible Payments Across 13 European Markets Ahead of Summer Travel Season\n\n## What happened\n\nKlarna announced a partnership with Minor Hotels, a global hospitality group with 640+ properties across 63 countries, to offer Klarna payment options for hotel bookings across 13 European markets. Guests can pay immediately or split payments into three interest-free installments, expanding Klarna's footprint into travel commerce ahead of the summer season.\n\n## Read-through for Snap\n\nKlarna's continuous expansion into new verticals and geographies underscores its scale ambitions, though the European hospitality focus has limited near-term direct impact on Snap Finance's US retail LTO market.\n\n## Related\n\n[[klarna]] \u00b7 [[2026-05-06-business-wire-klarna-minor-hotels-europe-partnership]] \u00b7 [[2026-05-06-business-wire-klarna-minor-hotels-europe-bnpl-partnership]]\n"}, {"slug": "2026-05-06-klarna-q1-2026-earnings-date-investor-conferences", "type": "event", "title": "Klarna Schedules Q1 2026 Earnings for May 14 and Announces May Investor Conference Appearances", "significance": "low", "significance_reason": "Upcoming earnings disclosure pre-announcement", "category": "earnings", "tier": "", "segment": "", "sae": "", "partner": "", "competitor": "klarna", "date": "2026-05-06", "parent": "", "ticker": "", "publisher": "", "url": "", "owner_name": "", "owner_slug": "", "count": "", "tags": [], "sources": "2026-05-06-business-wire-klarna-q1-2026-earnings-investor-conference, 2026-05-06-business-wire-klarna-q1-2026-earnings-investor-conferences, 2026-04-29-business-wire-klarna-q1-2026-earnings-date", "content": "---\ntitle: Klarna Schedules Q1 2026 Earnings for May 14 and Announces May Investor Conference Appearances\ntype: event\ndate: 2026-05-06\ncompetitor: [[klarna]]\ncategory: earnings\nsignificance: low\nsignificance_reason: Upcoming earnings disclosure pre-announcement\nsource: [[2026-05-06-business-wire-klarna-q1-2026-earnings-investor-conference]]\ncreated: 2026-05-07\nupdated: 2026-06-08\nsources: 2026-05-06-business-wire-klarna-q1-2026-earnings-investor-conference, 2026-05-06-business-wire-klarna-q1-2026-earnings-investor-conferences, 2026-04-29-business-wire-klarna-q1-2026-earnings-date\n---\n\n# Klarna Schedules Q1 2026 Earnings for May 14 and Announces May Investor Conference Appearances\n\n## What happened\n\nKlarna confirmed it will publish Q1 2026 earnings on May 14, 2026, before market open, with a webcast at 8:30 a.m. ET. The company also announced CEO Sebastian Siemiatkowski will present at a May 28 investor conference and CFO Niclas Neglen at a May 20 event. Analyst consensus estimates Q1 revenue of ~$945M.\n\n## Read-through for Snap\n\nKlarna's Q1 results next week will provide a near-real-time read on BNPL consumer demand and credit trends directly relevant to Snap Finance's non-prime customer base.\n\n## Related\n\n[[klarna]] \u00b7 [[2026-05-06-business-wire-klarna-q1-2026-earnings-investor-conference]] \u00b7 [[2026-05-06-business-wire-klarna-q1-2026-earnings-investor-conferences]] \u00b7 [[2026-04-29-business-wire-klarna-q1-2026-earnings-date]]\n"}, {"slug": "2026-05-07-affirm-fiscal-q3-2026-earnings", "type": "event", "title": "Affirm Reports Fiscal Q3 2026 Results: Revenue $1.04B (+33% YoY), GMV $11.6B (+35% YoY); Raises Full-Year Outlook", "significance": "high", "significance_reason": "major beat across all metrics; full-year guidance raised", "category": "earnings", "tier": "", "segment": "", "sae": "", "partner": "", "competitor": "affirm", "date": "2026-05-07", "parent": "", "ticker": "", "publisher": "", "url": "", "owner_name": "", "owner_slug": "", "count": "", "tags": [], "sources": "2026-05-08-yahoo-finance-zacks-affirm-fiscal-q3-2026-results, 2026-05-07-affirm-holdings-investor-relations-business-wire-affirm-fq3-2026-earnings-release, 2026-05-07-investing-com-affirm-q3-fy2026-results", "content": "---\ntitle: \"Affirm Reports Fiscal Q3 2026 Results: Revenue $1.04B (+33% YoY), GMV $11.6B (+35% YoY); Raises Full-Year Outlook\"\ntype: event\ndate: 2026-05-07\ncompetitor: [[affirm]]\ncategory: earnings\nsignificance: high\nsignificance_reason: major beat across all metrics; full-year guidance raised\nsource: [[2026-05-08-yahoo-finance-zacks-affirm-fiscal-q3-2026-results]]\ncreated: 2026-05-12\nupdated: 2026-06-08\nsources: 2026-05-08-yahoo-finance-zacks-affirm-fiscal-q3-2026-results, 2026-05-07-affirm-holdings-investor-relations-business-wire-affirm-fq3-2026-earnings-release, 2026-05-07-investing-com-affirm-q3-fy2026-results\n---\n\n# Affirm Reports Fiscal Q3 2026 Results: Revenue $1.04B (+33% YoY), GMV $11.6B (+35% YoY); Raises Full-Year Outlook\n\n## What happened\n\nAffirm Holdings reported fiscal Q3 2026 results with revenue of $1.04 billion (beating consensus by ~4%) and EPS of $0.30 (vs. $0.17 consensus), a 76% beat. GMV of $11.6 billion grew 35% YoY, exceeding management's own guidance range. Affirm raised full-year FY2026 GMV guidance to $49.27B\u2013$49.57B and revenue to $4.175B\u2013$4.205B. Active merchants grew 44% YoY to 515,000. The Affirm Card showed 146% GMV growth YoY.\n\n## Read-through for Snap\n\nAffirm's accelerating GMV and merchant growth at the BNPL end of the financing spectrum indicates strong consumer demand for flexible pay-over-time options, validating the broader non-prime/near-prime market Snap Finance serves.\n\n## Related\n\n[[affirm]] \u00b7 [[2026-05-08-yahoo-finance-zacks-affirm-fiscal-q3-2026-results]] \u00b7 [[2026-05-07-affirm-holdings-investor-relations-business-wire-affirm-fq3-2026-earnings-re
