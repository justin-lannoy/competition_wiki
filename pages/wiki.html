gs.\n\n### 8-K \u2014 2025-08-14\n\n## FirstCash Holdings, Inc. (FCFS) \u2014 8-K Filed August 14, 2025\n\n#### Key financials\n- Acquisition of H&T Group plc completed August 14, 2025; funded via borrowings under FirstCash's existing U.S. revolving credit facility.\n- Bridge Term Loan Credit Agreement (entered May 14, 2025) was terminated upon closing, as it had served solely as a backstop/financing guarantee required under UK law.\n\n#### Segment & competitive notes\n- H&T Group plc is a UK-based pawnbroking/consumer lending operator; acquisition expands FirstCash's pawn segment into the United Kingdom market.\n- No segment-level financial metrics (revenue, store counts, or purchase price) were disclosed in this 8-K filing.\n\n#### Risk-factor changes\n- None noted.\n\n#### Material events\n- FirstCash completed the acquisition of H&T Group plc on August 14, 2025, marking a material international expansion event.\n- The Bridge Term Loan Credit Agreement, originally established May 14, 2025 to satisfy UK \"certain funds\" requirements, was formally terminated concurrent with closing.\n\n### 8-K \u2014 2025-08-11\n\n## FirstCash Holdings, Inc. (FCFS) \u2014 8-K Filed August 11, 2025\n\n#### Key financials\n- None noted. The 8-K is a Regulation FD disclosure (Item 7.01) furnishing an investor presentation; no standalone financial statements or quantitative results are included in the filing text.\n\n#### Segment & competitive notes\n- None noted. The filing text does not contain segment-level data or competitive commentary; any such detail would be in Exhibit 99.1 (the investor presentation), which is not reproduced here.\n\n#### Risk-factor changes\n- None noted. No new or amended risk factors are disclosed in this filing.\n\n#### Material events\n- On August 11, 2025, FirstCash Holdings, Inc. filed an 8-K under Item 7.01 (Regulation FD) to furnish an updated investor presentation posted to its corporate website (investors.firstcash.com).\n- The presentation is attached as Exhibit 99.1; it is \"furnished\" rather than \"filed,\" meaning it is not subject to Section 18 liability and is not automatically incorporated by reference into other SEC filings.\n- The filing was signed by CFO R. Douglas Orr (Executive Vice President) on August 11, 2025.\n\n### 8-K \u2014 2025-07-30\n\n#### Key financials\n- No financial results or metrics disclosed in this filing; this is a procedural Reg FD update on an M&A transaction.\n- Acquisition financial terms described as \"final and will not be increased or improved,\" with a limited exception if a competing bid emerges after May 14, 2025 or with UK Takeover Panel consent.\n\n#### Segment & competitive notes\n- FirstCash (FCFS) is acquiring H&T Group plc, a UK-based pawnbroking/consumer lending company, via subsidiary Chess Bidco Limited through a court-sanctioned scheme of arrangement under the UK Companies Act 2006.\n- UK Financial Conduct Authority (FCA) granted its requisite regulatory approval on July 30, 2025, removing a key condition; this is directly relevant to FirstCash's expansion into consumer-facing short-term credit in the UK market.\n\n#### Risk-factor changes\n- Residual closing risk remains: the High Court of Justice of England and Wales must sanction the Scheme at a hearing scheduled for August 12, 2025.\n- Filing reiterates integration and leverage risks: FirstCash expects to incur additional indebtedness to finance the deal, with terms noted as potentially unfavorable; cost savings and synergies may not be fully or timely realized.\n\n#### Material events\n- FCA approval received July 30, 2025; Acquisition now expected to become effective August 14, 2025, pending High Court sanction on August 12, 2025.\n- Completion remains subject to remaining closing conditions; if consummated, this would represent FirstCash's entry into a new geographic market (United Kingdom).\n\n### 10-Q \u2014 2025-07-28\n\n#### Key financials\n- **H1 2025 revenue** was $1.667B (flat vs. H1 2024 $1.667B); net income rose 30% to $143.4M from $110.4M; diluted EPS $3.21 vs. $2.44.\n- **Q2 2025 net income** was $59.8M vs. $49.1M in Q2 2024; consolidated pre-tax income $81.1M vs. $66.2M; effective tax rate 26.2%.\n- **Total debt** at June 30, 2025: $1.685B ($152M revolver + $1.55B senior notes at 4.625%/5.625%/6.875%); consolidated total debt ratio 2.5x adjusted EBITDA; $545.3M revolver capacity remaining.\n- **AFF segment pre-tax operating income** surged 46% YoY to $37.9M in Q2 2025, driven by a 34% rise in finance receivable interest/fees to $76.1M and a 31% drop in operating expenses, partially offsetting a 28% decline in leased merchandise income to $139.8M.\n\n#### Segment & competitive notes\n- **AFF (Retail POS Payment Solutions):** LTO originations fell 25% YoY to $110.5M in Q2 2025 due to late-2024 bankruptcies of merchant partners American Freight Warehouse and Conn's Home Plus; active merchant locations grew to ~15,300 from ~12,800 at June 30, 2024, reflecting diversification beyond furniture. Finance receivable originations rose 42% to $149.9M.\n- **U.S. Pawn:** Q2 2025 pawn loan fees +9% to $130.9M; same-store pawn fees +9%; pawn loan receivables +12% to $400.1M, driven by higher gold prices increasing collateral values; same-store retail sales +7%.\n- **Latin America Pawn:** On a constant-currency basis, Q2 2025 revenues +13% and segment pre-tax income +22% to $45.2M; reported results suppressed by a 13% unfavorable Mexican peso translation; store count grew to 1,833 from 1,817.\n- **H&T acquisition** (285 UK pawn stores) positions FirstCash to enter the UK market; H&T shareholder approval obtained July 2, 2025\u2014no comparable domestic competitor currently operates at scale in the UK pawn space.\n\n#### Risk-factor changes\n- **CFPB settlement:** On July 11, 2025, FirstCash settled the November 2021 Military Lending Act lawsuit; company accrued $11.0M in Q2 2025 (\u2264$7.0M consumer redress + $4.0M fine), included in administrative expenses\u2014elevated regulatory/litigation risk now partially resolved.\n- **Credit facility covenant amendment (May 13, 2025):** The 2025 Amendment to the $700M revolver raised the permitted leverage ratio to 3.75x EBITDA through December 31, 2025 (stepping down to 3.50x through 2026, reverting to 3.25x January 1, 2027) to accommodate the H&T Acquisition; amendment activates only upon an investment in a non-loan party exceeding $200M, which the H&T closing would trigger.\n- **UK regulatory/FCA approval risk:** H&T Acquisition closing remains contingent on FCA approval; failure or delay represents a new, material deal-execution risk not present in prior filings. Bridge Facility of up to \u00a3299.0M with Jefferies Finance provides backstop financing.\n\n#### Material events\n- **H&T Acquisition agreed May 14, 2025** at 650 pence/share; total equity value ~\u00a3291.4M ($396.3M USD); H&T outstanding debt ~\u00a372.6M ($98.7M USD) expected to remain post-close; shareholder approval received July 2, 2025; closing targeted Q3 2025 pending FCA approval.\n- **CFPB settlement finalized July 11, 2025:** $11.0M total accrual in Q2 2025; company must also offer a new pawn product specifically for covered U.S. military members and their dependents.\n- **Share buybacks:** $60.2M of treasury stock purchased in Q1 2025 (525K shares); no additional repurchases in Q2 2025; total treasury stock at cost reached $1.045B at June 30, 2025. Dividends of $0.38/share paid each quarter ($33.8M total H1 2025).\n- **Gold forward contracts:** As of June 30, 2025, the company has committed to deliver 72,500 oz of gold between July 2025 and June 2027 at a weighted-average price of $2,826/oz.\n\n### 8-K \u2014 2025-07-24\n\n## FirstCash Holdings, Inc. (FCFS) \u2014 8-K Filed July 24, 2025\n\n#### Key financials\n- Reported financial results for the three and six months ended June 30, 2025 (Q2 2025); specific revenue, net income, and EPS figures are contained in Exhibit 99.1 (press release), which is not included in the truncated filing text.\n- Board declared a Q3 2025 cash dividend of **$0.42 per common share**, announced July 24, 2025.\n\n#### Segment & competitive notes\n- None noted. (No segment-level detail provided in the 8-K body; all operational data referenced in attached Exhibit 99.1, not included here.)\n\n#### Risk-factor changes\n- None noted. This filing is limited to Item 2.02 (Results of Operations) and Item 9.01 (Exhibits); no risk-factor amendments were disclosed.\n\n#### Material events\n- FirstCash issued a press release on **July 24, 2025** announcing Q2 2025 earnings results (periods ended June 30, 2025), filed as Exhibit 99.1 and furnished (not filed) under Section 18 of the Exchange Act.\n- Dividend of **$0.42 per share** for Q3 2025 declared by the Board of Directors on July 24, 2025; payment timing/record date not specified in the 8-K body.\n\n### 8-K \u2014 2025-07-14\n\n## FirstCash Holdings, Inc. (FCFS) \u2014 8-K Filed July 14, 2025 (Event Date: July 11, 2025)\n\n#### Key financials\n- No financial results, guidance, or quantitative settlement terms disclosed in the filing text.\n- Settlement amount (if any) not specified in the 8-K body; details would be in Exhibit 99.1, which was not included in the provided text.\n\n#### Segment & competitive notes\n- None noted.\n\n#### Risk-factor changes\n- FirstCash reached a settlement with the CFPB on July 11, 2025 resolving alleged violations of the **Military Lending Act (MLA)** stemming from a lawsuit originally filed in **November 2021**; court approval was granted same day, closing out a ~3.5-year regulatory litigation risk.\n- Resolution of the CFPB/MLA matter removes an overhang relevant to FirstCash's consumer lending operations (its American First Finance POS/lease-to-own segment), a direct competitive read-across for Snap Finance on regulatory scrutiny of non-prime installment and LTO products.\n\n#### Material events\n- On **July 11, 2025**, FirstCash (FCFS) announced and obtained court approval of a settlement with the **Consumer Financial Protection Bureau** over alleged Military Lending Act violations in the case filed **November 2021**.\n- Disclosure made via Regulation FD (Item 7.01); the press release (Exhibit 99.1) is furnished but not \"filed,\" limiting Section 18 liability \u2014 no additional financial statements were filed.\n\n### 8-K \u2014 2025-07-02\n\n#### Key financials\n- No financial figures disclosed in this 8-K; filing is a Regulation FD disclosure under Item 7.01 only.\n- Financial terms of the H&T acquisition are described as \"final and will not be increased,\" though the specific cash consideration per share is not stated in this filing.\n\n#### Segment & competitive notes\n- FirstCash's indirect subsidiary Chess Bidco Limited is acquiring H&T Group plc, a UK-listed pawnbroking/consumer lending operator, expanding FirstCash into the UK market \u2014 a new geography for the company.\n- H&T shareholders approved the scheme of arrangement and all related matters at the Court Meeting and General Meeting held on or around July 2, 2025; closing is expected in H2 2025, pending UK Financial Conduct Authority approval.\n\n#### Risk-factor changes\n- Key remaining closing risk is FCA regulatory approval; filing explicitly flags potential for approval delays, conditions that could reduce anticipated benefits, or deal termination.\n- Additional risks cited include integration execution, cost-savings realization timeline, incremental debt financing potentially on unfavorable terms, foreign exchange exposure, and retention of H&T key personnel.\n\n#### Material events\n- On July 2, 2025, H&T Group plc shareholders voted to approve the Court-sanctioned scheme of arrangement under Part 26 of the Companies Act 2006, clearing a major milestone for FirstCash's acquisition of 100% of H&T's issued share capital.\n- Acquisition consummation is targeted for H2 2025, subject to remaining conditions; announcement to be published on FirstCash's investor website (investors.firstcash.com) by noon London time the next business day per Rule 26.1 of the UK City Code on Takeovers and Mergers.\n\n### 8-K \u2014 2025-06-11\n\n## FirstCash Holdings, Inc. (FCFS) \u2014 8-K Filed June 11, 2025\n\n#### Key financials\n- None noted.\n\n#### Segment & competitive notes\n- None noted.\n\n#### Risk-factor changes\n- None noted.\n\n#### Material events\n- FirstCash held its Annual Meeting of Stockholders on June 11, 2025; 41,416,988 of 44,589,564 eligible shares voted (92.88% participation).\n- Three directors elected to three-year terms: Daniel R. Feehan (35,852,353 for), Paula K. Garrett (38,085,289 for), and Marthea Davis (38,190,269 for); Feehan received the lowest support with ~87% of votes cast.\n- RSM LLP ratified as independent auditor for fiscal year ending December 31, 2025, with 40,181,373 votes for and 1,154,400 against.\n- Advisory \"say-on-pay\" vote on named executive officer compensation approved with 38,065,293 for and 1,854,017 against (~95% approval among shares voted).\n\n### 8-K \u2014 2025-05-14\n\n## FirstCash Holdings, Inc. (FCFS) \u2014 8-K Filed May 14, 2025\n\n#### Key financials\n- **Acquisition price:** 661 pence per H&T share in cash (650 pence from Bidco + 11 pence final dividend payable June 27, 2025), representing the final, binding offer price.\n- **Bridge financing:** \u00a3299 million Bridge Term Loan Credit Agreement dated May 14, 2025 with Jefferies Finance LLC as backstop/certain-funds facility for the Acquisition.\n- **Revolving credit facility amended:** Non-loan party investment basket raised to the greater of $350M or 25% of consolidated net worth; leverage ratio covenant temporarily raised to 3.75x for Q2\u2013Q4 2025, stepping down to 3.50x through 2026, reverting to 3.25x thereafter (Ninth Amendment effective upon any investment >$200M in a non-loan party).\n\n#### Segment & competitive notes\n- **H&T Group plc** is a UK-listed pawnbroking and consumer lending company; this acquisition expands FirstCash's pawn operations into the United Kingdom for the first time, representing a new geographic segment.\n- Director irrevocable undertakings cover ~249,938 H&T shares (~0.57% of outstanding shares as of May 13, 2025); broader shareholder approval requires a majority in number and \u226575% in value at the scheme meeting.\n\n#### Risk-factor changes\n- **Share repurchase restrictions introduced:** Buybacks capped at 0% of prior quarter net income if leverage \u22653.50x; capped at 50% if leverage is 3.25x\u20133.50x; capped at 75% if leverage is 3.00x\u20133.25x \u2014 applicable during fiscal years 2025 and 2026.\n- **New geographic/regulatory risk:** FirstCash enters UK regulatory jurisdiction (FCA and CMA approvals required); filing explicitly flags exposure to UK economic/political conditions, GBP/USD exchange rate risk, and extensive UK regulatory regime.\n- **Deal execution risk:** Long-stop date of December 31, 2025; failure to obtain FCA/CMA approval or H&T shareholder approval could prevent closing; integration and goodwill impairment risks noted.\n\n#### Material events\n- On **May 14, 2025**, FirstCash subsidiary Chess Bidco Limited issued a Rule 2.7 Announcement under the UK City Code on Takeovers and Mergers, disclosing a **recommended final cash offer for 100% of H&T Group plc** via a UK court-sanctioned scheme of arrangement under Part 26 of the UK Companies Act 2006.\n- The Scheme is expected to close in **H2 2025**, subject to H&T shareholder approval (scheme meeting vote expected imminently), High Court of Justice sanction, and FCA/CMA regulatory clearances; long-stop date is **December 31, 2025**.\n\n### 8-K \u2014 2025-04-29\n\n#### Key financials\n- None noted. (8-K filed April 29, 2025 is a Reg FD disclosure of an investor presentation only; no financial statements or specific financial figures are included in the filing text.)\n\n#### Segment & competitive notes\n- FirstCash Holdings (FCFS) operates pawn and point-of-sale/lease-to-own businesses; the filing references an updated investor presentation posted to investors.firstcash.com on April 29, 2025, which may contain segment detail not reproduced in the truncated text.\n- No specific segment revenue, store counts, or competitive metrics are disclosed in the body of this 8-K.\n\n#### Risk-factor changes\n- None noted. No new or amended risk factors are disclosed in this filing.\n\n#### Material events\n- On April 29, 2025, FirstCash filed an 8-K under Item 7.01 (Regulation FD) furnishing an updated investor presentation (Exhibit 99.1); the presentation is explicitly \"furnished\" and not \"filed,\" meaning it is not subject to Section 18 Exchange Act liability.\n- The filing was signed by CFO R. Douglas Orr, Executive Vice President, on April 29, 2025; no acquisitions, debt issuances, leadership changes, or other material corporate actions were disclosed.\n\n### 10-Q \u2014 2025-04-28\n\n#### Key financials\n- Q1 2025 net income was $83.6M ($1.87 diluted EPS) vs. $61.4M ($1.35) in Q1 2024, a 36% increase; total revenue was essentially flat at $836.4M vs. $836.4M.\n- Net revenue improved 7% to $424.2M from $395.8M, driven by lower cost of revenue ($412.2M vs. $440.5M), with leased merchandise depreciation and lease loss provisions declining sharply as the LTO portfolio shrinks.\n- Total debt was $1.707B (revolver $175M + senior notes $1.532B); consolidated total debt ratio was 2.6x as of March 31, 2025; $522.3M remained available under the $700M revolving credit facility.\n- The company repurchased 525,000 shares for $59.6M at an average $113.54/share in Q1 2025 (no repurchases in Q1 2024); quarterly dividend was $0.38/share (~$16.9M), declared April 2025, payable May 30, 2025.\n\n#### Segment & competitive notes\n- AFF (Retail POS Payment Solutions) segment pre-tax income surged 58% to $52.3M despite a 12% revenue decline to $230.3M, as LTO income fell 24% to $156.9M following late-2024 bankruptcy filings of merchant partners American Freight and Conn's Home Plus; AFF's active merchant door count grew to ~14,500 locations vs. ~12,200 at March 31, 2024, with growth outside furniture verticals.\n- Finance receivables (AFF retail finance) grew 31% to $263.4M gross, with interest/fee revenue up 28% to $73.4M; gross LTO originations collapsed 39% to $94.3M while finance receivable originations rose 38% to $141.3M, reflecting the deliberate pivot away from LTO toward retail finance.\n- U.S. pawn segment pre-tax income rose 17% to $113.1M on a 12% revenue increase; pawn loan receivables grew 16% to $366.0M, aided by inflationary demand and higher gold prices; same-store pawn fees up 10%.\n- Latin America pawn was flat in USD (pre-tax $31.4M vs. $31.9M) due to a 20% adverse peso/USD move; on a constant-currency basis, revenue rose 10% and pre-tax income grew 13%, with pawn loans up 15% constant-currency.\n\n#### Risk-factor changes\n- The SDL Rule (CFPB small-dollar lending rule) took effect March 30, 2025, imposing new origination and servicing obligations on certain AFF finance receivable products; however, the CFPB has announced enforcement will not be a priority and may seek narrowing rulemaking, creating regulatory uncertainty for AFF.\n- Continued uncertainty around the CFPB's leadership and direction under Acting Director Vought (with nominee Jonathan McKernan not yet confirmed as of filing date) adds material uncertainty to the ongoing CFPB MLA lawsuit against FirstCash; mediation was stayed until June 2, 2025, with another session scheduled May 14, 2025.\n- Trade policy risks (U.S. tariffs on imports from China, Canada, Mexico, EU) were newly flagged as a potential headwind to consumer spending and demand for pawn and LTO products, as well as to merchandise costs for resale inventory.\n\n#### Material events\n- Two major AFF merchant partners\u2014American Freight and Conn's Home Plus\u2014filed for bankruptcy in late 2024, materially reducing LTO originations (down 39% YoY to $94.3M in Q1 2025) and driving the 32% decline in net leased merchandise balances to $103.6M by March 31, 2025.\n- The company acquired one U.S. pawn store and opened 11 new locations (10 Latin America, 1 U.S.) in Q1 2025, paying $29.2M net for acquisitions vs. $1.7M in Q1 2024; total store count stood at 3,023 as of March 31, 2025.\n- Gold forward sales contracts as of March 31, 2025 committed delivery of 54,500 oz between April 2025 and December 2026 at a weighted-average price of $2,318/oz, locking in revenue against favorable spot gold prices.\n\n### 8-K \u2014 2025-04-24\n\n## FirstCash Holdings, Inc. (FCFS) \u2014 8-K Filed April 24, 2025\n\n#### Key financials\n- Q1 2025 financial results announced via press release dated April 24, 2025, covering the three-month period ended March 31, 2025 (full details in Exhibit 99.1, not included in filing text).\n- Board declared a Q2 2025 cash dividend of **$0.38 per common share**, announced April 24, 2025.\n\n#### Segment & competitive notes\n- None noted. (No segment-level detail provided in the 8-K body; full results contained in the unfurnished Exhibit 99.1.)\n\n#### Risk-factor changes\n- None noted.\n\n#### Material events\n- FirstCash filed under **Item 2.02** (Results of Operations and Financial Condition); the earnings release is furnished, not filed, and therefore not subject to Section 18 liabilities of the Exchange Act.\n- CFO **R. Douglas Orr** signed the filing on April 24, 2025; the company is incorporated in Delaware and listed on **Nasdaq (FCFS)**, headquartered at 1600 West 7th Street, Fort Worth, Texas.\n\n### 8-K \u2014 2025-03-05\n\n#### Key financials\n- None noted.\n\n#### Segment & competitive notes\n- Howard F. Hambleton serves as President of AFF (American First Finance), FirstCash's point-of-sale lease-to-own segment \u2014 a direct competitor to Snap Finance; his contract was extended through December 31, 2026, with a 2025 base salary of $681,408.\n- No segment-level revenue, volume, or origination figures were disclosed in this filing.\n\n#### Risk-factor changes\n- None noted.\n\n#### Material events\n- On March 3, 2025, FirstCash amended employment agreements for five named executive officers, extending terms to December 31, 2026 (with automatic one-year extension trigger date also set at December 31, 2026).\n- Effective January 1, 2025, annual base salaries were set as follows: CEO Rick L. Wessel $1,452,946; President/COO T. Brent Stuart $897,592; CFO R. Douglas Orr $807,773; AFF President Howard Hambleton $681,408; SVP Latin American Operations Raul Ramos $549,000.\n- No other changes to existing employment agreement terms were made; all other provisions remain in full force.\n\n### 8-K \u2014 2025-02-04\n\n## FirstCash Holdings, Inc. (FCFS) \u2014 8-K Filed February 4, 2025\n\n#### Key financials\n- None noted. (Filing is a Reg FD disclosure of an investor presentation only; no financial statements or specific figures included in the 8-K text itself.)\n\n#### Segment & competitive notes\n- None noted. (Exhibit 99.1 investor presentation was furnished but not reproduced in the filing text provided; no segment detail extractable from the 8-K body.)\n\n#### Risk-factor changes\n- None noted. (No risk-factor disclosures made in this filing.)\n\n#### Material events\n- On February 4, 2025, FirstCash Holdings, Inc. filed an 8-K under Item 7.01 (Regulation FD) to furnish an updated investor presentation posted to its corporate website (investors.firstcash.com).\n- The presentation is attached as Exhibit 99.1; it is \"furnished\" rather than \"filed,\" meaning it is not subject to Section 18 liability and is not automatically incorporated by reference into other SEC filings.\n- Filing was signed by CFO R. Douglas Orr on February 4, 2025; no other corporate actions, transactions, or guidance updates were disclosed in the 8-K text.\n\n### 10-K \u2014 2025-02-03\n\n**FirstCash Holdings, Inc. (FCFS) \u2014 10-K Summary (FY2024, filed 2025-02-03)**\n\n---\n\n#### Key financials\n- As of December 31, 2024, FCFS operated 3,026 pawn stores; pawn operations generated 83% of consolidated net revenues and AFF (retail POS) contributed 17%.\n- Pawn loan fees accounted for 45% of consolidated net revenue; gross profit from pawn merchandise sales accounted for 38%; average U.S. pawn loan balance was $283 and $87 in Latin America as of December 31, 2024.\n- Debt structure as of December 31, 2024 includes: 4.625% Senior Notes due 2028, 5.625% Senior Notes due 2030, and 6.875% Senior Notes due 2032 (issued February 21, 2024); revolving credit facility extended/replaced on August 8, 2024 with a new facility due 2029.\n- Market cap of non-affiliate shares was approximately $4.067 billion as of June 28, 2024; shares outstanding were 44,760,746 as of January 29, 2025.\n\n---\n\n#### Segment & competitive notes\n- Three reportable segments: U.S. Pawn (1,200 stores in 29 states + D.C.), Latin America Pawn (1,826 stores in Mexico, Guatemala, El Salvador, Colombia), and Retail POS Payment Solutions (AFF, operating across all 50 states, D.C., and Puerto Rico with ~13,600 active merchant locations).\n- AFF's furniture vertical declined sharply as a share of gross transaction volume \u2014 from 52% in 2022 to 37% in 2024 \u2014 driven by merchant partner losses including Conn's Appliances and American Freight bankruptcies; automotive grew to 24% and elective medical to 12% in 2024, reflecting deliberate diversification.\n- FCFS acknowledges two publicly held U.S.-based pawnshop operators (including itself), both operating in U.S., Mexico, Guatemala, and El Salvador; U.S. pawn industry estimated at 12,000\u201314,000 total shops, Mexico at 7,000\u20138,000.\n- Net store count grew at a 2% compound annual rate over five years (2020\u20132024); 99 total store additions in 2024 (61 de novo, 38 acquired), offset by 70 consolidations (including 10 Acapulco stores damaged by hurricane in fall 2023).\n\n---\n\n#### Risk-factor changes\n- New/elevated risk explicitly flagged: potential impact of incoming U.S. administration trade and tariff policies on international operations and corporate taxation, added to the risk factor summary for FY2024.\n- CFPB's small-dollar loan (SDL) Rule \u2014 expected effective date March 30, 2025 \u2014 flagged as a near-term regulatory event; company states it does not expect material financial impact but notes the incoming administration could delay implementation.\n- Ongoing CFPB lawsuit (filed November 12, 2021) alleging MLA violations and violations of a predecessor consent order remains an active risk; no resolution disclosed in this filing.\n- AFF bank-partner model risk (Utah state-chartered bank origination) remains flagged as a key structural legal risk; if challenged successfully, AFF could face licensing violations, loan voidance, and enforcement actions.\n\n---\n\n#### Material events\n- On February 21, 2024, FCFS issued 6.875% Senior Unsecured Notes due 2032 (amount not specified in truncated text, but referenced multiple times as a new debt issuance in Q4 2024 context).\n- On August 8, 2024, FCFS refinanced its revolving unsecured credit facility, replacing the prior facility due 2027 with a new facility due 2029, with pricing tied to SOFR plus a spread.\n- On July 3, 2024, trade groups filed for en banc rehearing of the SDL Rule at the Fifth Circuit; petition was denied, leaving the rule on track for a March 30, 2025 effective date \u2014 directly affecting AFF's RISA and bank loan products.\n- Supreme Court upheld CFPB's funding structure 7-2 on May 17, 2024, removing a constitutional challenge that had paused certain CFPB rulemakings; the Company noted this allows the CFPB to resume previously paused regulatory initiatives.\n\n### 8-K \u2014 2025-01-30\n\n## FirstCash Holdings, Inc. (FCFS) \u2014 8-K Filed January 30, 2025\n\n#### Key financials\n- Reported financial results for Q4 and full-year periods ended December 31, 2024 (specific revenue, EPS, and net income figures not included in the 8-K body; detailed results contained in Exhibit 99.1, not provided).\n- Board declared a Q1 2025 cash dividend of **$0.38 per common share**, announced January 30, 2025.\n\n#### Segment & competitive notes\n- None noted. (No segment-level detail disclosed in the 8-K filing text itself; Exhibit 99.1 not reproduced here.)\n\n#### Risk-factor changes\n- None noted.\n\n#### Material events\n- FirstCash issued an earnings press release on **January 30, 2025** covering Q4 and full-year 2024 results; filed as Exhibit 99.1 and furnished (not filed) under Item 2.02.\n- Filing signed by CFO **R. Douglas Orr**, Executive Vice President and Principal Financial and Accounting Officer, dated January 30, 2025.\n\n### 8-K \u2014 2024-12-03\n\n#### Key financials\n- None noted.\n\n#### Segment & competitive notes\n- Douglas R. Rippel, former owner and Executive Chairman of American First Finance (AFF), retired from the FirstCash Holdings board effective December 2, 2024; AFF is a point-of-sale/lease-to-own lender and a direct competitor to Snap Finance.\n- Rippel joined the FirstCash board following the company's acquisition of AFF in December 2021, serving approximately three years through the integration period.\n\n#### Risk-factor changes\n- None noted.\n\n#### Material events\n- Rippel's retirement was characterized as voluntary with no disagreement on company operations, policies, or practices, per the Item 5.02 disclosure dated December 2, 2024.\n- Rippel held no committee memberships (Audit, Nominating & Corporate Governance, or Compensation), so no committee restructuring is required or planned.\n\n### 8-K \u2014 2024-11-18\n\n#### Key financials\n- None noted. (Filing is a Reg FD disclosure of an investor presentation; no financial statements or specific figures are included in the 8-K text itself.)\n\n#### Segment & competitive notes\n- FirstCash Holdings (FCFS) operates in the pawn and point-of-sale lending space, making it a direct competitor to lease-to-own/POS finance providers; the investor presentation (Exhibit 99.1, filed November 18, 2024) may contain segment detail but is not reproduced in the filing text.\n- No specific segment revenue, store count, or competitive metrics are disclosed in the body of this 8-K.\n\n#### Risk-factor changes\n- None noted. No risk-factor additions or amendments are included in this filing.\n\n#### Material events\n- On November 18, 2024, FirstCash Holdings filed an 8-K under Item 7.01 (Regulation FD) to furnish an updated investor presentation posted to its corporate website at investors.firstcash.com.\n- The presentation is attached as Exhibit 99.1; because it is \"furnished\" rather than \"filed,\" it is not subject to Section 18 liability and is not automatically incorporated by reference into Securities Act filings.\n- The filing was signed by CFO R. Douglas Orr as Principal Financial and Accounting Officer.\n\n### 10-Q \u2014 2024-10-28\n\n#### Key financials\n- Q3 2024 total revenue was $837.3M (+6.5% vs. Q3 2023's $786.3M); net income was $64.8M (+13% vs. $57.1M); diluted EPS was $1.44 vs. $1.26 in Q3 2023.\n- Nine-month 2024 total revenue was $2.504B (+8.9% vs. $2.300B); net income was $175.3M (+17.1% vs. $149.7M); diluted EPS was $3.88 vs. $3.27.\n- Total debt at September 30, 2024 was $1.731B (revolver $200M + senior notes $1.531B), up from $1.597B at September 30, 2023; consolidated leverage ratio was 2.8x adjusted EBITDA. Company used $500M 6.875% senior notes issued February 21, 2024 to pay down the revolver (from $568M at December 31, 2023 to $200M).\n- AFF (Retail POS) segment pre-tax income fell 23% in Q3 2024 to $30.2M vs. $39.4M in Q3 2023, driven by higher provision for loan losses (+23% to $40.6M) and lower net revenue; nine-month pre-tax income was $89.2M vs. $88.5M.\n\n#### Segment & competitive notes\n- U.S. Pawn (direct competitor to Snap Finance's lease-to-own adjacent market): Q3 2024 pre-tax income $98.3M (+16%); same-store retail sales +7% and same-store pawn fees +8%; total store count stable at 1,201 U.S. locations as of September 30, 2024.\n- AFF (LTO/retail POS, direct Snap Finance competitor): Q3 2024 gross transaction volume was $286.1M (+14% vs. $250.7M in Q3 2023), with finance receivables volume up 39% to $142.9M, partially offset by LTO leased merchandise volume down 3% to $143.1M; active merchant partner locations grew to ~13,500 from ~10,800 a year earlier.\n- Latin America Pawn: Q3 2024 reported revenue declined 2% to $198.4M but grew 8% on a constant-currency basis; 11% unfavorable Mexican peso FX impact drove a 6% reported decline in segment pre-tax income to $38.5M; store count grew to 1,824 locations (net +10 in Q3 2024).\n- AFF's LTO portfolio showed improving credit quality: lease loss allowance fell 11% to $93.8M; finance receivable delinquency rate improved to 19.4% from 21.9% at September 30, 2023, though average monthly net charge-off rate on leased merchandise rose to 6.8% from 5.9%.\n\n#### Risk-factor changes\n- CFPB lawsuit (Military Lending Act violations against FirstCash, Inc. and Cash America West, Inc.) was reactivated after the Supreme Court's May 16, 2024 ruling in favor of the CFPB's funding structure; the N.D. Texas Court issued a scheduling order June 18, 2024, setting trial for June 2025; the CFPB renewed its motion to strike affirmative defenses on July 2, 2024.\n- Mexican peso depreciation (~11% year-over-year) increased currency translation losses: accumulated other comprehensive loss widened to $114.8M at September 30, 2024 from $43.0M at December 31, 2023, a $71.8M nine-month swing; this is an ongoing risk for both Latin America pawn earnings and U.S. dollar-denominated lease liabilities in Mexico.\n\n#### Material events\n- On February 21, 2024, FirstCash issued $500M of 6.875% senior unsecured notes due March 1, 2032 (private placement under Rule 144A/Reg S); proceeds were used to repay the revolving credit facility, reducing revolver balance from $568M to $200M by September 30, 2024.\n- On August 8, 2024, the revolving credit facility was amended: capacity increased from $640M to $700M, maturity extended from August 2027 to August 8, 2029, and the permitted leverage covenant increased to 3.25x adjusted EBITDA; available capacity at September 30, 2024 was $497.2M.\n- During the nine months ended September 30, 2024, the Company acquired 28 U.S. pawn stores in five transactions for aggregate net consideration of $102.8M ($68.6M cash + $29.3M stock + ~$4.9M payables), adding $82.4M of goodwill; the Company also repurchased $85.0M of common stock (721K shares)\n\n### 8-K \u2014 2024-10-24\n\n## FirstCash Holdings, Inc. (FCFS) \u2013 8-K Filed October 24, 2024\n\n#### Key financials\n- Reported financial results for the three and nine month periods ended September 30, 2024 (Q3 2024 and YTD 2024); specific revenue, earnings, and margin figures are contained in Exhibit 99.1 (press release), which is not included in the truncated filing text.\n- Board declared a Q4 2024 cash dividend of **$0.38 per common share**, announced October 24, 2024.\n\n#### Segment & competitive notes\n- None noted. No segment-level detail or competitive commentary is present in the 8-K body; such information would be in the attached press release (Exhibit 99.1), not provided here.\n\n#### Risk-factor changes\n- None noted. This 8-K is limited to an earnings results disclosure under Item 2.02 and contains no new or amended risk-factor disclosures.\n\n#### Material events\n- FirstCash Holdings filed under **Item 2.02** (Results of Operations and Financial Condition) on **October 24, 2024**, covering Q3 and nine-month periods ended **September 30, 2024**.\n- The earnings release (Exhibit 99.1) is furnished, not filed, and therefore not subject to Section 18 liability of the Securities Exchange Act of 1934.\n\n### 8-K \u2014 2024-08-09\n\n## FirstCash Holdings, Inc. (FCFS) \u2014 8-K Summary (Filed 2024-08-09)\n\n#### Key financials\n- Revolving unsecured credit facility commitment increased from **$640 million to $700 million** effective August 8, 2024.\n- Interest rate options: SOFR plus **2.5%** fixed spread, or prime/base rate plus **1.5%** fixed spread; term extended to **August 8, 2029** (previously matured August 30, 2027).\n\n#### Segment & competitive notes\n- Facility is unsecured and U.S.-based, administered by Wells Fargo with a syndicate of commercial banks; no segment-specific revenue or competitive data disclosed in this filing.\n- The expanded capacity ($60M incremental commitment) signals continued appetite for growth capital, potentially supporting FirstCash's pawn and POS lending operations competing with Snap Finance's lease-to-own segment.\n\n#### Risk-factor changes\n- Permitted consolidated leverage ratio increased to **3.25x adjusted EBITDA** for the full term, modestly loosening the prior covenant and allowing greater debt capacity.\n- Other financial covenants remain substantially unchanged per the filing.\n\n#### Material events\n- On **August 8, 2024**, FirstCash and subsidiary FirstCash, Inc. executed the **Eighth Amendment** to their Amended and Restated Credit Agreement with Wells Fargo as administrative agent.\n- Press release issued same date (Exhibit 99.1); certain terms redacted from filed Exhibit 10.1 per Regulation S-K Item 601(b)(10)(iv).\n\n### 8-K \u2014 2024-07-30\n\n## FirstCash Holdings, Inc. (FCFS) \u2014 8-K Filed July 30, 2024\n\n#### Key financials\n- None noted. (Filing is a Regulation FD disclosure of an investor presentation; no financial statements or specific financial figures were included in the 8-K text itself.)\n\n#### Segment & competitive notes\n- FirstCash operates pawn store segments in the U.S. and Latin America, as well as a point-of-sale lending segment (American First Finance / AFF), which competes directly with Snap Finance in the lease-to-own and LTO-adjacent space.\n- No new segment-specific metrics or competitive data were disclosed in the 8-K text; detail is contained in Exhibit 99.1 (investor presentation), which was not provided in the filing text.\n\n#### Risk-factor changes\n- None noted. No new or amended risk factors were disclosed in this filing.\n\n#### Material events\n- On July 30, 2024, FirstCash filed an 8-K under Item 7.01 (Regulation FD) to furnish an updated investor presentation posted to its corporate website at investors.firstcash.com.\n- The presentation (Exhibit 99.1) is furnished, not filed, and is therefore not subject to Section 18 liability or automatically incorporated by reference into future Securities Act filings; signed by CFO R. Douglas Orr.\n\n### 10-Q \u2014 2024-07-29\n\n#### Key financials\n- H1 2024 total revenue $1.667B (+10% vs. H1 2023 $1.513B); net income $110.4M (+19% vs. $92.6M); diluted EPS $2.44 vs. $2.01 in H1 2023.\n- Q2 2024 revenue $831.0M (+11% YoY); net income $49.1M (+9% YoY); diluted EPS $1.08 vs. $0.99 in Q2 2023; effective tax rate 25.8%.\n- Total debt at June 30, 2024: $1.680B (revolving credit $150M + senior notes $1.530B); interest expense rose 20% YoY to $25.2M in Q2 due to higher rates and larger balances; consolidated total debt ratio 2.7x EBITDA.\n- Operating cash flow H1 2024: $228.7M vs. $205.7M in H1 2023; treasury stock repurchases of $85.0M in H1 2024; dividends paid $31.7M ($0.35/share per quarter).\n\n#### Segment & competitive notes\n- U.S. Pawn segment Q2 2024 pre-tax income $90.6M (+25% YoY) on revenue of $376.7M (+20%); pawn loan balances +22% to $356.3M; same-store pawn fees +12%; management attributes demand growth to inflation and tightened competing consumer credit underwriting.\n- Latin America Pawn Q2 2024 pre-tax income $37.1M (-2% reported, -4% constant currency) on revenue $204.0M (+6% reported, +4% constant currency); operating expenses surged 14% (11% cc) driven by minimum wage increases and store expansion; 1,817 stores across Mexico, Guatemala, El Salvador, and Colombia as of June 30, 2024.\n- Retail POS Payment Solutions (AFF) Q2 2024 pre-tax income essentially flat at $25.9M vs. $25.8M; gross transaction volume -2% to $252.0M; leased merchandise volume -5%; finance receivables delinquency rate rose to 20.0% (vs. 19.1%); average monthly net charge-off rate on finance receivables increased to 4.5% from 4.0%; active merchant partner locations grew to ~12,800 from ~10,500 at June 30, 2023.\n- Total pawn store count 3,018 at June 30, 2024 (1,201 U.S., 1,817 Latin America); acquired 27 U.S. stores in H1 2024 for aggregate $99.2M purchase price ($65.0M cash + $29.3M stock).\n\n#### Risk-factor changes\n- CFPB lawsuit (MLA violations, filed November 12, 2021) reactivated after Supreme Court's May 16, 2024 ruling restored CFPB funding authority; N.D. Texas Court issued scheduling order June 18, 2024, with trial set for June 2025; CFPB renewed motion July 2, 2024 to strike company affirmative defenses\u2014outcome and financial exposure remain unquantified.\n- Mexican peso depreciation created $47.7M currency translation loss in Q2 2024 (vs. $27.8M gain in Q2 2023), compressing consolidated comprehensive income to $1.4M for the quarter; end-of-period peso was 8% weaker vs. prior year, negatively impacting translated Latin America earning assets.\n\n#### Material events\n- On February 21, 2024, issued $500.0M of 6.875% senior unsecured notes due March 1, 2032 (private placement under Rule 144A/Reg S); net proceeds used to repay revolving credit facility; $9.1M in debt issuance costs capitalized; first interest payment due September 1, 2024.\n- Acquired 27 U.S. pawn stores in four transactions plus one Nevada license in H1 2024 for $99.2M net of cash; consideration mix: $65.0M cash, $29.3M stock (225K shares issued in Q2), ~$4.9M deferred; $79.6M of goodwill recorded, substantially all tax-deductible.\n- Company held gold forward sales contracts as of June 30, 2024 to deliver 84,500 ounces between July 2024 and June 2026 at a weighted-average price of $2,171/oz, providing revenue visibility on scrap jewelry sales.\n\n### 8-K \u2014 2024-07-25\n\n## FirstCash Holdings, Inc. (FCFS) \u2014 8-K Filed July 25, 2024\n\n#### Key financials\n- Results cover the three and six month periods ended June 30, 2024; full financial details are in Exhibit 99.1 (press release), which is not included in the truncated filing text.\n- Board declared a Q3 2024 cash dividend of **$0.38 per common share**, announced July 25, 2024.\n\n#### Segment & competitive notes\n- None noted. (No segment-level detail provided in the 8-K body; Exhibit 99.1 containing the press release was not included in the filing text.)\n\n#### Risk-factor changes\n- None noted. This 8-K is limited to an earnings results disclosure under Item 2.02; no risk-factor amendments were filed.\n\n#### Material events\n- FirstCash filed under **Item 2.02** (Results of Operations and Financial Condition) on July 25, 2024, reporting Q2 and H1 2024 financial results via press release (Exhibit 99.1).\n- Information is furnished, **not filed**, and therefore not subject to Section 18 liabilities of the Securities Exchange Act of 1934.\n"}, {"slug": "index", "type": "sec-filing", "title": "SEC Filings \u2014 Tracker Index", "significance": "", "significance_reason": "", "category": "", "tier": "", "segment": "", "sae": "", "partner": "", "competitor": "", "date": "", "parent": "", "ticker": "", "publisher": "", "url": "", "owner_name": "", "owner_slug": "", "count": "133", "tags": [], "sources": [], "content": "---\ntitle: SEC Filings \u2014 Tracker Index\ntype: sec-filing\ncount: 133\ncreated: 2026-06-15\nupdated: 2026-06-15\n---\n\n# SEC Filings \u2014 Tracker Index\n\n_Updated: June 15, 2026_  \u00b7  **133** filings tracked across **5** public competitors.\n\n| Filer | Ticker | Competitor | Filings | Latest |\n| --- | --- | --- | --- | --- |\n| [[affirm-holdings]] | AFRM | [[affirm]] | 30 | 2026-05-07 |\n| [[firstcash-holdings]] | FCFS | [[american-first-finance]] | 39 | 2026-06-09 |\n| [[klarna-group]] | KLAR | [[klarna]] | 7 | 2026-05-27 |\n| [[prog-holdings]] | PRG | [[progressive-leasing]] | 29 | 2026-05-07 |\n| [[upbound-group]] | UPBD | [[acima]] | 28 | 2026-06-03 |\n"}, {"slug": "klarna-group", "type": "sec-filing", "title": "Klarna Group \u2014 SEC Filings", "significance": "", "significance_reason": "", "category": "", "tier": "", "segment": "", "sae": "", "partner": "", "competitor": "klarna", "date": "", "parent": "Klarna Group", "ticker": "KLAR", "publisher": "", "url": "", "owner_name": "", "owner_slug": "", "count": "7", "tags": [], "sources": [], "content": "---\ntitle: Klarna Group \u2014 SEC Filings\ntype: sec-filing\ncompetitor: [[klarna]]\nparent: Klarna Group\nticker: KLAR\ncount: 7\ncreated: 2026-06-15\nupdated: 2026-06-15\n---\n\n# Klarna Group \u2014 SEC Filings\n\n_Updated: June 15, 2026_  \u00b7  Filer for [[klarna]] (KLAR)\n\n## Filings\n\n| Form | Filed | Period | Document | Local |\n| --- | --- | --- | --- | --- |\n| 6-K | 2026-05-27 | 2026-05-27 | [EDGAR](https://www.sec.gov/Archives/edgar/data/2003292/000162828026038366/form6-kxklarnagroupplc2026.htm) | [file](../../sec-filings/klarna-group/2026-05-27_6-K_0001628280-26-038366.htm) |\n| 6-K | 2026-05-14 | 2026-03-31 | [EDGAR](https://www.sec.gov/Archives/edgar/data/2003292/000162828026034877/form6-kxklarnagroupplcxq126.htm) | [file](../../sec-filings/klarna-group/2026-05-14_6-K_0001628280-26-034877.htm) |\n| 20-F | 2026-02-26 | 2025-12-31 | [EDGAR](https://www.sec.gov/Archives/edgar/data/2003292/000200329226000007/klar-20251231.htm) | [file](../../sec-filings/klarna-group/2026-02-26_20-F_0002003292-26-000007.htm) |\n| 6-K | 2026-02-20 | 2025-12-31 | [EDGAR](https://www.sec.gov/Archives/edgar/data/2003292/000200329226000004/form6-kxklarnagroupplcearn.htm) | [file](../../sec-filings/klarna-group/2026-02-20_6-K_0002003292-26-000004.htm) |\n| 6-K | 2026-02-19 | 2025-12-31 | [EDGAR](https://www.sec.gov/Archives/edgar/data/2003292/000200329226000002/form6-kxklarnagroupplcearn.htm) | [file](../../sec-filings/klarna-group/2026-02-19_6-K_0002003292-26-000002.htm) |\n| 6-K | 2025-11-18 | 2025-09-30 | [EDGAR](https://www.sec.gov/Archives/edgar/data/2003292/000162828025052805/form6-kxklarnagroupplcinte.htm) | [file](../../sec-filings/klarna-group/2025-11-18_6-K_0001628280-25-052805.htm) |\n| 6-K | 2025-11-18 | 2025-09-30 | [EDGAR](https://www.sec.gov/Archives/edgar/data/2003292/000162828025052803/form6-kxklarnagroupplcearn.htm) | [file](../../sec-filings/klarna-group/2025-11-18_6-K_0001628280-25-052803.htm) |\n\n## Filing summaries\n\n### 6-K \u2014 2026-05-27\n\n## Klarna Group plc \u2013 6-K Filed 2026-05-27\n\n#### Key financials\n- Filing furnishes the Annual Report and Accounts for the year ended December 31, 2025 (Exhibit 99.3), but no financial figures are extracted or summarized within the body of this 6-K.\n- No specific revenue, net income, GMV, or balance sheet figures are disclosed in the filing text itself.\n\n#### Segment & competitive notes\n- None noted.\n\n#### Risk-factor changes\n- None noted.\n\n#### Material events\n- On May 27, 2026, Klarna Group plc published its Notice of Annual General Meeting (AGM) scheduled for **June 22, 2026**, along with proxy materials (Exhibits 99.1 and 99.2).\n- The Directors' Remuneration Report for the year ended December 31, 2025, including a Directors' Remuneration Policy, was published simultaneously (Exhibit 99.4); shareholder approval of remuneration policy will be sought at the June 22 AGM.\n- CFO **Niclas Neglen** signed the filing on behalf of Klarna Group plc; the company is registered as a foreign private issuer filing under Form 20-F with Commission File Number **001-42832**.\n\n### 6-K \u2014 2026-05-14\n\n## Klarna Group plc \u2013 6-K Summary (Filed May 14, 2026)\n\n#### Key financials\n- Filing covers Q1 2026 results for the three-month period ended March 31, 2026; specific revenue, net income, and GMV figures are contained in Exhibits 99.2, 99.4, and 99.5, which are not reproduced in the 6-K cover document itself.\n- No specific financial metrics (revenue, EBITDA, loan loss rates, etc.) are extractable from the 6-K shell filing as presented; full figures require review of the attached exhibits.\n\n#### Segment & competitive notes\n- None noted.\n\n#### Risk-factor changes\n- None noted.\n\n#### Material events\n- On May 14, 2026, Klarna Group plc (Commission File No. 001-42832) filed its first quarterly earnings report as a public company (Form 6-K), signed by CFO Niclas Neglen, covering Q1 2026 ended March 31, 2026.\n- The earnings release (Exhibit 99.2) and financial statements (Exhibits 99.4 and 99.5) are incorporated by reference into Klarna's Form S-8 registration statement (No. 333-290150), indicating active equity compensation programs post-IPO.\n\n> **Analyst note:** The filing text provided is limited to the 6-K cover/signature page only. Quantitative financials relevant to Snap Finance competitive benchmarking (GMV, BNPL penetration, credit losses, take rates) would require analysis of Exhibits 99.2\u201399.5.\n\n### 20-F \u2014 2026-02-26\n\nI can only work with the text provided in the filing. The XBRL data and narrative text provided are from Klarna Group plc (ticker: KLAR), not Snap Finance. Based solely on what was submitted, here is the summary:\n\n---\n\n#### Key financials\n- Klarna reported a net loss of **$273 million in 2025** and **$244 million in 2023**, compared to a net profit of **$21 million in 2024**, reflecting renewed investment-driven losses after a brief return to profitability.\n- Revenue is derived from four streams: transaction revenue, consumer service revenue (including \"Fair Financing\" fees and snooze fees), gain on sale of consumer receivables, and interest income; geographic mix includes U.S., Germany, and UK as named segments alongside \"other countries.\"\n- Klarna issued new senior unsecured bonds under its SMTN and EMTN programs in June 2025, including a SEK 600M tranche due 2027 and a SEK 900M tranche due 2028 (both STIBOR-linked), adding to earlier 2024 issuances of SEK 500M (due 2026), SEK 750M (due 2026), and SEK 250M (due 2027).\n\n#### Segment & competitive notes\n- Klarna operates as a single reportable segment; revenue is broken down geographically with the U.S., Germany, and UK disclosed separately, with U.S. operations explicitly noted as growing faster than more mature European markets but still dilutive to transaction margin percentage.\n- Named competitors include Affirm, Block, PayPal, AfterPay, Revolut, NuBank, Shopify, Amazon, Walmart, and major card networks (Visa, Mastercard, Amex, Capital One, Discover) as well as large card-issuing banks (JPMorgan Chase, Citibank, Bank of America, HSBC, BNP Paribas, Barclays, Santander).\n\n#### Risk-factor changes\n- New/elevated risk flagged around **AI and generative AI** usage, including risks of biased outputs, data rights deficiencies, regulatory non-compliance, and reputational harm from the customer service chatbot and shopping assistant.\n- Elevated risk around **multi-class share capital structure** and equity-based compensation social security tax obligations, particularly in Sweden and the UK where employer social security on equity awards is uncapped, noted as potentially material depending on share price movements.\n\n#### Material events\n- Klarna completed its **IPO on the New York Stock Exchange on September 10, 2025** (ticker: KLAR), with an underwriter option exercised on **September 22, 2025**; total ordinary shares outstanding at filing date: **377,507,910**.\n- Klarna acquired **KCO** (referenced as \"KCOMember\") effective **October 1, 2024**, with goodwill recognized on that date; subsidiary Klarna Group plc structure was reorganized ahead of the IPO, including conversion of Class B shares and deferred shares on **September 9, 2025**.\n\n### 6-K \u2014 2026-02-20\n\n## Klarna Group plc \u2013 6-K Filed 2026-02-20 (FY2025 Earnings Presentation)\n\n#### Key financials\n- Filing furnishes Klarna's full-year earnings presentation for the year ended December 31, 2025, released February 19, 2026; no financial tables are included in the 6-K body itself \u2014 figures are contained in Exhibit 99.1, which is not reproduced in the filing text provided.\n- No specific revenue, net income, GMV, or credit-loss figures are extractable from the truncated filing text.\n\n#### Segment & competitive notes\n- None noted.\n\n#### Risk-factor changes\n- None noted.\n\n#### Material events\n- Klarna Group plc (Commission File Number 001-42832), a UK-incorporated entity headquartered at 10 York Road, London SE1 7ND, filed this 6-K on February 20, 2026, confirming it reports under Form 20-F as a foreign private issuer.\n- The sole disclosed event is the issuance of the FY2025 earnings presentation on February 19, 2026, furnished (not filed) as Exhibit 99.1; signed by CFO Niclas Neglen.\n\n> **Analyst note for Snap Finance:** The filing text provided is a shell 6-K wrapper only; Exhibit 99.1 containing the actual FY2025 financial results (revenue, BNPL volumes, credit metrics, market share data relevant to Snap) was not included in the truncated text. A full competitive analysis requires review of Exhibit 99.1.\n\n### 6-K \u2014 2026-02-19\n\n## Klarna Group plc \u2013 6-K Summary (Filed 2026-02-19)\n\n*Earnings release covering Q4 2025 and full-year ended December 31, 2025*\n\n---\n\n#### Key financials\n- The 6-K cover document references earnings releases (Exhibits 99.1 and 99.2) for the three- and twelve-month periods ended December 31, 2025, but the full financial statements and specific figures are contained in those exhibits, which are not reproduced in the truncated filing text provided.\n- No specific revenue, net income, loss, or balance sheet figures are extractable from the body of this 6-K filing alone.\n\n#### Segment & competitive notes\n- None noted.\n\n#### Risk-factor changes\n- None noted.\n\n#### Material events\n- On February 19, 2026, Klarna Group plc issued a Q4 2025 earnings release and an accompanying press release announcing fourth-quarter 2025 financial results and a business update.\n- The Company is also publishing a supplemental spreadsheet of select historical financial results on its investor relations website concurrent with this filing.\n- The report was signed by Niclas Neglen, Chief Finance Officer, on February 19, 2026; Commission File Number is 001-42832.\n\n---\n\n*Note: Substantive financial data (revenue, GMV, credit losses, segment results) reside in Exhibits 99.1 and 99.2, which were not included in the provided text. A complete analysis would require those exhibits.*\n\n### 6-K \u2014 2025-11-18\n\n## Klarna Group plc \u2013 6-K Summary (Filed November 18, 2025)\n\n#### Key financials\n- Filing covers unaudited interim condensed consolidated financial statements for the **three and nine-month periods ended September 30, 2025**; actual income statement, balance sheet, and cash flow figures are contained in Exhibit 99.1, which is not reproduced in the filing text provided.\n- No specific revenue, net income, GMV, or credit loss figures are extractable from the truncated filing text furnished here.\n\n#### Segment & competitive notes\n- None noted.\n\n#### Risk-factor changes\n- None noted.\n\n#### Material events\n- On **November 18, 2025**, Klarna Group plc filed its Form 6-K and simultaneously released an **updated investor presentation** (Exhibit 99.2), suggesting active investor-relations activity likely tied to post-IPO reporting obligations (Commission File Number **001-42832** indicates a recently registered issuer).\n- Exhibit 99.1 (the interim financial statements) is **incorporated by reference** into the Company's Form S-8 registration statement (Registration No. **333-290150**), confirming Klarna has an active employee equity compensation program requiring ongoing SEC registration maintenance.\n\n> **Analyst note for Snap Finance:** Full financial metrics (GMV, revenue growth, credit performance) require review of Exhibit 99.1 in its entirety. Klarna remains a direct BNPL/POS financing competitor; the investor presentation (Exhibit 99.2) may contain forward-looking competitive disclosures worth monitoring.\n\n### 6-K \u2014 2025-11-18\n\n## Klarna Group plc \u2013 6-K Filed November 18, 2025\n\n#### Key financials\n- Filing covers the three- and nine-month periods ended **September 30, 2025**; detailed financials are contained in Exhibit 99.1, which is furnished but not reproduced in the 6-K shell document itself.\n- No specific revenue, net income, GMV, or credit loss figures are extractable from the 6-K cover document alone \u2014 full numbers require review of the attached earnings release (Exhibit 99.1) and select historical data (Exhibit 99.3).\n\n#### Segment & competitive notes\n- Klarna operates a buy-now-pay-later / point-of-sale financing model directly competitive with Snap Finance's lease-to-own and installment lending products at retail checkout.\n- No segment-level breakdown is disclosed in the 6-K shell; segment detail would be in Exhibit 99.1.\n\n#### Risk-factor changes\n- None noted.\n\n#### Material events\n- On **November 18, 2025**, Klarna Group plc issued its Q3 2025 earnings release and an accompanying press release announcing third-quarter financial results and a business update.\n- The filing was signed by CFO **Niclas Neglen** under Commission File Number **001-42832**, reflecting Klarna's status as a newly public foreign private issuer filing on Form 20-F basis.\n"}, {"slug": "prog-holdings", "type": "sec-filing", "title": "PROG Holdings \u2014 SEC Filings", "significance": "", "significance_reason": "", "category": "", "tier": "", "segment": "", "sae": "", "partner": "", "competitor": "progressive-leasing", "date": "", "parent": "PROG Holdings", "ticker": "PRG", "publisher": "", "url": "", "owner_name": "", "owner_slug": "", "count": "29", "tags": [], "sources": [], "content": "---\ntitle: PROG Holdings \u2014 SEC Filings\ntype: sec-filing\ncompetitor: [[progressive-leasing]]\nparent: PROG Holdings\nticker: PRG\ncount: 29\ncreated: 2026-06-15\nupdated: 2026-06-15\n---\n\n# PROG Holdings \u2014 SEC Filings\n\n_Updated: June 15, 2026_  \u00b7  Filer for [[progressive-leasing]] (PRG)\n\n## Filings\n\n| Form | Filed | Period | Document | Local |\n| --- | --- | --- | --- | --- |\n| 8-K | 2026-05-07 | 2026-05-06 | [EDGAR](https://www.sec.gov/Archives/edgar/data/1808834/000180883426000071/prg-20260506.htm) | [file](../../sec-filings/prog-holdings/2026-05-07_8-K_0001808834-26-000071.htm) |\n| 10-Q | 2026-04-29 | 2026-03-31 | [EDGAR](https://www.sec.gov/Archives/edgar/data/1808834/000180883426000066/prg-20260331.htm) | [file](../../sec-filings/prog-holdings/2026-04-29_10-Q_0001808834-26-000066.htm) |\n| 8-K | 2026-04-29 | 2026-04-29 | [EDGAR](https://www.sec.gov/Archives/edgar/data/1808834/000180883426000065/prg-20260429.htm) | [file](../../sec-filings/prog-holdings/2026-04-29_8-K_0001808834-26-000065.htm) |\n| 8-K | 2026-03-10 | 2026-03-10 | [EDGAR](https://www.sec.gov/Archives/edgar/data/1808834/000180883426000051/prg-20260310.htm) | [file](../../sec-filings/prog-holdings/2026-03-10_8-K_0001808834-26-000051.htm) |\n| 8-K | 2026-03-02 | 2026-02-25 | [EDGAR](https://www.sec.gov/Archives/edgar/data/1808834/000180883426000026/prg-20260225.htm) | [file](../../sec-filings/prog-holdings/2026-03-02_8-K_0001808834-26-000026.htm) |\n| 10-K | 2026-02-18 | 2025-12-31 | [EDGAR](https://www.sec.gov/Archives/edgar/data/1808834/000180883426000012/prg-20251231.htm) | [file](../../sec-filings/prog-holdings/2026-02-18_10-K_0001808834-26-000012.htm) |\n| 8-K | 2026-02-18 | 2026-02-18 | [EDGAR](https://www.sec.gov/Archives/edgar/data/1808834/000180883426000011/prg-20260218.htm) | [file](../../sec-filings/prog-holdings/2026-02-18_8-K_0001808834-26-000011.htm) |\n| 8-K | 2026-01-02 | 2026-01-02 | [EDGAR](https://www.sec.gov/Archives/edgar/data/1808834/000180883426000002/prg-20260102.htm) | [file](../../sec-filings/prog-holdings/2026-01-0
